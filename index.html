      let diff = target - curr;
      if (diff < 0) diff += 7;
      const d = new Date(now);
      d.setDate(d.getDate() + diff);
      return toDateStr(d);
    }

    function genId() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
    }

    // ── AI: helpers ──
    function getTasksHash() {
      const active = tasks.filter(t => t.status !== 'completed');
      const str = active.map(t => `${t.id}:${t.text}:${t.status}`).join('|');
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        hash = ((hash << 5) - hash) + str.charCodeAt(i);
        hash |= 0;
      }
      return String(hash);
    }

    function isNativeApp() {
      return window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform();
    }

    // ── AI: Theme grouping ──
    async function fetchThemeGroups() {
      const active = tasks.filter(t => t.status !== 'completed');
      if (active.length < 4) {
        themeCache = { hash: getTasksHash(), groups: [], loading: false };
        render();
        return;
      }
      themeCache.loading = true;
      render();
      try {
        const payload = active.map(t => ({ id: t.id, text: t.text, category: t.category, priority: t.priority }));
        const result = await api('/ai/group-themes', {
          method: 'POST',
          body: JSON.stringify({ tasks: payload })
        });
        themeCache = { hash: getTasksHash(), groups: result.groups || [], loading: false };
      } catch (err) {
        console.error('Theme fetch error:', err);
        themeCache = { hash: getTasksHash(), groups: [], loading: false };
        toast('Could not group by theme');
      }
      render();
    }

    function scheduleThemeRefresh() {
      if (allSort !== 'themes') return;
      if (themeFetchTimer) clearTimeout(themeFetchTimer);
      themeFetchTimer = setTimeout(() => fetchThemeGroups(), 3000);
    }

    // ── AI: Daily briefing ──
    async function initBriefing() {
      const today = todayStr();
      // Start weather fetch in parallel (don't block briefing)
      fetchWeather().then(() => render());
      // Check localStorage cache
      try {
        const cached = JSON.parse(localStorage.getItem(BRIEFING_CACHE_KEY) || 'null');
        if (cached && cached.date === today && cached.taskHash === getTasksHash()) {
          briefingData = cached.briefing;
          briefingLoading = false;
          render();
          return;
        }
      } catch {}
      // Fetch new briefing
      await fetchDailyBriefing();
    }

    // ── Weather ──
    const WMO_WEATHER = {
      0: { label: 'Clear sky', icon: '&#9728;&#65039;' },
      1: { label: 'Mostly clear', icon: '&#127780;&#65039;' },
      2: { label: 'Partly cloudy', icon: '&#9925;' },
      3: { label: 'Overcast', icon: '&#9729;&#65039;' },
      45: { label: 'Foggy', icon: '&#127787;&#65039;' },
      48: { label: 'Fog (rime)', icon: '&#127787;&#65039;' },
      51: { label: 'Light drizzle', icon: '&#127782;&#65039;' },
      53: { label: 'Drizzle', icon: '&#127782;&#65039;' },
      55: { label: 'Heavy drizzle', icon: '&#127782;&#65039;' },
      61: { label: 'Light rain', icon: '&#127783;&#65039;' },
      63: { label: 'Rain', icon: '&#127783;&#65039;' },
      65: { label: 'Heavy rain', icon: '&#127783;&#65039;' },
      66: { label: 'Freezing rain', icon: '&#127783;&#65039;' },
      67: { label: 'Heavy freezing rain', icon: '&#127783;&#65039;' },
      71: { label: 'Light snow', icon: '&#127784;&#65039;' },
      73: { label: 'Snow', icon: '&#127784;&#65039;' },
      75: { label: 'Heavy snow', icon: '&#127784;&#65039;' },
      77: { label: 'Snow grains', icon: '&#127784;&#65039;' },
      80: { label: 'Rain showers', icon: '&#127783;&#65039;' },
      81: { label: 'Heavy showers', icon: '&#127783;&#65039;' },
      82: { label: 'Violent showers', icon: '&#127783;&#65039;' },
      85: { label: 'Snow showers', icon: '&#127784;&#65039;' },
      86: { label: 'Heavy snow showers', icon: '&#127784;&#65039;' },
      95: { label: 'Thunderstorm', icon: '&#9928;&#65039;' },
      96: { label: 'Thunderstorm + hail', icon: '&#9928;&#65039;' },
      99: { label: 'Thunderstorm + heavy hail', icon: '&#9928;&#65039;' }
    };

    function getWeatherInfo(code) {
      return WMO_WEATHER[code] || { label: 'Unknown', icon: '&#127777;&#65039;' };
    }

    function isWeatherBad(code) {
      return code >= 51; // drizzle, rain, snow, thunderstorm
    }

    async function fetchWeather(retryCount = 0) {
      // Check cache (valid for 1 hour)
      try {
        const cached = JSON.parse(localStorage.getItem(WEATHER_CACHE_KEY) || 'null');
        if (cached && (Date.now() - cached.ts) < 3600000) {
          weatherData = cached.data;
          weatherError = null;
          return;
        }
      } catch {}

      weatherLoading = true;
      weatherError = null;
      try {
        let lat, lng;
        if (isNativeApp()) {
          // Use Capacitor Geolocation plugin on mobile
          const { Geolocation } = await import('https://esm.sh/@capacitor/geolocation@6');
          try { await Geolocation.requestPermissions(); } catch {}
          const pos = await Geolocation.getCurrentPosition({ enableHighAccuracy: false, timeout: 15000 });
          lat = pos.coords.latitude.toFixed(4);
          lng = pos.coords.longitude.toFixed(4);
        } else if (window.isSecureContext && navigator.geolocation) {
          // Use browser geolocation only on HTTPS
          const pos = await new Promise((resolve, reject) => {
            navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 15000, enableHighAccuracy: false });
          });
          lat = pos.coords.latitude.toFixed(4);
          lng = pos.coords.longitude.toFixed(4);
        } else {
          // HTTP fallback: use IP-based geolocation
          const geoResp = await fetch('https://ipapi.co/json/');
          if (geoResp.ok) {
            const geoData = await geoResp.json();
            lat = parseFloat(geoData.latitude).toFixed(4);
            lng = parseFloat(geoData.longitude).toFixed(4);
          } else {
            throw new Error('IP geolocation failed');
          }
        }

        const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m,weather_code,relative_humidity_2m,wind_speed_10m&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=auto&forecast_days=3`;
        const resp = await fetch(url);
        if (!resp.ok) throw new Error('Weather API error');
        const data = await resp.json();

        weatherData = {
          current: {
            temp: Math.round(data.current.temperature_2m),
            code: data.current.weather_code,
            humidity: data.current.relative_humidity_2m,
            wind: Math.round(data.current.wind_speed_10m),
            unit: data.current_units?.temperature_2m || '°C'
          },
          daily: data.daily.time.map((date, i) => ({
            date,
            code: data.daily.weather_code[i],
            high: Math.round(data.daily.temperature_2m_max[i]),
            low: Math.round(data.daily.temperature_2m_min[i]),
            rainChance: data.daily.precipitation_probability_max[i]
          }))
        };
        weatherError = null;
        localStorage.setItem(WEATHER_CACHE_KEY, JSON.stringify({ ts: Date.now(), data: weatherData }));
      } catch (err) {
        console.warn('Weather fetch failed:', err.message);
        weatherData = null;
        if (err.code === 1) weatherError = 'permission';
        else if (err.code === 3) weatherError = 'timeout';
        else weatherError = 'network';
        // Auto-retry once for timeout/network errors
        if (retryCount < 1 && weatherError !== 'permission') {
          weatherLoading = false;
          await new Promise(r => setTimeout(r, 2000));
          return fetchWeather(retryCount + 1);
        }
      }
      weatherLoading = false;
    }

    function getWeatherSummaryForAI() {
      if (!weatherData) return '';
      const cur = weatherData.current;
      const info = getWeatherInfo(cur.code);
      let summary = `Current weather: ${info.label}, ${cur.temp}${cur.unit}, humidity ${cur.humidity}%, wind ${cur.wind} km/h.`;
      if (weatherData.daily && weatherData.daily.length > 0) {
        const today = weatherData.daily[0];
        summary += ` Today: high ${today.high}${cur.unit}, low ${today.low}${cur.unit}, ${today.rainChance}% chance of rain.`;
      }
      return summary;
    }

    async function fetchDailyBriefing() {
      const today = todayStr();
      const activeTasks = tasks.filter(t => t.status !== 'completed');
      briefingLoading = true;
      render();
      try {
        const payload = activeTasks.map(t => ({
          text: t.text, priority: t.priority, category: t.category, status: t.status,
          date: t.date || null
        }));
        const weather = getWeatherSummaryForAI();
        const result = await api('/ai/daily-briefing', {
          method: 'POST',
          body: JSON.stringify({ tasks: payload, today, weather })
        });
        briefingData = result.briefing;
        briefingLoading = false;
        briefingError = false;
        briefingDismissedToday = false;
        // Cache
        localStorage.setItem(BRIEFING_CACHE_KEY, JSON.stringify({
          date: today, briefing: briefingData, taskHash: getTasksHash()
        }));
        localStorage.removeItem('briefing_dismissed');
      } catch (err) {
        console.error('Briefing error:', err);
        briefingData = null;
        briefingLoading = false;
        briefingError = true;
      }
      render();
    }

    function dismissBriefing() {
      briefingDismissedToday = true;
      localStorage.setItem('briefing_dismissed', todayStr());
      render();
    }

    function refreshBriefing() {
      fetchDailyBriefing();
    }

    function renderWeatherHtml() {
      if (weatherLoading) {
        return `<div class="weather-strip weather-strip--muted">
          <span class="weather-icon">&#127777;&#65039;</span>
          <span class="weather-details">Loading weather...</span>
        </div>`;
      }
      if (weatherError) {
        const msgs = { permission: 'Location access needed', timeout: 'Location timed out', network: 'Weather unavailable' };
        return `<div class="weather-strip weather-strip--muted">
          <span class="weather-icon">&#127777;&#65039;</span>
          <span class="weather-details">${msgs[weatherError] || 'Weather unavailable'}</span>
          <button class="briefing-refresh" onclick="retryWeather()" style="margin-left:auto">Retry</button>
        </div>`;
      }
      if (!weatherData) return '';
      const cur = weatherData.current;
      const info = getWeatherInfo(cur.code);
      const DAYS_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      let forecastHtml = '';
      if (weatherData.daily && weatherData.daily.length > 1) {
        forecastHtml = '<div class="weather-forecast">' +
          weatherData.daily.slice(1).map(d => {
            const dInfo = getWeatherInfo(d.code);
            const dt = new Date(d.date + 'T00:00:00');
            return `<div class="weather-day">
              <span class="weather-icon">${dInfo.icon}</span>
              <div>${DAYS_SHORT[dt.getDay()]}</div>
              <div>${d.high}/${d.low}</div>
              ${d.rainChance > 20 ? `<div class="rain-chance">${d.rainChance}%</div>` : ''}
            </div>`;
          }).join('') + '</div>';
      }
      const todayDaily = weatherData.daily?.[0];
      const rainWarn = todayDaily && todayDaily.rainChance > 40
        ? `<span class="weather-bad-tag">${todayDaily.rainChance}% rain</span>` : '';
      return `<div class="weather-strip">
        <div class="weather-now">
          <span class="weather-icon">${info.icon}</span>
          ${cur.temp}${cur.unit}${rainWarn}
        </div>
        <div class="weather-details">
          ${info.label}<br>
          Wind ${cur.wind} km/h &middot; Humidity ${cur.humidity}%
        </div>
        ${forecastHtml}
      </div>`;
    }

    async function suggestLocation() {
      const textEl = document.getElementById('taskText');
      const locEl = document.getElementById('taskLocation');
      const btn = document.getElementById('locationSuggestBtn');
      const text = textEl.value.trim();
      if (!text) { toast('Enter a task description first'); return; }
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner" style="width:12px;height:12px;border-width:1.5px;margin:0"></span> Thinking...';
      try {
        const result = await api('/ai/infer-location', {
          method: 'POST',
          body: JSON.stringify({ text })
        });
        if (result.location) {
          locEl.value = result.location;
          toast('Location suggested: ' + result.location);

    function matchesFilters(task) {
      if (currentView === 'week' && filters.day !== 'all') {
        const taskDay = dayKeyFromDate(task.date);
        if (taskDay !== filters.day) return false;
      }
      if (filters.priority !== 'all' && task.priority !== filters.priority) return false;
      if (filters.category !== 'all' && task.category !== filters.category) return false;
      if (filters.status !== 'all' && task.status !== filters.status) return false;
      if (filters.owner === 'mine' && task.createdBy != currentUser?.id) return false;
      if (filters.owner === 'assigned' && !(task.assignedTo || []).some(uid => uid == currentUser?.id)) return false;
      return true;
    }

    function getDailyQuote() {
      const today = todayStr();
      const cacheKey = 'reminder_qotd';
      try {
        const cached = JSON.parse(localStorage.getItem(cacheKey) || 'null');
        if (cached && cached.date === today) return cached.quote;
      } catch {}
      // Deterministic pick based on date
      const seed = today.split('-').join('');
      const idx = parseInt(seed, 10) % QUOTES.length;
      const quote = QUOTES[idx];
      localStorage.setItem(cacheKey, JSON.stringify({ date: today, quote }));
      return quote;
    }

    // ── Calendar view ──
    function renderCalendarView(app) {
      const today = todayStr();
      // Build calendar grid data
      const firstDay = new Date(calYear, calMonth, 1);
      const lastDay = new Date(calYear, calMonth + 1, 0);
      // Monday = 0 in our grid. JS: Sun=0,Mon=1...Sat=6 → shift so Mon=0
      let startDow = (firstDay.getDay() + 6) % 7; // 0=Mon
      const daysInMonth = lastDay.getDate();

      // Cells: fill leading days from prev month
      const cells = [];
      const prevMonthLast = new Date(calYear, calMonth, 0);
      for (let i = startDow - 1; i >= 0; i--) {
        const d = new Date(calYear, calMonth, 0 - i);
        cells.push({ date: toDateStr(d), day: d.getDate(), outside: true });
      }
      for (let i = 1; i <= daysInMonth; i++) {
        const d = new Date(calYear, calMonth, i);
        cells.push({ date: toDateStr(d), day: i, outside: false });
      }
      // Fill trailing days
      const remain = 7 - (cells.length % 7);
      if (remain < 7) {
        for (let i = 1; i <= remain; i++) {
          const d = new Date(calYear, calMonth + 1, i);
          cells.push({ date: toDateStr(d), day: i, outside: true });
        }
      }

      // Task counts per date
      const tasksByDate = {};
      tasks.forEach(t => {
        if (!tasksByDate[t.date]) tasksByDate[t.date] = [];
        tasksByDate[t.date].push(t);
      });

      // Day labels row
      const dayLabelsHtml = DAY_LABELS_SHORT.map((l, i) =>
        `<div class="calendar-day-label${i >= 5 ? ' weekend-label' : ''}">${l}</div>`
      ).join('');

      // Cells
      const cellsHtml = cells.map(c => {
        const isToday = c.date === today;
        const isSelected = c.date === selectedDate;
        const isWeekend = [0, 6].includes(new Date(c.date + 'T00:00:00').getDay());
        const dateTasks = tasksByDate[c.date] || [];
        const activeTasks = dateTasks.filter(t => t.status !== 'completed');

        let classes = 'calendar-cell';
        if (c.outside) classes += ' outside';
        if (isWeekend && !c.outside) classes += ' weekend-cell';
        if (isToday) classes += ' today';
        if (isSelected) classes += ' selected';

        // Priority dots (max 5 shown)
        const dots = activeTasks.slice(0, 5).map(t =>
          `<span class="cal-dot ${t.priority}"></span>`
        ).join('');

        const countLabel = activeTasks.length > 5
          ? `<div class="cal-task-count">+${activeTasks.length - 5} more</div>` : '';

        return `<div class="${classes}" onclick="selectCalDate('${c.date}')">
          <div class="cal-date">${c.day}</div>
          <div class="cal-dots">${dots}</div>
          ${countLabel}
        </div>`;
      }).join('');

      // Selected date tasks panel
      let panelHtml = '';
      if (selectedDate) {
        const selTasks = (tasksByDate[selectedDate] || []).filter(matchesFilters);
        const dayInfo = DAYS.find(d => d.key === dayKeyFromDate(selectedDate));
        const isWeekend = dayInfo && dayInfo.weekend;

        const panelTitle = parseDateNice(selectedDate);
        const activeCount = selTasks.filter(t => t.status !== 'completed').length;
        const highCount = selTasks.filter(t => t.priority === 'high' && t.status !== 'completed').length;
        const summaryParts = [`${activeCount} task${activeCount !== 1 ? 's' : ''}`];
        if (highCount > 0) summaryParts.push(`${highCount} high priority`);

        const taskListHtml = selTasks.length === 0
          ? `<div class="empty-state">
               <p>No tasks for ${parseDateNice(selectedDate)} yet \u2014 add one</p>
               <button class="btn btn-sm btn-primary" onclick="openAddModal(null, '${selectedDate}')">Add task</button>
             </div>`
          : `<ul class="task-list">${selTasks.map(t => taskHtml(t, false)).join('')}</ul>`;

        panelHtml = `
          <div class="selected-date-panel">
            <section class="day-section${isWeekend ? ' weekend' : ''}">
              <div class="day-header">
                <div class="day-title">
                  ${panelTitle}
                  ${isWeekend ? '<span class="weekend-badge">Weekend</span>' : ''}
                </div>
                <div class="day-summary">${summaryParts.join(', ')}</div>
              </div>
              ${taskListHtml}
            </section>
          </div>`;
      }

      app.innerHTML = `
        <div class="calendar-wrapper">
          <div class="calendar-nav">
            <button class="calendar-nav-btn" onclick="navMonth(-1)" aria-label="Previous month">
              <svg width="14" height="14" viewBox="0 0 14 14"><path d="M9 3L5 7l4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
            </button>
            <div class="calendar-nav-center">
              <span class="calendar-nav-title">${MONTH_NAMES[calMonth]} ${calYear}</span>
              <button class="calendar-today-btn" onclick="goToday()">Today</button>
            </div>
            <button class="calendar-nav-btn" onclick="navMonth(1)" aria-label="Next month">
              <svg width="14" height="14" viewBox="0 0 14 14"><path d="M5 3l4 4-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
            </button>
          </div>
          <div class="calendar-grid">
            ${dayLabelsHtml}
            ${cellsHtml}
          </div>
        </div>
        ${panelHtml}`;
      // Prepend briefing card in calendar view
      const calBriefing = renderBriefingHtml();
      if (calBriefing) app.innerHTML = calBriefing + app.innerHTML;
    }

    function selectCalDate(dateStr) {
      selectedDate = (selectedDate === dateStr) ? null : dateStr;
      render();

    function navMonth(dir) {
      calMonth += dir;
      if (calMonth > 11) { calMonth = 0; calYear++; }
      if (calMonth < 0) { calMonth = 11; calYear--; }
      selectedDate = null;
      render();
    }

    function goToday() {
      const now = new Date();
      calMonth = now.getMonth();
      calYear = now.getFullYear();
      selectedDate = todayStr();
      render();
    }

    // ── Progress view helpers ──
    function getWeekDates(offset) {
      // Returns array of 7 date strings (Mon-Sun) for the week at the given offset
      const now = new Date();
      const day = now.getDay(); // 0=Sun
      const mondayOffset = day === 0 ? -6 : 1 - day;
      const monday = new Date(now);
      monday.setDate(now.getDate() + mondayOffset + (offset * 7));
      const dates = [];
      for (let i = 0; i < 7; i++) {
        const d = new Date(monday);
        d.setDate(monday.getDate() + i);
        dates.push(toDateStr(d));
      }
      return dates;
    }

    function getWeekLabel(dates) {
      const start = new Date(dates[0] + 'T00:00:00');
      const end = new Date(dates[6] + 'T00:00:00');
      const opts = { month: 'short', day: 'numeric' };
      const startStr = start.toLocaleDateString('en-US', opts);
      const endOpts = start.getMonth() === end.getMonth() ? { day: 'numeric' } : opts;
      const endStr = end.toLocaleDateString('en-US', endOpts);
      return `${startStr} \u2013 ${endStr}, ${end.getFullYear()}`;
    }

    function getWeekTasks(dates) {
      const dateSet = new Set(dates);
      return tasks.filter(t => dateSet.has(t.date));
    }

    function navProgressWeek(dir) {
      progressWeekOffset += dir;
      render();
    }

    function goThisWeek() {
      progressWeekOffset = 0;
      render();
    }

    // ── Progress view ──
    function renderProgressView(app) {
      const weekDates = getWeekDates(progressWeekOffset);
      const prevWeekDates = getWeekDates(progressWeekOffset - 1);
      const weekTasks = getWeekTasks(weekDates);
      const prevWeekTasks = getWeekTasks(prevWeekDates);
      const today = todayStr();
      const isThisWeek = progressWeekOffset === 0;

      // Week label
      const weekLabel = isThisWeek ? 'This week' : (progressWeekOffset === -1 ? 'Last week' : getWeekLabel(weekDates));
      const weekSub = getWeekLabel(weekDates);

      // Core stats
      const total = weekTasks.length;
      const completed = weekTasks.filter(t => t.status === 'completed').length;
      const active = total - completed;
      const pct = total > 0 ? Math.round((completed / total) * 100) : 0;

      const prevTotal = prevWeekTasks.length;
      const prevCompleted = prevWeekTasks.filter(t => t.status === 'completed').length;
      const prevPct = prevTotal > 0 ? Math.round((prevCompleted / prevTotal) * 100) : 0;

      // Ring color
      const ringColor = pct >= 75 ? 'var(--low)' : pct >= 40 ? 'var(--medium)' : pct > 0 ? 'var(--high)' : 'var(--border)';
      const circ = 2 * Math.PI * 42;
      const dashOffset = circ - (circ * pct / 100);

      // Daily chart data
      const dayLabels = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
      const dayData = weekDates.map((date, i) => {
        const dayTasks = weekTasks.filter(t => t.date === date);
        return {
          label: dayLabels[i],
          total: dayTasks.length,
          completed: dayTasks.filter(t => t.status === 'completed').length,
          pending: dayTasks.filter(t => t.status !== 'completed').length,
          isWeekend: i >= 5,
          isToday: date === today,
          date
        };
      });
      const maxDayTotal = Math.max(1, ...dayData.map(d => d.total));

      // Bar chart HTML
      const barsHtml = dayData.map(d => {
        const compH = d.total > 0 ? Math.round((d.completed / maxDayTotal) * 100) : 0;
        const pendH = d.total > 0 ? Math.round((d.pending / maxDayTotal) * 100) : 0;
        return `<div class="bar-col${d.isToday ? ' today-col' : ''}">
          <div class="bar-count">${d.total > 0 ? d.completed + '/' + d.total : ''}</div>
          <div class="bar-stack">
            ${d.pending > 0 ? `<div class="bar-segment pending-bar" style="height:${pendH}%"></div>` : ''}
            ${d.completed > 0 ? `<div class="bar-segment completed-bar" style="height:${compH}%"></div>` : ''}
          </div>
          <div class="bar-day-label${d.isWeekend ? ' weekend-bar' : ''}">${d.label}</div>
        </div>`;
      }).join('');

      // Priority breakdown
      const priHigh = weekTasks.filter(t => t.priority === 'high').length;
      const priMed = weekTasks.filter(t => t.priority === 'medium').length;
      const priLow = weekTasks.filter(t => t.priority === 'low').length;
      const priHighDone = weekTasks.filter(t => t.priority === 'high' && t.status === 'completed').length;
      const priMedDone = weekTasks.filter(t => t.priority === 'medium' && t.status === 'completed').length;
      const priLowDone = weekTasks.filter(t => t.priority === 'low' && t.status === 'completed').length;

      function breakdownBar(label, count, doneCount, total, color) {
        const fillPct = total > 0 ? Math.round((count / total) * 100) : 0;
        const donePct = count > 0 ? Math.round((doneCount / count) * 100) : 0;
        return `<div class="breakdown-row">
          <div class="breakdown-header">
            <span class="breakdown-label"><span class="priority-dot" style="background:${color};width:8px;height:8px"></span> ${label}</span>
            <span class="breakdown-value">${doneCount}/${count} done</span>
          </div>
          <div class="breakdown-track">
            <div class="breakdown-fill" style="width:${fillPct}%;background:${color};opacity:${donePct > 0 ? 0.3 + 0.7 * (donePct/100) : 0.3}"></div>
          </div>
        </div>`;
      }

      // Category breakdown
      const catPersonal = weekTasks.filter(t => t.category === 'personal').length;
      const catProfessional = weekTasks.filter(t => t.category === 'professional').length;
      const catPersonalDone = weekTasks.filter(t => t.category === 'personal' && t.status === 'completed').length;
      const catProfDone = weekTasks.filter(t => t.category === 'professional' && t.status === 'completed').length;

      // Week-over-week comparison
      const prevActive = prevTotal - prevCompleted;
      function delta(curr, prev) {
        const diff = curr - prev;
        if (diff === 0) return '<span class="wow-delta neutral">No change</span>';
        const arrow = diff > 0 ? '\u2191' : '\u2193';
        // For completion rate and completed, up is good
        return `<span class="wow-delta ${diff > 0 ? 'up' : 'down'}">${arrow} ${Math.abs(diff)}</span>`;
      }
      function deltaPct(curr, prev) {
        const diff = curr - prev;
        if (diff === 0) return '<span class="wow-delta neutral">No change</span>';
        const arrow = diff > 0 ? '\u2191' : '\u2193';
        return `<span class="wow-delta ${diff > 0 ? 'up' : 'down'}">${arrow} ${Math.abs(diff)}%</span>`;
      }

      // Streak: count consecutive days (up to today) where all tasks were completed
      function computeStreak() {
        let streak = 0;
        const d = new Date();
        // Start from yesterday if today has pending tasks (give credit for today only if all done)
        while (true) {
          const ds = toDateStr(d);
          const dayT = tasks.filter(t => t.date === ds);
          if (dayT.length === 0) {
            // No tasks = don't count, but also don't break streak (skip)
            d.setDate(d.getDate() - 1);
            // Limit lookback to 60 days
            if (streak === 0 && toDateStr(d) < toDateStr(new Date(Date.now() - 60*86400000))) break;
            continue;
          }
          const allDone = dayT.every(t => t.status === 'completed');
          if (allDone) { streak++; d.setDate(d.getDate() - 1); }
          else break;
        }
        return streak;
      }
      const streak = computeStreak();

      // Streak dots for current week
      const streakDotsHtml = weekDates.map((date, i) => {
        const dayT = weekTasks.filter(t => t.date === date);
        const isToday = date === today;
        const isFuture = date > today;
        let cls = 'streak-dot';
        if (isFuture) {
          // future: plain
        } else if (dayT.length === 0) {
          // no tasks
          cls += ' neutral';
        } else if (dayT.every(t => t.status === 'completed')) {
          cls += ' done';
        } else if (dayT.some(t => t.status === 'completed')) {
          cls += ' partial';
        }
        if (isToday) cls += ' today-dot';
        const label = dayLabels[i].charAt(0);
        return `<div class="${cls}">${label}</div>`;
      }).join('');

      // Busiest day
      const busiestDay = dayData.reduce((best, d) => d.total > best.total ? d : best, dayData[0]);

      app.innerHTML = `
        <div class="progress-week-nav">
          <button class="calendar-nav-btn" onclick="navProgressWeek(-1)" aria-label="Previous week">
            <svg width="14" height="14" viewBox="0 0 14 14"><path d="M9 3L5 7l4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
          </button>
          <div>
            <div class="progress-week-label">${weekLabel}</div>
            <div class="progress-week-sub">${isThisWeek ? weekSub : ''}</div>
          </div>
          <div style="display:flex;gap:6px;align-items:center">
            ${!isThisWeek ? '<button class="calendar-today-btn" onclick="goThisWeek()">This week</button>' : ''}
            <button class="calendar-nav-btn" onclick="navProgressWeek(1)" aria-label="Next week">
              <svg width="14" height="14" viewBox="0 0 14 14"><path d="M5 3l4 4-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
            </button>
          </div>
        </div>

        <!-- Completion rate -->
        <div class="progress-section">
          <div class="progress-section-title">Completion rate</div>
          <div class="ring-row">
            <div class="ring-wrap">
              <svg class="ring-svg" width="100" height="100" viewBox="0 0 100 100">
                <circle class="ring-bg" cx="50" cy="50" r="42"/>
                <circle class="ring-fill" cx="50" cy="50" r="42"
                  stroke="${ringColor}"
                  stroke-dasharray="${circ}"
                  stroke-dashoffset="${dashOffset}"/>
              </svg>
              <div class="ring-label">
                <div class="ring-pct" style="color:${ringColor}">${pct}%</div>
                <div class="ring-sub">Done</div>
              </div>
            </div>
            <div class="ring-stats">
              <div class="ring-stat-row"><span class="ring-stat-label">Total tasks</span><span class="ring-stat-value">${total}</span></div>
              <div class="ring-stat-row"><span class="ring-stat-label">Completed</span><span class="ring-stat-value" style="color:var(--low)">${completed}</span></div>
              <div class="ring-stat-row"><span class="ring-stat-label">Remaining</span><span class="ring-stat-value" style="color:var(--medium)">${active}</span></div>
              <div class="ring-stat-row"><span class="ring-stat-label">Busiest day</span><span class="ring-stat-value">${busiestDay.total > 0 ? busiestDay.label + ' (' + busiestDay.total + ')' : '\u2014'}</span></div>
            </div>
          </div>
        </div>

        <!-- Daily breakdown chart -->
        <div class="progress-section">
          <div class="progress-section-title">Daily breakdown</div>
          <div class="bar-chart">${barsHtml}</div>
        </div>

        <!-- Priority & category -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
          <div class="progress-section">
            <div class="progress-section-title">By priority</div>
            ${breakdownBar('High', priHigh, priHighDone, total, 'var(--high)')}
            ${breakdownBar('Medium', priMed, priMedDone, total, 'var(--medium)')}
            ${breakdownBar('Low', priLow, priLowDone, total, 'var(--low)')}
          </div>
          <div class="progress-section">
            <div class="progress-section-title">By category</div>
            ${breakdownBar('Personal', catPersonal, catPersonalDone, total, 'var(--personal)')}
            ${breakdownBar('Professional', catProfessional, catProfDone, total, 'var(--professional)')}
          </div>
        </div>

        <!-- Streak -->
        <div class="progress-section">
          <div class="progress-section-title">Completion streak</div>
          <div class="streak-row">
            <div class="streak-number">${streak}</div>
            <div class="streak-text"><strong>${streak === 1 ? '1 day' : streak + ' days'}</strong> with all tasks completed</div>
          </div>
          <div class="streak-dots">${streakDotsHtml}</div>
        </div>

        <!-- Week-over-week -->
        <div class="progress-section">
          <div class="progress-section-title">Compared to previous week</div>
          <div class="wow-grid">
            <div class="wow-card">
              <div class="wow-value">${total}</div>
              <div class="wow-label">Total tasks</div>
              ${delta(total, prevTotal)}
            </div>
            <div class="wow-card">
              <div class="wow-value" style="color:var(--low)">${completed}</div>
              <div class="wow-label">Completed</div>
              ${delta(completed, prevCompleted)}
            </div>
            <div class="wow-card">
              <div class="wow-value" style="color:${ringColor}">${pct}%</div>
              <div class="wow-label">Completion rate</div>
              ${deltaPct(pct, prevPct)}
            </div>
            <div class="wow-card">
              <div class="wow-value" style="color:var(--medium)">${active}</div>
              <div class="wow-label">Remaining</div>
              ${delta(active, prevActive)}
            </div>
          </div>
        </div>
      `;
      // Prepend briefing card in progress view
      const progBriefing = renderBriefingHtml();
      if (progBriefing) app.innerHTML = progBriefing + app.innerHTML;
    }

    // ── Health view (Coming Soon) ──
    function renderHealthView(app) {

          <div style="margin-top:28px;padding:14px 20px;background:var(--accent-light);border-radius:var(--radius-sm);font-size:0.8125rem;color:var(--accent);font-weight:600">

    // ── All tasks view ──
    function setAllSort(sort) {
      allSort = sort;
      if (sort === 'themes' && themeCache.hash !== getTasksHash()) {
        fetchThemeGroups();
        return;
      }
      render();
    }

    function renderAllView(app) {
      const PRIORITY_ORDER = { high: 0, medium: 1, low: 2 };
      const filtered = tasks.filter(matchesFilters);
      const active = filtered.filter(t => t.status !== 'completed');
      const completed = filtered.filter(t => t.status === 'completed');

      // Stats
      const totalAll = tasks.length;
      const totalActive = tasks.filter(t => t.status !== 'completed').length;
      const totalCompleted = tasks.filter(t => t.status === 'completed').length;
      const highActive = tasks.filter(t => t.status !== 'completed' && t.priority === 'high').length;
      const personalCount = tasks.filter(t => t.status !== 'completed' && t.category === 'personal').length;
      const professionalCount = tasks.filter(t => t.status !== 'completed' && t.category === 'professional').length;

      // Sort active tasks
      const sorted = [...active].sort((a, b) => {
        if (allSort === 'date') return a.date.localeCompare(b.date);
        if (allSort === 'priority') return PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
        if (allSort === 'category') return a.category.localeCompare(b.category);
        return 0;
      });

      const completedSorted = [...completed].sort((a, b) => a.date.localeCompare(b.date));

      // Group helper for date sort: insert date dividers
      function buildGroupedHtml(list) {
        if (list.length === 0) return '';
        if (allSort === 'themes') {
          // Theme grouping mode
          if (themeCache.loading) {
            return `<div class="theme-loading"><div class="spinner"></div><br>Grouping tasks by theme...</div>`;
          }
          if (themeCache.groups.length === 0) {
            // Not enough tasks or no groups - show ungrouped
            return `<div class="day-section"><ul class="task-list">${list.map(t => taskHtml(t, true)).join('')}</ul></div>`;
          }
          let html = '';
          const assigned = new Set();
          for (const group of themeCache.groups) {
            const groupTasks = list.filter(t => group.taskIds.includes(t.id));
            if (groupTasks.length === 0) continue;
            groupTasks.forEach(t => assigned.add(t.id));
            html += `<div class="theme-group-header">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 3h3v3H2zM9 3h3v3H9zM2 8h3v3H2zM9 8h3v3H9z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" fill="none"/></svg>
              ${escapeHtml(group.theme)}
              <span class="theme-count">${groupTasks.length} task${groupTasks.length !== 1 ? 's' : ''}</span>
            </div>`;
            html += `<ul class="task-list">${groupTasks.map(t => taskHtml(t, true)).join('')}</ul>`;
          }
          // Any unassigned tasks
          const unassigned = list.filter(t => !assigned.has(t.id));
          if (unassigned.length > 0) {
            html += `<div class="theme-group-header">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.3" fill="none"/><path d="M7 5v4M5 7h4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
              Other
              <span class="theme-count">${unassigned.length} task${unassigned.length !== 1 ? 's' : ''}</span>
            </div>`;
            html += `<ul class="task-list">${unassigned.map(t => taskHtml(t, true)).join('')}</ul>`;
          }
          return `<div class="day-section">${html}</div>`;
        }
        if (allSort === 'date') {
          let html = '';
          let lastDate = '';
          for (const t of list) {
            if (t.date !== lastDate) {
              lastDate = t.date;
              const dayInfo = DAYS.find(d => d.key === dayKeyFromDate(t.date));
              const isWeekend = dayInfo && dayInfo.weekend;
              const dateLabel = parseDateNice(t.date);
              html += `<div class="all-section-label" style="margin-top:${html ? '20px' : '0'}">${dateLabel}${isWeekend ? ' <span class="weekend-badge" style="margin-left:6px">Weekend</span>' : ''}</div>`;
            }
            html += taskHtml(t, false);
          }
          return `<div class="day-section"><ul class="task-list">${html}</ul></div>`;
        }
        if (allSort === 'priority') {
          let html = '';
          let lastPri = '';
          for (const t of list) {
            if (t.priority !== lastPri) {
              lastPri = t.priority;
              html += `<div class="all-section-label" style="margin-top:${html ? '20px' : '0'}">${lastPri} priority</div>`;
            }
            html += taskHtml(t, true);
          }
          return `<div class="day-section"><ul class="task-list">${html}</ul></div>`;
        }
        if (allSort === 'category') {
          let html = '';
          let lastCat = '';
          for (const t of list) {
            if (t.category !== lastCat) {
              lastCat = t.category;
              html += `<div class="all-section-label" style="margin-top:${html ? '20px' : '0'}">${lastCat}</div>`;
            }
            html += taskHtml(t, true);
          }
          return `<div class="day-section"><ul class="task-list">${html}</ul></div>`;
        }
        return `<div class="day-section"><ul class="task-list">${list.map(t => taskHtml(t, true)).join('')}</ul></div>`;
      }

      const activeHtml = sorted.length > 0
        ? buildGroupedHtml(sorted)
        : `<div class="day-section"><div class="empty-state"><p>No active tasks \u2014 everything is done, or add a new one</p><button class="btn btn-sm btn-primary" onclick="openAddModal()">Add task</button></div></div>`;

      const completedHtml = completedSorted.length > 0
        ? `<div class="all-section-label completed-label">Completed (${completedSorted.length})</div>
           <div class="day-section"><ul class="task-list">${completedSorted.map(t => taskHtml(t, true)).join('')}</ul></div>`
        : '';

      app.innerHTML = `
        <div class="all-stats all-stats--inline">
          <div class="stat-card">
            <div class="stat-value accent">${totalAll}</div>
            <div class="stat-label">Total tasks</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${totalActive}</div>
            <div class="stat-label">Active</div>
          </div>
          <div class="stat-card">
            <div class="stat-value done-color">${totalCompleted}</div>
            <div class="stat-label">Completed</div>
          </div>
          <div class="stat-card">
            <div class="stat-value high-color">${highActive}</div>
            <div class="stat-label">High priority</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" style="color:var(--personal)">${personalCount}</div>
            <div class="stat-label">Personal</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" style="color:var(--professional)">${professionalCount}</div>
            <div class="stat-label">Professional</div>
          </div>
        </div>

        ${renderBriefingHtml()}

        <div class="all-sort-bar">
          <span>Sort by</span>
          <button class="sort-chip${allSort==='date'?' active':''}" onclick="setAllSort('date')">Date</button>
          <button class="sort-chip${allSort==='priority'?' active':''}" onclick="setAllSort('priority')">Priority</button>
          <button class="sort-chip${allSort==='category'?' active':''}" onclick="setAllSort('category')">Category</button>
          <button class="sort-chip${allSort==='themes'?' active':''}" onclick="setAllSort('themes')">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none" style="vertical-align:-1px"><path d="M1.5 2.5h3v3h-3zM7.5 2.5h3v3h-3zM1.5 6.5h3v3h-3zM7.5 6.5h3v3h-3z" stroke="currentColor" stroke-width="1" stroke-linecap="round" fill="none"/></svg>
            Themes
          </button>
        </div>

        <div class="all-section-label">Active (${active.length})</div>
        ${activeHtml}
        ${completedHtml}`;
    }

    // ── Task HTML ──
    function taskHtml(task, showDate) {
      const dateInfo = showDate ? `<span class="date-label">${formatShort(task.date)}</span>` : '';
      const statusLabel = STATUS_LABELS[task.status] || 'Not started';

      // Assignee chips
      const assignees = (task.assignedTo || []).map(uid => getUserById(uid)).filter(Boolean);
      const creator = getUserById(task.createdBy);
      let assigneeHtml = '';
      if (assignees.length > 0) {
        assigneeHtml = `<span class="task-assignees">${assignees.map(u =>
          `<span class="assignee-chip"><span class="user-avatar sm" style="background:${u.color};width:16px;height:16px;font-size:0.5rem">${getUserInitials(u)}</span>${escapeHtml(u.name.split(' ')[0])}</span>`
        ).join('')}</span>`;
      }

      // Creator label
      const creatorLabel = creator && creator.id !== currentUser?.id
        ? `<span class="date-label">by ${escapeHtml(creator.name.split(' ')[0])}</span>` : '';

      return `
        <li class="task-item status-${task.status}" data-id="${task.id}">
          <span class="priority-dot ${task.priority}" title="${task.priority} priority"></span>
          <button class="status-badge ${task.status}" onclick="cycleStatus('${task.id}')" title="Click to change status">
            <span class="status-badge-dot"></span>
            ${statusLabel}
          </button>
          <div class="task-body">
            <div class="task-text">${escapeHtml(task.text)}</div>
            <div class="task-meta">
              <span class="tag ${task.category}">${task.category}</span>
              <span class="priority-label">${task.priority}</span>
              ${dateInfo}
              ${task.locationText ? `<span class="location-badge"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M5 1C3.3 1 2 2.3 2 4c0 2.5 3 5 3 5s3-2.5 3-5c0-1.7-1.3-3-3-3z" stroke="currentColor" stroke-width="1" fill="none"/><circle cx="5" cy="4" r="1" fill="currentColor"/></svg>${escapeHtml(task.locationText)}</span>` : ''}
              ${creatorLabel}
              ${assigneeHtml}
            </div>
          </div>
          <div class="task-actions">
            <button class="btn-icon" onclick="openShareModal('${task.id}')" aria-label="Share task" title="Share / Assign">
              <svg width="16" height="16" viewBox="0 0 16 16"><path d="M4 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zM12 5c.8 0 1.5-.7 1.5-1.5S12.8 2 12 2s-1.5.7-1.5 1.5S11.2 5 12 5zM12 11c-.8 0-1.5.7-1.5 1.5s.7 1.5 1.5 1.5 1.5-.7 1.5-1.5-.7-1.5-1.5-1.5zM5.7 6.8l4.6-2.6M5.7 9.2l4.6 2.6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/></svg>
            </button>
            <button class="btn-icon" onclick="openEditModal('${task.id}')" aria-label="Edit task" title="Edit task">
              <svg width="16" height="16" viewBox="0 0 16 16"><path d="M11.5 1.5l3 3-9 9H2.5v-3l9-9z" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <button class="btn-icon btn-danger" onclick="requestDelete('${task.id}')" aria-label="Delete task" title="Delete task">
              <svg width="16" height="16" viewBox="0 0 16 16"><path d="M3 4h10M6 4V3a1 1 0 011-1h2a1 1 0 011 1v1M5 4v9a1 1 0 001 1h4a1 1 0 001-1V4" stroke="currentColor" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </div>
        </li>`;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ── Task CRUD ──
    const STATUS_CYCLE = ['not_started', 'in_progress', 'on_hold', 'completed'];
    async function cycleStatus(id) {
      id = Number(id);
      const task = tasks.find(t => t.id == id);
      if (!task) return;
      const idx = STATUS_CYCLE.indexOf(task.status);
      const newStatus = STATUS_CYCLE[(idx + 1) % STATUS_CYCLE.length];
      try {
        await api('/tasks/' + task.id + '/status', {
          method: 'PUT',
          body: JSON.stringify({ status: newStatus })
        });
        task.status = newStatus;
        render();
        toast('Status: ' + STATUS_LABELS[newStatus]);
        scheduleThemeRefresh();
      } catch (err) {
        toast(err.message || 'Failed to update status');
      }
    }

    function requestDelete(id) {
      id = Number(id);
      pendingConfirm = async () => {
        try {
          await api('/tasks/' + id, { method: 'DELETE' });
          tasks = tasks.filter(t => t.id !== id);
          render();
          toast('Task deleted');
          scheduleThemeRefresh();
        } catch (err) {
          toast(err.message || 'Failed to delete task');
        }
      };
      document.getElementById('confirmMessage').textContent = 'Delete this task? This cannot be undone.';
      document.getElementById('confirmBtn').textContent = 'Delete';
      document.getElementById('confirmModal').classList.add('open');
    }

    function confirmAction() {
      if (pendingConfirm) pendingConfirm();
      pendingConfirm = null;
      closeConfirm();
    }

    function closeConfirm() {
      document.getElementById('confirmModal').classList.remove('open');
    }

    function renderAssignPicker(selectedIds) {
      const picker = document.getElementById('assignPicker');
      const sel = new Set(selectedIds || []);
      picker.innerHTML = users.map(u => {
        const isSelected = sel.has(u.id);
        return `<div class="assign-option${isSelected ? ' selected' : ''}" data-user-id="${u.id}" onclick="toggleAssignOption(this)">
          <span class="user-avatar sm" style="background:${u.color};width:18px;height:18px;font-size:0.5rem">${getUserInitials(u)}</span>
          ${escapeHtml(u.name.split(' ')[0])}
        </div>`;
      }).join('') || '<span style="color:var(--text-muted);font-size:0.8125rem">No users yet</span>';
    }
    function toggleAssignOption(el) {
      el.classList.toggle('selected');
    }

    // ── Modal ──
    function openAddModal(presetDayKey, presetDate) {
      editingId = null;
      document.getElementById('modalTitle').textContent = 'Add task';
      document.getElementById('modalSubmitBtn').textContent = 'Add task';
      document.getElementById('taskForm').reset();

      // Set date
      if (presetDate) {
        document.getElementById('taskDate').value = presetDate;
      } else if (presetDayKey) {
        document.getElementById('taskDate').value = getNextDateForDay(presetDayKey);
      } else {
        document.getElementById('taskDate').value = todayStr();
      }

      // Reset segmented controls
      document.querySelector('input[name="priority"][value="medium"]').checked = true;
      document.querySelector('input[name="category"][value="personal"]').checked = true;
      document.querySelector('input[name="status"][value="not_started"]').checked = true;
      renderAssignPicker([]);
      document.getElementById('taskLocation').value = '';
      document.getElementById('taskLocationLat').value = '';
      document.getElementById('taskLocationLng').value = '';
      document.getElementById('locationPinWrap').style.display = isNativeApp() ? '' : 'none';

      document.getElementById('taskModal').classList.add('open');
      setTimeout(() => document.getElementById('taskText').focus(), 100);
    }

    function openEditModal(id) {
      id = Number(id);
      const task = tasks.find(t => t.id == id);
      if (!task) return;
      editingId = id;
      document.getElementById('modalTitle').textContent = 'Edit task';
      document.getElementById('modalSubmitBtn').textContent = 'Save changes';
      document.getElementById('taskText').value = task.text;
      document.getElementById('taskDate').value = task.date;
      document.querySelector(`input[name="priority"][value="${task.priority}"]`).checked = true;
      document.querySelector(`input[name="category"][value="${task.category}"]`).checked = true;
      document.querySelector(`input[name="status"][value="${task.status || 'not_started'}"]`).checked = true;
      renderAssignPicker(task.assignedTo || []);
      document.getElementById('taskLocation').value = task.locationText || '';
      document.getElementById('taskLocationLat').value = task.locationLat || '';
      document.getElementById('taskLocationLng').value = task.locationLng || '';
      document.getElementById('locationPinWrap').style.display = isNativeApp() ? '' : 'none';
      document.getElementById('taskModal').classList.add('open');
      setTimeout(() => document.getElementById('taskText').focus(), 100);
    }

    function closeModal() {
      document.getElementById('taskModal').classList.remove('open');
      editingId = null;
    }

    async function handleSubmit(e) {
      e.preventDefault();
      const text = document.getElementById('taskText').value.trim();
      if (!text) return;

      const date = document.getElementById('taskDate').value || todayStr();
      const priority = document.querySelector('input[name="priority"]:checked').value;
      const category = document.querySelector('input[name="category"]:checked').value;
      const status = document.querySelector('input[name="status"]:checked').value;
      const locationText = document.getElementById('taskLocation').value.trim() || null;
      const locationLat = document.getElementById('taskLocationLat').value ? parseFloat(document.getElementById('taskLocationLat').value) : null;
      const locationLng = document.getElementById('taskLocationLng').value ? parseFloat(document.getElementById('taskLocationLng').value) : null;

      // Collect assigned users from picker
      const assignedTo = [];
      document.querySelectorAll('#assignPicker .assign-option.selected').forEach(el => {
        assignedTo.push(Number(el.dataset.userId));
      });

      try {
        if (editingId) {
          const updated = await api('/tasks/' + editingId, {
            method: 'PUT',
            body: JSON.stringify({ text, date, priority, category, status, assignedTo, locationText, locationLat, locationLng })
          });
          const idx = tasks.findIndex(t => t.id == editingId);
          if (idx >= 0) tasks[idx] = updated;
          toast('Task updated');
        } else {
          const created = await api('/tasks', {
            method: 'POST',
            body: JSON.stringify({ text, date, priority, category, status, assignedTo, locationText, locationLat, locationLng })
          });
          tasks.push(created);
          toast('Task added');
        }
        closeModal();
        render();
        scheduleThemeRefresh();
      } catch (err) {
        toast(err.message || 'Failed to save task');
      }
    }

    // Close modals
    document.getElementById('taskModal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeModal();
    });
    document.getElementById('confirmModal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeConfirm();
    });
    document.getElementById('shareModal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeShareModal();
    });
    document.getElementById('manageUsersModal').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeManageUsers();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') { closeModal(); closeConfirm(); closeShareModal(); closeManageUsers(); closeNotificationPanel(); }
    });

    // ── Toast ──
    function toast(message) {
      const container = document.getElementById('toasts');
      const el = document.createElement('div');
      el.className = 'toast';
      el.textContent = message;
      container.appendChild(el);
      setTimeout(() => {
        el.style.opacity = '0';
        el.style.transition = 'opacity 200ms';
        setTimeout(() => el.remove(), 200);
      }, 2000);
    }

    // ── Notifications ──
    function getNotifications() {
      const today = todayStr();
      const notifs = [];
      tasks.forEach(t => {
        if (t.status === 'completed') return;
        if (t.date < today) {
          notifs.push({ type: 'overdue', task: t, label: 'Overdue' });
        } else if (t.date === today) {
          notifs.push({ type: 'due-today', task: t, label: 'Due today' });
        }
      });
      notifs.sort((a, b) => {
        if (a.type === 'overdue' && b.type !== 'overdue') return -1;
        if (a.type !== 'overdue' && b.type === 'overdue') return 1;
        return a.task.date.localeCompare(b.task.date);
      });
      return notifs;
    }

    function getUpcomingNotifications() {
      const today = todayStr();
      const d = new Date();
      d.setDate(d.getDate() + 3);
      const limit = toDateStr(d);
      return tasks
        .filter(t => t.status !== 'completed' && t.date > today && t.date <= limit)
        .sort((a, b) => a.date.localeCompare(b.date))
        .map(t => ({ type: 'upcoming', task: t, label: formatShort(t.date) }));
    }

    function updateNotificationBell() {
      const notifs = getNotifications();
      const badge = document.getElementById('notifBadge');
      if (!badge) return;
      const count = notifs.length;
      badge.textContent = count > 99 ? '99+' : count;
      badge.style.display = count > 0 ? '' : 'none';
    }

    function toggleNotificationPanel(e) {
      e.stopPropagation();
      const dd = document.getElementById('notifDropdown');
      const isOpen = dd.classList.contains('open');
      closeUserDropdown();
      if (isOpen) { dd.classList.remove('open'); return; }
      renderNotificationDropdown();
      dd.classList.add('open');
    }

    function closeNotificationPanel() {
      const dd = document.getElementById('notifDropdown');
      if (dd) dd.classList.remove('open');
    }

    function renderNotificationDropdown() {
      const notifs = getNotifications();
      const upcoming = getUpcomingNotifications();
      const dd = document.getElementById('notifDropdown');
      if (!dd) return;

      let html = '<div class="notif-header"><span>Notifications</span><span style="font-size:0.75rem;font-weight:500;color:var(--text-muted)">' +
        notifs.length + ' alert' + (notifs.length !== 1 ? 's' : '') + '</span></div>';

      if (notifs.length === 0 && upcoming.length === 0) {
        html += '<div class="notif-empty"><div class="notif-empty-icon"><svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M11 2l2.09 6.26L20 9.27l-5 3.89L16.18 20 11 16.77 5.82 20 7 13.16l-5-3.89 6.91-1.01L11 2z" stroke="var(--text-muted)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg></div>All caught up! No pending alerts.</div>';
      } else {
        const allItems = [...notifs, ...upcoming];
        html += allItems.map(n => {
          const icon = n.type === 'overdue'
            ? '<svg width="14" height="14" viewBox="0 0 14 14"><path d="M7 1v7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="7" cy="11" r="1" fill="currentColor"/></svg>'
            : n.type === 'due-today'
            ? '<svg width="14" height="14" viewBox="0 0 14 14"><circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M7 4v3.5l2.5 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>'
            : '<svg width="14" height="14" viewBox="0 0 14 14"><path d="M1 7h12M8 3l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
          const dateLabel = n.type === 'overdue' ? formatShort(n.task.date) : n.type === 'due-today' ? 'Today' : n.label;
          const typeLabel = n.type === 'overdue' ? 'Overdue' : n.type === 'due-today' ? 'Due today' : 'Upcoming';
          return '<div class="notif-item"><div class="notif-item-icon ' + n.type + '">' + icon + '</div>' +
            '<div class="notif-item-body"><div class="notif-item-text">' + escapeHtml(n.task.text) + '</div>' +
            '<div class="notif-item-meta"><span class="priority-dot ' + n.task.priority + '" style="width:6px;height:6px"></span> ' +
            n.task.priority + ' &middot; ' + typeLabel + ' &middot; ' + dateLabel + '</div></div></div>';
        }).join('');
      }

      if ('Notification' in window && Notification.permission === 'default') {
        html += '<button class="notif-enable-btn" onclick="requestNotifPermission()">Enable browser notifications</button>';
      }
      dd.innerHTML = html;
    }

    async function requestNotifPermission() {
      if ('Notification' in window) {
        const perm = await Notification.requestPermission();
        if (perm === 'granted') {
          toast('Browser notifications enabled');
          sendBrowserNotifications();
        }
        renderNotificationDropdown();
      }
    }

    function sendBrowserNotifications() {
      if (!('Notification' in window) || Notification.permission !== 'granted') return;
      const notifs = getNotifications();
      if (notifs.length === 0) return;
      const overdue = notifs.filter(n => n.type === 'overdue').length;
      const dueToday = notifs.filter(n => n.type === 'due-today').length;
      let body = '';
      if (overdue > 0) body += overdue + ' overdue task' + (overdue > 1 ? 's' : '');
      if (overdue > 0 && dueToday > 0) body += ', ';
      if (dueToday > 0) body += dueToday + ' task' + (dueToday > 1 ? 's' : '') + ' due today';
      new Notification('Smart Reminder', { body, icon: 'icons/icon-192.png', tag: 'reminder-alerts' });
    }

    function initNotifications() {
      updateNotificationBell();
      if ('Notification' in window && Notification.permission === 'granted') {
        sendBrowserNotifications();
      }
      setInterval(() => { updateNotificationBell(); sendBrowserNotifications(); }, 30 * 60 * 1000);
      // Schedule native push notifications for mobile
      initNativePushNotifications();
    }

    // ── Native push notifications (Capacitor) ──
    async function initNativePushNotifications() {
      if (!isNativeApp()) return;
      try {
        const { LocalNotifications } = await import('https://esm.sh/@capacitor/local-notifications@6');
        const perm = await LocalNotifications.requestPermissions();
        if (perm.display !== 'granted') return;

        // Cancel old scheduled notifications and reschedule
        const pending = await LocalNotifications.getPending();
        if (pending.notifications.length > 0) {
          await LocalNotifications.cancel(pending);
        }
        await scheduleTaskNotifications(LocalNotifications);

        // Reschedule on app resume
        document.addEventListener('resume', async () => {
          const p = await LocalNotifications.getPending();
          if (p.notifications.length > 0) await LocalNotifications.cancel(p);
          await scheduleTaskNotifications(LocalNotifications);
        });
      } catch (err) {
        console.log('Native push notifications not available:', err.message);
      }
    }

    async function scheduleTaskNotifications(LocalNotifications) {
      const today = todayStr();
      const tomorrow = (() => { const d = new Date(); d.setDate(d.getDate() + 1); return toDateStr(d); })();
      const notifications = [];
      let id = 10000;

      // Overdue tasks - immediate notification
      const overdue = tasks.filter(t => t.status !== 'completed' && t.date && t.date < today);
      if (overdue.length > 0) {
        notifications.push({
          id: id++,
          title: 'Overdue Tasks',
          body: `${overdue.length} overdue: ${overdue.slice(0, 2).map(t => t.text).join(', ')}${overdue.length > 2 ? ' +more' : ''}`,
          smallIcon: 'ic_launcher',
          largeIcon: 'ic_launcher',
          schedule: { at: new Date(Date.now() + 2000) }
        });
      }

      // Due today - immediate notification
      const dueToday = tasks.filter(t => t.status !== 'completed' && t.date === today);
      if (dueToday.length > 0) {
        notifications.push({
          id: id++,
          title: 'Tasks Due Today',
          body: `${dueToday.length} task${dueToday.length > 1 ? 's' : ''}: ${dueToday.slice(0, 2).map(t => t.text).join(', ')}${dueToday.length > 2 ? ' +more' : ''}`,
          smallIcon: 'ic_launcher',
          largeIcon: 'ic_launcher',
          schedule: { at: new Date(Date.now() + 4000) }
        });
      }

      // High priority due today - individual notifications
      const highToday = dueToday.filter(t => t.priority === 'high');
      for (const t of highToday.slice(0, 3)) {
        notifications.push({
          id: id++,
          title: 'High Priority',
          body: t.text,
          smallIcon: 'ic_launcher',
          largeIcon: 'ic_launcher',
          schedule: { at: new Date(Date.now() + 6000) }
        });
      }

      // Tomorrow morning reminder at 8 AM
      const dueTomorrow = tasks.filter(t => t.status !== 'completed' && t.date === tomorrow);
      if (dueTomorrow.length > 0) {
        const morning = new Date();
        morning.setDate(morning.getDate() + 1);
        morning.setHours(8, 0, 0, 0);
        if (morning > new Date()) {
          notifications.push({
            id: id++,
            title: 'Tomorrow\'s Tasks',
            body: `${dueTomorrow.length} task${dueTomorrow.length > 1 ? 's' : ''} tomorrow: ${dueTomorrow[0].text}${dueTomorrow.length > 1 ? ' and more' : ''}`,
            smallIcon: 'ic_launcher',
            largeIcon: 'ic_launcher',
            schedule: { at: morning }
          });
        }
      }

      // Daily morning reminder at 8 AM today (if not past 8 AM)
      const todayMorning = new Date();
      todayMorning.setHours(8, 0, 0, 0);
      if (todayMorning > new Date() && (dueToday.length > 0 || overdue.length > 0)) {
        const total = dueToday.length + overdue.length;
        notifications.push({
          id: id++,
          title: 'Good Morning! Smart Reminder',
          body: `You have ${total} pending task${total > 1 ? 's' : ''} today${overdue.length > 0 ? ` (${overdue.length} overdue)` : ''}`,
          smallIcon: 'ic_launcher',
          largeIcon: 'ic_launcher',
          schedule: { at: todayMorning }
        });
      }

      // Evening check-in at 6 PM
      const evening = new Date();
      evening.setHours(18, 0, 0, 0);
      if (evening > new Date()) {
        const incomplete = tasks.filter(t => t.status !== 'completed' && t.date === today);
        if (incomplete.length > 0) {
          notifications.push({
            id: id++,
            title: 'Evening Check-in',
            body: `${incomplete.length} task${incomplete.length > 1 ? 's' : ''} still pending today. Don't forget!`,
            smallIcon: 'ic_launcher',
            largeIcon: 'ic_launcher',
            schedule: { at: evening }
          });
        }
      }

      if (notifications.length > 0) {
        await LocalNotifications.schedule({ notifications });
        console.log(`Scheduled ${notifications.length} push notifications`);
      }
    }

    // ── Native: Location-based suggestions (Capacitor only) ──
    const GEOFENCE_RADIUS_M = 500; // 500 meters
    let locationCheckInterval = null;
    let notifiedLocationTasks = new Set(); // track notified task IDs to avoid duplicates

    async function initNativeLocation() {
      if (!isNativeApp()) return;
      try {
        const { Geolocation } = await import('https://esm.sh/@capacitor/geolocation@6');
        const { LocalNotifications } = await import('https://esm.sh/@capacitor/local-notifications@6');

        // Request permissions
        const locPerm = await Geolocation.requestPermissions();
        if (locPerm.location !== 'granted' && locPerm.coarseLocation !== 'granted') return;

        const notifPerm = await LocalNotifications.requestPermissions();
        if (notifPerm.display !== 'granted') return;

        // Check immediately and then every 5 minutes
        checkNearbyTasks(Geolocation, LocalNotifications);
        locationCheckInterval = setInterval(() => {
          checkNearbyTasks(Geolocation, LocalNotifications);
        }, 5 * 60 * 1000);

        // Also check on app resume
        document.addEventListener('resume', () => {
          notifiedLocationTasks.clear(); // reset on resume
          checkNearbyTasks(Geolocation, LocalNotifications);
        });
      } catch (err) {
        console.log('Native location not available:', err.message);
      }
    }

    async function checkNearbyTasks(Geolocation, LocalNotifications) {
      try {
        const pos = await Geolocation.getCurrentPosition({ enableHighAccuracy: false });
        const userLat = pos.coords.latitude;
        const userLng = pos.coords.longitude;

        // Find tasks with location coordinates
        const locationTasks = tasks.filter(t =>
          t.status !== 'completed' &&
          t.locationLat != null && t.locationLng != null &&
          !notifiedLocationTasks.has(t.id)
        );

        // Group by location text
        const groups = {};
        for (const t of locationTasks) {
          const dist = haversineDistance(userLat, userLng, t.locationLat, t.locationLng);
          if (dist <= GEOFENCE_RADIUS_M) {
            const key = (t.locationText || 'this location').toLowerCase();
            if (!groups[key]) groups[key] = [];
            groups[key].push(t);
            notifiedLocationTasks.add(t.id);
          }
        }

        // Send notifications
        let notifId = Date.now();
        for (const [loc, locTasks] of Object.entries(groups)) {
          await LocalNotifications.schedule({
            notifications: [{
              id: notifId++,
              title: `You're near ${loc}`,
              body: `You have ${locTasks.length} pending task${locTasks.length > 1 ? 's' : ''} here: ${locTasks[0].text}${locTasks.length > 1 ? ' and more' : ''}`,
              smallIcon: 'ic_launcher',
              largeIcon: 'ic_launcher'
            }]
          });
        }
      } catch (err) {
        console.log('Location check error:', err.message);
      }
    }

    function haversineDistance(lat1, lon1, lat2, lon2) {
      const R = 6371e3; // Earth radius in meters
      const toRad = (x) => x * Math.PI / 180;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);
      const a = Math.sin(dLat / 2) ** 2 +
                Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
                Math.sin(dLon / 2) ** 2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    async function pinCurrentLocation() {
      if (!isNativeApp()) {
        toast('Location pinning is available in the mobile app');
        return;
      }
      const btn = document.getElementById('locationPinBtn');
      if (btn) { btn.disabled = true; btn.textContent = 'Getting location...'; }
      try {
        const { Geolocation } = await import('https://esm.sh/@capacitor/geolocation@6');
        const pos = await Geolocation.getCurrentPosition({ enableHighAccuracy: true });
        // Store in hidden fields
        document.getElementById('taskLocationLat').value = pos.coords.latitude;
        document.getElementById('taskLocationLng').value = pos.coords.longitude;
        toast('Location pinned');
      } catch (err) {
        toast('Could not get location: ' + err.message);
      }
      if (btn) { btn.disabled = false; btn.textContent = 'Pin current location'; }
    }

    // ── PWA ──
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js').catch(() => {});
    }

    // ── Init ──
    initAuth();
  </script>
