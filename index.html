            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M4 4.5C4 3.1 5.3 2 7 2s3 1.1 3 2.5S8.7 7 7 7 4 8.1 4 9.5 5.3 12 7 12s3-1.1 3-2.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
            <span class="view-label">Expenses</span>
            <span class="coming-soon-badge">Soon</span>
          </button>
        </div>
      </div>
      <div class="header-actions">
        <button class="btn btn-primary" onclick="openAddModal()">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          Add task
        </button>
        <div class="notif-wrap">
          <button class="notif-btn" onclick="toggleNotificationPanel(event)" aria-label="Notifications">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M13.5 6.5a4.5 4.5 0 10-9 0c0 5-2 6.5-2 6.5h13s-2-1.5-2-6.5M10.3 15.5a1.5 1.5 0 01-2.6 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span class="notif-badge" id="notifBadge" style="display:none">0</span>
          </button>
          <div class="notif-dropdown" id="notifDropdown"></div>
        </div>
        <div class="user-menu" id="userMenu" onclick="toggleUserDropdown(event)">
          <div class="user-avatar" id="headerAvatar"></div>
          <div class="user-dropdown" id="userDropdown">
            <div class="user-dropdown-item" style="pointer-events:none;font-weight:700" id="dropdownUserName"></div>
            <div class="user-dropdown-item" style="pointer-events:none;color:var(--text-muted);font-size:0.75rem;padding-top:0" id="dropdownUserEmail"></div>
            <div class="user-dropdown-sep"></div>
            <button class="user-dropdown-item" onclick="openManageUsers()">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="4" r="2.5" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M2.5 12.5c0-2.5 2-4 4.5-4s4.5 1.5 4.5 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/></svg>
              Manage users
            </button>
            <div class="user-dropdown-sep" id="bgLocSep" style="display:none"></div>
            <div class="user-dropdown-item" id="bgLocToggleWrap" style="display:none;pointer-events:auto" onclick="event.stopPropagation()">
              <div class="bg-loc-toggle">
                <div class="bg-loc-toggle-label">
                  <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1C4.8 1 3 2.8 3 5c0 3 4 8 4 8s4-5 4-8c0-2.2-1.8-4-4-4z" stroke="currentColor" stroke-width="1.3" fill="none"/><circle cx="7" cy="5" r="1.5" fill="currentColor"/></svg>
                  <div>
                    Background location
                    <span class="bg-loc-sub" id="bgLocStatusText">Alerts when near tasks</span>
                  </div>
                </div>
                <label class="toggle-switch">
                  <input type="checkbox" id="bgLocToggle" onchange="toggleBackgroundLocation(this.checked)">
                  <span class="toggle-slider"></span>
                </label>
              </div>
            </div>
            <div class="user-dropdown-sep"></div>
            <button class="user-dropdown-item danger" onclick="logout()">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 2H3a1 1 0 00-1 1v8a1 1 0 001 1h2M9 10l3-3-3-3M12 7H5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
              Log out
            </button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- Filters -->
  <div class="filters" id="filters">
    <span id="dayFilters" style="display:none">
      <button class="filter-chip active" data-filter="day" data-value="all" onclick="setFilter('day','all',this)">All days</button>
      <button class="filter-chip" data-filter="day" data-value="mon" onclick="setFilter('day','mon',this)">Mon</button>
      <button class="filter-chip" data-filter="day" data-value="tue" onclick="setFilter('day','tue',this)">Tue</button>
      <button class="filter-chip" data-filter="day" data-value="wed" onclick="setFilter('day','wed',this)">Wed</button>
      <button class="filter-chip" data-filter="day" data-value="thu" onclick="setFilter('day','thu',this)">Thu</button>
      <button class="filter-chip" data-filter="day" data-value="fri" onclick="setFilter('day','fri',this)">Fri</button>
      <button class="filter-chip" data-filter="day" data-value="sat" onclick="setFilter('day','sat',this)">Sat</button>
      <button class="filter-chip" data-filter="day" data-value="sun" onclick="setFilter('day','sun',this)">Sun</button>
      <span class="filter-separator"></span>
    </span>
    <button class="filter-chip active" data-filter="priority" data-value="all" onclick="setFilter('priority','all',this)">Any priority</button>
    <button class="filter-chip" data-filter="priority" data-value="high" onclick="setFilter('priority','high',this)">High</button>
    <button class="filter-chip" data-filter="priority" data-value="medium" onclick="setFilter('priority','medium',this)">Medium</button>
    <button class="filter-chip" data-filter="priority" data-value="low" onclick="setFilter('priority','low',this)">Low</button>
    <div class="filter-separator"></div>
    <button class="filter-chip active" data-filter="category" data-value="all" onclick="setFilter('category','all',this)">All tags</button>
    <button class="filter-chip" data-filter="category" data-value="personal" onclick="setFilter('category','personal',this)">Personal</button>
    <button class="filter-chip" data-filter="category" data-value="professional" onclick="setFilter('category','professional',this)">Professional</button>
    <div class="filter-separator"></div>
    <button class="filter-chip active" data-filter="status" data-value="all" onclick="setFilter('status','all',this)">Any status</button>

  </div><!-- /appWrapper -->

  <!-- Toasts -->
  <div class="toast-container" id="toasts"></div>

  <script>
    // ── API layer ──
    const API_BASE = '/api';
    let authToken = localStorage.getItem('reminder_app_token') || null;

    async function api(path, options = {}) {
      const headers = { 'Content-Type': 'application/json' };
      if (authToken) headers['Authorization'] = 'Bearer ' + authToken;
      const res = await fetch(API_BASE + path, { ...options, headers });
      if (res.status === 401) {
        const err = await res.json().catch(() => ({ error: 'Request failed' }));
        // Only clear session for non-auth endpoints (expired token)
        if (!path.startsWith('/auth/login') && !path.startsWith('/auth/signup')) {
          authToken = null;
          localStorage.removeItem('reminder_app_token');
          localStorage.removeItem('reminder_app_user');
          showAuth();
        }
        throw new Error(err.error || 'Invalid credentials');
      }
      if (!res.ok) {
        const err = await res.json().catch(() => ({ error: 'Request failed' }));
        throw new Error(err.error || 'Request failed');
      }
      return res.json();
    }

    async function loadAppData() {
      const [tasksData, usersData] = await Promise.all([
        api('/tasks'),
        api('/users')
      ]);
      tasks = tasksData;
      users = usersData;
    }

    // ── User system ──
    const AVATAR_COLORS = ['#4f6ef7','#8b5cf6','#0ea5e9','#22c55e','#ef4444','#f59e0b','#ec4899','#6366f1','#14b8a6','#f97316'];

    function getUserById(id) { return users.find(u => u.id == id) || null; }
    function getUserInitials(user) {
      if (!user) return '?';
      const parts = user.name.trim().split(/\s+/);
      return parts.length >= 2 ? (parts[0][0] + parts[parts.length-1][0]).toUpperCase() : parts[0].slice(0,2).toUpperCase();
    }
    function getUserColor(user) {
      if (!user) return AVATAR_COLORS[0];
      return user.color || AVATAR_COLORS[0];
    }

    let users = [];
    let currentUser = null;
    let authMode = 'signup'; // 'signup' or 'login'
    const ADMIN_EMAIL = 'grvivek17@gmail.com';
    function isAdmin() { return currentUser && currentUser.email && currentUser.email.toLowerCase() === ADMIN_EMAIL; }

    async function initAuth() {
      if (!authToken) { showAuth(); return; }
      try {
        currentUser = await api('/auth/me');
        await loadAppData();
        showApp();
      } catch {
        showAuth();
      }
    }

    function showAuth() {
      document.getElementById('authScreen').style.display = '';
      document.getElementById('appWrapper').style.display = 'none';
      // Default to login if users exist, signup if no users
      if (users.length > 0) {
        authMode = 'login';
      } else {
        authMode = 'signup';
      }
      updateAuthUI();
    }

    function showApp() {
      document.getElementById('authScreen').style.display = 'none';
      document.getElementById('appWrapper').style.display = '';
      updateHeaderUser();
      // Reset briefing dismissed state so it shows on fresh app load
      briefingDismissedToday = false;
      briefingError = false;
      render();
      initNotifications();
      initBriefing();
      initNativeLocation();
    }

    function toggleAuthMode() {
      authMode = authMode === 'signup' ? 'login' : 'signup';
      updateAuthUI();
    }

    function updateAuthUI() {
      const isSignup = authMode === 'signup';
      document.getElementById('authTitle').textContent = isSignup ? 'Sign up' : 'Log in';
      document.getElementById('authSub').textContent = isSignup ? 'Create an account to get started' : 'Welcome back';
      document.getElementById('authSubmitBtn').textContent = isSignup ? 'Create account' : 'Log in';
      document.getElementById('authToggle').innerHTML = isSignup
        ? 'Already have an account? <a onclick="toggleAuthMode()">Log in</a>'
        : 'New here? <a onclick="toggleAuthMode()">Create account</a>';
      document.getElementById('authName').parentElement.style.display = isSignup ? '' : 'none';
      document.getElementById('authName').required = isSignup;
      document.getElementById('authPassword').autocomplete = isSignup ? 'new-password' : 'current-password';
      document.getElementById('authForm').reset();
    }

    async function handleAuth(e) {
      e.preventDefault();
      const email = document.getElementById('authEmail').value.trim();
      const password = document.getElementById('authPassword').value;

      try {
        if (authMode === 'signup') {
          const name = document.getElementById('authName').value.trim();
          if (!name || !email || !password) return;
          const data = await api('/auth/signup', {
            method: 'POST',
            body: JSON.stringify({ name, email, password })
          });
          authToken = data.token;
          localStorage.setItem('reminder_app_token', data.token);
          currentUser = data.user;
          await loadAppData();
          toast('Account created');
          showApp();
        } else {
          if (!email || !password) return;
          const data = await api('/auth/login', {
            method: 'POST',
            body: JSON.stringify({ email, password })
          });
          authToken = data.token;
          localStorage.setItem('reminder_app_token', data.token);
          currentUser = data.user;
          await loadAppData();
          toast('Welcome back, ' + data.user.name);
          showApp();
        }
      } catch (err) {
        toast(err.message || 'Something went wrong');
      }
    }

    function logout() {
      currentUser = null;
      authToken = null;
      localStorage.removeItem('reminder_app_token');
      closeUserDropdown();
      showAuth();
    }

    function updateHeaderUser() {
      if (!currentUser) return;
      const avatar = document.getElementById('headerAvatar');
      avatar.textContent = getUserInitials(currentUser);
      avatar.style.background = getUserColor(currentUser);
      document.getElementById('dropdownUserName').textContent = currentUser.name;
      document.getElementById('dropdownUserEmail').textContent = currentUser.email;
    }

    function toggleUserDropdown(e) {
      e.stopPropagation();
      document.getElementById('userDropdown').classList.toggle('open');
    }
    function closeUserDropdown() {
      document.getElementById('userDropdown').classList.remove('open');
    }
    document.addEventListener('click', () => { closeUserDropdown(); closeNotificationPanel(); });

    // ── Manage users modal ──
    function openManageUsers() {
      closeUserDropdown();
      const body = document.getElementById('manageUsersBody');
      body.innerHTML = users.map(u => `
        <div class="share-user-row">
          <div class="user-avatar" style="background:${u.color}">${getUserInitials(u)}</div>
          <div class="share-user-info">
            <div class="share-user-name">${escapeHtml(u.name)}${u.id === currentUser.id ? ' <span style="color:var(--accent);font-size:0.6875rem">(you)</span>' : ''}</div>
            <div class="share-user-email">${escapeHtml(u.email)}</div>
          </div>
          ${u.id !== currentUser.id && isAdmin() ? `<button class="btn btn-sm btn-danger" onclick="removeUser('${u.id}')" style="border:1px solid var(--danger)">Remove</button>` : ''}
        </div>
      `).join('') || '<div class="empty-state"><p>No other users</p></div>';
      document.getElementById('manageUsersModal').classList.add('open');
    }
    function closeManageUsers() {
      document.getElementById('manageUsersModal').classList.remove('open');
    }
    async function removeUser(id) {
      id = Number(id);
      if (id === currentUser.id) return;
      try {
        await api('/auth/users/' + id, { method: 'DELETE' });
        users = users.filter(u => u.id !== id);
        // Remove user from in-memory task assignments
        tasks.forEach(t => {
          t.assignedTo = (t.assignedTo || []).filter(uid => uid !== id);
        });
        openManageUsers();
        render();
        toast('User removed');
      } catch (err) {
        toast(err.message || 'Failed to remove user');
      }
    }

    // ── Share modal ──
    let sharingTaskId = null;
    function openShareModal(taskId) {
      taskId = Number(taskId);
      sharingTaskId = taskId;
      const task = tasks.find(t => t.id == taskId);
      if (!task) return;
      const assignedSet = new Set(task.assignedTo || []);
      const otherUsers = users.filter(u => u.id !== currentUser.id);
      const list = document.getElementById('shareUserList');
      if (otherUsers.length === 0) {
        list.innerHTML = '<div class="empty-state"><p>No other users to share with. Create more accounts first.</p></div>';
      } else {
        list.innerHTML = otherUsers.map(u => {
          const isAssigned = assignedSet.has(u.id);
          return `<div class="share-user-row">
            <div class="user-avatar sm" style="background:${u.color}">${getUserInitials(u)}</div>
            <div class="share-user-info">
              <div class="share-user-name">${escapeHtml(u.name)}</div>
              <div class="share-user-email">${escapeHtml(u.email)}</div>
            </div>
            <button class="btn btn-sm ${isAssigned ? 'btn-primary' : ''}" style="${isAssigned ? 'border-color:var(--accent)' : ''}" onclick="toggleShareUser('${u.id}')">
              ${isAssigned ? 'Assigned' : 'Assign'}
            </button>
          </div>`;
        }).join('');
      }
      document.getElementById('shareModal').classList.add('open');
    }
    function closeShareModal() {
      document.getElementById('shareModal').classList.remove('open');
      sharingTaskId = null;
    }
    async function toggleShareUser(userId) {
      userId = Number(userId);
      const task = tasks.find(t => t.id == sharingTaskId);
      if (!task) return;
      if (!task.assignedTo) task.assignedTo = [];
      const idx = task.assignedTo.indexOf(userId);
      let newAssigned;
      if (idx >= 0) {
        newAssigned = task.assignedTo.filter(uid => uid !== userId);
      } else {
        newAssigned = [...task.assignedTo, userId];
      }
      try {
        await api('/tasks/' + task.id + '/assign', {
          method: 'POST',
          body: JSON.stringify({ assignedTo: newAssigned })
        });
        task.assignedTo = newAssigned;
        openShareModal(sharingTaskId); // refresh
        render();
        const user = getUserById(userId);
        toast(idx >= 0 ? 'Unassigned from ' + (user?.name) : 'Assigned to ' + (user?.name));
      } catch (err) {
        toast(err.message || 'Failed to update assignment');
      }
    }

    // ── Constants ──
    const DAYS = [
      { key: 'mon', label: 'Monday', weekend: false },
      { key: 'tue', label: 'Tuesday', weekend: false },
      { key: 'wed', label: 'Wednesday', weekend: false },
      { key: 'thu', label: 'Thursday', weekend: false },
      { key: 'fri', label: 'Friday', weekend: false },
      { key: 'sat', label: 'Saturday', weekend: true },
      { key: 'sun', label: 'Sunday', weekend: true },
    ];
    const DAY_KEYS = ['sun', 'mon', 'tue', 'wed', 'thu', 'fri', 'sat'];
    const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const DAY_LABELS_SHORT = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

    const STATUSES = [
      { key: 'not_started', label: 'Not started' },
      { key: 'in_progress', label: 'In progress' },
      { key: 'on_hold', label: 'On hold' },
      { key: 'completed', label: 'Completed' },
    ];
    const STATUS_LABELS = { not_started: 'Not started', in_progress: 'In progress', on_hold: 'On hold', completed: 'Completed' };

    // ── State ──
    let tasks = [];
    let editingId = null;
    let pendingConfirm = null;
    let currentView = 'all'; // 'all', 'week', 'calendar', 'progress', 'health', 'expense'
    let calMonth = new Date().getMonth();
    let calYear = new Date().getFullYear();
    let selectedDate = null; // YYYY-MM-DD string when a calendar date is clicked
    let allSort = 'date'; // 'date', 'priority', 'category', 'themes', 'location'
    let progressWeekOffset = 0; // 0 = this week, -1 = last week, etc.
    const filters = { day: 'all', priority: 'all', category: 'all', status: 'all', owner: 'all' };

    // ── AI state ──
    let themeCache = { hash: '', groups: [], loading: false };
    let themeFetchTimer = null;
    let briefingData = null; // { summary, workPlan, alerts, recommendations }
    let briefingLoading = false;
    let briefingError = false;
    let briefingDismissedToday = localStorage.getItem('briefing_dismissed') === todayStr();
    const BRIEFING_CACHE_KEY = 'reminder_briefing_cache';

    // ── Holiday cache ──
    let holidayCache = null;
    const HOLIDAY_CACHE_KEY = 'reminder_holiday_cache';

    // ── Weather state ──
    let weatherData = null;
    let weatherLoading = false;
    let weatherError = null; // null | 'permission' | 'timeout' | 'network'
    const WEATHER_CACHE_KEY = 'reminder_weather_cache';

    // ── Helpers ──
    function toDateStr(d) {
      const yy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      return `${yy}-${mm}-${dd}`;
    }
    function todayStr() { return toDateStr(new Date()); }
    function dayKeyFromDate(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      return DAY_KEYS[d.getDay()];
    }
    function parseDateNice(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
    }
    function formatShort(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    // ── Persistence (handled by backend API) ──
    function getNextDateForDay(dayKey) {
      const target = DAY_KEYS.indexOf(dayKey);
      const now = new Date();
      const curr = now.getDay();
      let diff = target - curr;
      if (diff < 0) diff += 7;
      const d = new Date(now);
      d.setDate(d.getDate() + diff);
      return toDateStr(d);
    }

    function genId() {
      return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
    }

    // ── AI: helpers ──
    function getTasksHash() {
      const active = tasks.filter(t => t.status !== 'completed');
      const str = active.map(t => `${t.id}:${t.text}:${t.status}`).join('|');
      let hash = 0;
      for (let i = 0; i < str.length; i++) {
        hash = ((hash << 5) - hash) + str.charCodeAt(i);
        hash |= 0;
      }
      return String(hash);
    }

    function isNativeApp() {
      return window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform();
    }

    // Get Capacitor plugin - use native bridge in APK, esm.sh fallback for web
    function getCapPlugin(name) {
      if (window.Capacitor && window.Capacitor.registerPlugin) {
        return window.Capacitor.registerPlugin(name);
      }
      if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins[name]) {
        return window.Capacitor.Plugins[name];
      }
      return null;
    }

    // ── AI: Theme grouping ──
    async function fetchThemeGroups() {
      const active = tasks.filter(t => t.status !== 'completed');
      if (active.length < 4) {
        themeCache = { hash: getTasksHash(), groups: [], loading: false };
        render();
        return;
      }
      themeCache.loading = true;
      render();
      try {
        const payload = active.map(t => ({ id: t.id, text: t.text, category: t.category, priority: t.priority }));
        const result = await api('/ai/group-themes', {
          method: 'POST',
          body: JSON.stringify({ tasks: payload })
        });
        themeCache = { hash: getTasksHash(), groups: result.groups || [], loading: false };
      } catch (err) {
        console.error('Theme fetch error:', err);
        themeCache = { hash: getTasksHash(), groups: [], loading: false };
        toast('Could not group by theme');
      }
      render();
    }

    function scheduleThemeRefresh() {
      if (allSort !== 'themes') return;
      if (themeFetchTimer) clearTimeout(themeFetchTimer);
      themeFetchTimer = setTimeout(() => fetchThemeGroups(), 3000);
    }

    // ── AI: Daily briefing ──
    async function initBriefing() {
      const today = todayStr();
      // Start weather fetch in parallel (don't block briefing)
      fetchWeather().then(() => render());
      // Check localStorage cache
      try {
        const cached = JSON.parse(localStorage.getItem(BRIEFING_CACHE_KEY) || 'null');
        if (cached && cached.date === today && cached.taskHash === getTasksHash()) {
          briefingData = cached.briefing;
          briefingLoading = false;
          render();
          return;
        }
      } catch {}
      // Fetch new briefing
      await fetchDailyBriefing();
    }

    // ── Weather ──
    const WMO_WEATHER = {
      0: { label: 'Clear sky', icon: '&#9728;&#65039;' },
      1: { label: 'Mostly clear', icon: '&#127780;&#65039;' },
      2: { label: 'Partly cloudy', icon: '&#9925;' },
      3: { label: 'Overcast', icon: '&#9729;&#65039;' },
      45: { label: 'Foggy', icon: '&#127787;&#65039;' },
      48: { label: 'Fog (rime)', icon: '&#127787;&#65039;' },
      51: { label: 'Light drizzle', icon: '&#127782;&#65039;' },

    async function fetchWeather(retryCount = 0) {
      // Check cache (valid for 1 hour)
      try {
        const cached = JSON.parse(localStorage.getItem(WEATHER_CACHE_KEY) || 'null');
        if (cached && (Date.now() - cached.ts) < 3600000) {
          weatherData = cached.data;
          weatherError = null;
          return;
        }
      } catch {}

      weatherLoading = true;
      weatherError = null;
      try {
        let lat, lng;
        if (isNativeApp()) {
          // Use Capacitor Geolocation plugin on mobile
          const Geolocation = getCapPlugin('Geolocation');
          try { await Geolocation.requestPermissions(); } catch {}
          const pos = await Geolocation.getCurrentPosition({ enableHighAccuracy: false, timeout: 15000 });
          lat = pos.coords.latitude.toFixed(4);
          lng = pos.coords.longitude.toFixed(4);
        } else if (window.isSecureContext && navigator.geolocation) {
          // Use browser geolocation only on HTTPS
          const pos = await new Promise((resolve, reject) => {
            navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 15000, enableHighAccuracy: false });
          });
          lat = pos.coords.latitude.toFixed(4);
          lng = pos.coords.longitude.toFixed(4);
        } else {
          // HTTP fallback: use IP-based geolocation
          const geoResp = await fetch('https://ipapi.co/json/');
          if (geoResp.ok) {
            const geoData = await geoResp.json();
            lat = parseFloat(geoData.latitude).toFixed(4);
            lng = parseFloat(geoData.longitude).toFixed(4);
          } else {
            throw new Error('IP geolocation failed');
          }
        }

        const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m,weather_code,relative_humidity_2m,wind_speed_10m&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=auto&forecast_days=3`;
        const resp = await fetch(url);
        if (!resp.ok) throw new Error('Weather API error');
        const data = await resp.json();

        weatherData = {
          current: {
            temp: Math.round(data.current.temperature_2m),
            code: data.current.weather_code,
            humidity: data.current.relative_humidity_2m,
            wind: Math.round(data.current.wind_speed_10m),
            unit: data.current_units?.temperature_2m || '°C'
          },
          daily: data.daily.time.map((date, i) => ({
            date,
            code: data.daily.weather_code[i],
            high: Math.round(data.daily.temperature_2m_max[i]),
            low: Math.round(data.daily.temperature_2m_min[i]),
            rainChance: data.daily.precipitation_probability_max[i]
          }))
        };
        weatherError = null;
        localStorage.setItem(WEATHER_CACHE_KEY, JSON.stringify({ ts: Date.now(), data: weatherData }));
      } catch (err) {
        console.warn('Weather fetch failed:', err.message);
        weatherData = null;
        if (err.code === 1) weatherError = 'permission';
        else if (err.code === 3) weatherError = 'timeout';
        else weatherError = 'network';
        // Auto-retry once for timeout/network errors
        if (retryCount < 1 && weatherError !== 'permission') {
          weatherLoading = false;
          await new Promise(r => setTimeout(r, 2000));
          return fetchWeather(retryCount + 1);
        }
      }
      weatherLoading = false;
    }

    function getWeatherSummaryForAI() {
      if (!weatherData) return '';
      const cur = weatherData.current;
      const info = getWeatherInfo(cur.code);
      let summary = `Current weather: ${info.label}, ${cur.temp}${cur.unit}, humidity ${cur.humidity}%, wind ${cur.wind} km/h.`;
      if (weatherData.daily && weatherData.daily.length > 0) {
        const today = weatherData.daily[0];
        summary += ` Today: high ${today.high}${cur.unit}, low ${today.low}${cur.unit}, ${today.rainChance}% chance of rain.`;
      }
      return summary;
    }

    async function fetchHolidayInfo(dateStr) {
      const year = dateStr.slice(0, 4);
      const cacheKey = HOLIDAY_CACHE_KEY + '_' + year;
      try {
        const cached = JSON.parse(localStorage.getItem(cacheKey) || 'null');
        if (cached && cached.year === year) {
          holidayCache = cached.holidays;
          const match = holidayCache.find(h => h.date === dateStr);
          return match ? { isHoliday: true, name: match.localName || match.name } : { isHoliday: false, name: null };
        }
      } catch {}
      try {
        const resp = await fetch(`https://date.nager.at/api/v3/PublicHolidays/${year}/IN`);
        if (resp.ok) {
          const holidays = await resp.json();
          holidayCache = holidays;
          localStorage.setItem(cacheKey, JSON.stringify({ year, holidays }));
          const match = holidays.find(h => h.date === dateStr);
          return match ? { isHoliday: true, name: match.localName || match.name } : { isHoliday: false, name: null };
        }
      } catch (err) {
        console.log('Holiday API error:', err.message);
      }
      return { isHoliday: false, name: null };
    }

    function getWeekTaskCounts(today) {
      const d = new Date(today + 'T00:00:00');
      const dayOfWeek = d.getDay();
      const monday = new Date(d);
      monday.setDate(d.getDate() - ((dayOfWeek + 6) % 7));
      const days = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
      const counts = {};
      for (let i = 0; i < 7; i++) {
        const day = new Date(monday);
        day.setDate(monday.getDate() + i);
        const dateStr = day.toISOString().slice(0, 10);
        const count = tasks.filter(t => t.date === dateStr && t.status !== 'completed').length;
        counts[`${days[i]} (${dateStr})`] = count;
      }
      return counts;
    }

    async function fetchDailyBriefing() {
      const today = todayStr();
      const activeTasks = tasks.filter(t => t.status !== 'completed');
      const completedTasks = tasks.filter(t => t.status === 'completed');
      briefingLoading = true;
      render();
      try {
        // Gather rich context
        const overdueTasks = activeTasks
          .filter(t => t.date && t.date < today)
          .map(t => ({ text: t.text, priority: t.priority, category: t.category, date: t.date, location: t.locationText || null }));

        const payload = activeTasks.map(t => ({
          text: t.text, priority: t.priority, category: t.category, status: t.status,
          date: t.date || null, location: t.locationText || null
        }));

        const d = new Date(today + 'T00:00:00');
        const dayNum = d.getDay();
        const dayNames = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
        const isWeekend = dayNum === 0 || dayNum === 6;

        // Fetch holiday info (non-blocking, with fallback)
        let holidayInfo = { isHoliday: false, name: null };
        try { holidayInfo = await fetchHolidayInfo(today); } catch {}

        const weekTasks = getWeekTaskCounts(today);
        const weather = getWeatherSummaryForAI();

        const result = await api('/ai/daily-briefing', {
          method: 'POST',
          body: JSON.stringify({
            tasks: payload,
            today,
            weather,
            overdueTasks,
            completedCount: completedTasks.length,
            totalCount: tasks.length,
            weekTasks,
            isWeekend,
            isHoliday: holidayInfo.isHoliday,
            holidayName: holidayInfo.name,
            dayOfWeek: dayNames[dayNum]
          })
        });

        briefingData = {
          summary: result.summary || '',
          workPlan: result.workPlan || [],
          alerts: result.alerts || [],
          recommendations: result.recommendations || []
        };
        briefingLoading = false;
        briefingError = false;
        briefingDismissedToday = false;
        // Cache
        localStorage.setItem(BRIEFING_CACHE_KEY, JSON.stringify({
          date: today, briefing: briefingData, taskHash: getTasksHash()
        }));
        localStorage.removeItem('briefing_dismissed');
      } catch (err) {
        console.error('Briefing error:', err);
        briefingData = null;
        briefingLoading = false;
        briefingError = true;
      }
      render();
    }

    function dismissBriefing() {
      briefingDismissedToday = true;
      localStorage.setItem('briefing_dismissed', todayStr());
      render();
    }

      if (currentView === 'week' && filters.day !== 'all') {
        const taskDay = dayKeyFromDate(task.date);
        if (taskDay !== filters.day) return false;
      }
      if (filters.priority !== 'all' && task.priority !== filters.priority) return false;
      if (filters.category !== 'all' && task.category !== filters.category) return false;
      if (filters.status !== 'all' && task.status !== filters.status) return false;
      if (filters.owner === 'mine' && task.createdBy != currentUser?.id) return false;
      if (filters.owner === 'assigned' && !(task.assignedTo || []).some(uid => uid == currentUser?.id)) return false;
      return true;

      { text: "Your future is created by what you do today, not tomorrow.", author: "Robert Kiyosaki" },
      { text: "Amateurs sit and wait for inspiration, the rest of us just get up and go to work.", author: "Stephen King" },
      { text: "Success is the sum of small efforts repeated day in and day out.", author: "Robert Collier" },
      { text: "One task at a time. That's the secret.", author: "Gary Keller" },
      { text: "Done is better than perfect.", author: "Sheryl Sandberg" },
      { text: "If you want something you've never had, you must do something you've never done.", author: "Thomas Jefferson" },
      { text: "A year from now you may wish you had started today.", author: "Karen Lamb" },
      { text: "The harder you work for something, the greater you'll feel when you achieve it.", author: "Anonymous" },
      { text: "Dream big. Start small. Act now.", author: "Robin Sharma" },
      { text: "Progress, not perfection.", author: "Anonymous" },
      { text: "You are never too old to set another goal or to dream a new dream.", author: "C.S. Lewis" },
      { text: "Discipline is choosing between what you want now and what you want most.", author: "Abraham Lincoln" },
      { text: "Success usually comes to those who are too busy to be looking for it.", author: "Henry David Thoreau" },
      { text: "Don't be afraid to give up the good to go for the great.", author: "John D. Rockefeller" },
      { text: "Be so good they can't ignore you.", author: "Steve Martin" },
      { text: "The only limit to our realization of tomorrow will be our doubts of today.", author: "Franklin D. Roosevelt" }
    ];

    function getDailyQuote() {
      const today = todayStr();
      const cacheKey = 'reminder_qotd';
      try {
        const cached = JSON.parse(localStorage.getItem(cacheKey) || 'null');
        if (cached && cached.date === today) return cached.quote;
      } catch {}
      // Deterministic pick based on date
      const seed = today.split('-').join('');
      const idx = parseInt(seed, 10) % QUOTES.length;
      const quote = QUOTES[idx];
      localStorage.setItem(cacheKey, JSON.stringify({ date: today, quote }));
      return quote;
    }

    function renderQuoteOfDay() {
      const el = document.getElementById('qotd');
      if (!el) return;
      const q = getDailyQuote();
      el.innerHTML = `<div class="qotd-card">
        <div class="qotd-label">Quote of the Day</div>
        <div class="qotd-text">"${q.text}"</div>
        <div class="qotd-author">&mdash; ${q.author}</div>
      </div>`;
    }

    // ── Rendering ──
    function render() {
      const app = document.getElementById('app');
      if (currentView === 'week') {
        renderWeekView(app);
      } else if (currentView === 'calendar') {
        renderCalendarView(app);
      } else if (currentView === 'progress') {
        renderProgressView(app);
      } else if (currentView === 'health') {
        renderHealthView(app);
      } else if (currentView === 'expense') {
        renderExpenseView(app);
      } else {
        renderAllView(app);
      }
      updateNotificationBell();
      renderQuoteOfDay();
      renderStatsSidebar();
    }

    function renderStatsSidebar() {
      const sb = document.getElementById('statsSidebar');
      if (!sb) return;
      const totalAll = tasks.length;
      const totalActive = tasks.filter(t => t.status !== 'completed').length;
      const totalCompleted = tasks.filter(t => t.status === 'completed').length;
      const highActive = tasks.filter(t => t.status !== 'completed' && t.priority === 'high').length;
      const personalCount = tasks.filter(t => t.status !== 'completed' && t.category === 'personal').length;
      const professionalCount = tasks.filter(t => t.status !== 'completed' && t.category === 'professional').length;
      sb.innerHTML = `
        <div class="stat-card"><div class="stat-value accent">${totalAll}</div><div class="stat-label">Total</div></div>
        <div class="stat-card"><div class="stat-value">${totalActive}</div><div class="stat-label">Active</div></div>
        <div class="stat-card"><div class="stat-value done-color">${totalCompleted}</div><div class="stat-label">Done</div></div>
        <div class="stat-card"><div class="stat-value high-color">${highActive}</div><div class="stat-label">High pri</div></div>
        <div class="stat-card"><div class="stat-value" style="color:var(--personal)">${personalCount}</div><div class="stat-label">Personal</div></div>
        <div class="stat-card"><div class="stat-value" style="color:var(--professional)">${professionalCount}</div><div class="stat-label">Work</div></div>`;
    }

    // ── Week view ──
    function renderWeekView(app) {
      const daysToShow = filters.day === 'all' ? DAYS : DAYS.filter(d => d.key === filters.day);

      app.innerHTML = daysToShow.map(day => {
        const allDayTasks = tasks.filter(t => dayKeyFromDate(t.date) === day.key);
        const visibleTasks = allDayTasks.filter(matchesFilters);
        const highCount = allDayTasks.filter(t => t.priority === 'high' && t.status !== 'completed').length;
        const activeCount = allDayTasks.filter(t => t.status !== 'completed').length;

        const summaryParts = [];
        summaryParts.push(`${activeCount} task${activeCount !== 1 ? 's' : ''}`);
        if (highCount > 0) summaryParts.push(`${highCount} high priority`);

        const emptyMsg = `No tasks for ${day.label} yet \u2014 add one`;

        const tasksHtml = visibleTasks.length === 0
          ? `<div class="empty-state">
               <p>${emptyMsg}</p>
               <button class="btn btn-sm btn-primary" onclick="openAddModal('${day.key}')">Add task</button>
             </div>`
          : `<ul class="task-list">${visibleTasks.map(t => taskHtml(t, true)).join('')}</ul>`;

        return `
          <section class="day-section${day.weekend ? ' weekend' : ''}">
            <div class="day-header">
              <div class="day-title">
                ${day.label}
                ${day.weekend ? '<span class="weekend-badge">Weekend</span>' : ''}
              </div>
              <div class="day-summary">${summaryParts.join(', ')}</div>
            </div>
            ${tasksHtml}
          </section>`;
      }).join('');
      // Prepend briefing card in week view
      const weekBriefing = renderBriefingHtml();
      if (weekBriefing) app.innerHTML = weekBriefing + app.innerHTML;
    }

    // ── Calendar view ──
    function renderCalendarView(app) {
      const today = todayStr();
      // Build calendar grid data
      const firstDay = new Date(calYear, calMonth, 1);
      const lastDay = new Date(calYear, calMonth + 1, 0);
      // Monday = 0 in our grid. JS: Sun=0,Mon=1...Sat=6 → shift so Mon=0
      let startDow = (firstDay.getDay() + 6) % 7; // 0=Mon
      const daysInMonth = lastDay.getDate();

      // Cells: fill leading days from prev month
      const cells = [];
      const prevMonthLast = new Date(calYear, calMonth, 0);
      for (let i = startDow - 1; i >= 0; i--) {
        const d = new Date(calYear, calMonth, 0 - i);
        cells.push({ date: toDateStr(d), day: d.getDate(), outside: true });
      }
      for (let i = 1; i <= daysInMonth; i++) {
        const d = new Date(calYear, calMonth, i);
        cells.push({ date: toDateStr(d), day: i, outside: false });
      }
      // Fill trailing days
      const remain = 7 - (cells.length % 7);
      if (remain < 7) {
        for (let i = 1; i <= remain; i++) {
          const d = new Date(calYear, calMonth + 1, i);
          cells.push({ date: toDateStr(d), day: i, outside: true });
        }
      }

      // Task counts per date
      const tasksByDate = {};
      tasks.forEach(t => {
        if (!tasksByDate[t.date]) tasksByDate[t.date] = [];
        tasksByDate[t.date].push(t);
      });

      // Day labels row
      const dayLabelsHtml = DAY_LABELS_SHORT.map((l, i) =>
        `<div class="calendar-day-label${i >= 5 ? ' weekend-label' : ''}">${l}</div>`
      ).join('');

      // Cells
      const cellsHtml = cells.map(c => {
        const isToday = c.date === today;
        const isSelected = c.date === selectedDate;
        const isWeekend = [0, 6].includes(new Date(c.date + 'T00:00:00').getDay());
        const dateTasks = tasksByDate[c.date] || [];
        const activeTasks = dateTasks.filter(t => t.status !== 'completed');

        let classes = 'calendar-cell';
        if (c.outside) classes += ' outside';
        if (isWeekend && !c.outside) classes += ' weekend-cell';
        if (isToday) classes += ' today';
        if (isSelected) classes += ' selected';

        // Priority dots (max 5 shown)
        const dots = activeTasks.slice(0, 5).map(t =>
          `<span class="cal-dot ${t.priority}"></span>`
        ).join('');

        const countLabel = activeTasks.length > 5
          ? `<div class="cal-task-count">+${activeTasks.length - 5} more</div>` : '';

        return `<div class="${classes}" onclick="selectCalDate('${c.date}')">
          <div class="cal-date">${c.day}</div>
          <div class="cal-dots">${dots}</div>
          ${countLabel}
        </div>`;
      }).join('');

      // Selected date tasks panel
      let panelHtml = '';
      if (selectedDate) {
        const selTasks = (tasksByDate[selectedDate] || []).filter(matchesFilters);
        const dayInfo = DAYS.find(d => d.key === dayKeyFromDate(selectedDate));
        const isWeekend = dayInfo && dayInfo.weekend;

        const panelTitle = parseDateNice(selectedDate);
        const activeCount = selTasks.filter(t => t.status !== 'completed').length;
        const highCount = selTasks.filter(t => t.priority === 'high' && t.status !== 'completed').length;
        const summaryParts = [`${activeCount} task${activeCount !== 1 ? 's' : ''}`];
        if (highCount > 0) summaryParts.push(`${highCount} high priority`);

        const taskListHtml = selTasks.length === 0
          ? `<div class="empty-state">
               <p>No tasks for ${parseDateNice(selectedDate)} yet \u2014 add one</p>
               <button class="btn btn-sm btn-primary" onclick="openAddModal(null, '${selectedDate}')">Add task</button>
             </div>`
          : `<ul class="task-list">${selTasks.map(t => taskHtml(t, false)).join('')}</ul>`;

        panelHtml = `
          <div class="selected-date-panel">
            <section class="day-section${isWeekend ? ' weekend' : ''}">
              <div class="day-header">
                <div class="day-title">
                  ${panelTitle}
                  ${isWeekend ? '<span class="weekend-badge">Weekend</span>' : ''}
                </div>
                <div class="day-summary">${summaryParts.join(', ')}</div>
              </div>
              ${taskListHtml}
            </section>
          </div>`;
      }

      app.innerHTML = `
        <div class="calendar-wrapper">
          <div class="calendar-nav">
            <button class="calendar-nav-btn" onclick="navMonth(-1)" aria-label="Previous month">
              <svg width="14" height="14" viewBox="0 0 14 14"><path d="M9 3L5 7l4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
            </button>
            <div class="calendar-nav-center">
              <span class="calendar-nav-title">${MONTH_NAMES[calMonth]} ${calYear}</span>
              <button class="calendar-today-btn" onclick="goToday()">Today</button>
            </div>
            <button class="calendar-nav-btn" onclick="navMonth(1)" aria-label="Next month">
              <svg width="14" height="14" viewBox="0 0 14 14"><path d="M5 3l4 4-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
            </button>
          </div>
          <div class="calendar-grid">
            ${dayLabelsHtml}
            ${cellsHtml}
          </div>
        </div>
        ${panelHtml}`;
      // Prepend briefing card in calendar view
      const calBriefing = renderBriefingHtml();
      if (calBriefing) app.innerHTML = calBriefing + app.innerHTML;
    }

    function selectCalDate(dateStr) {
      selectedDate = (selectedDate === dateStr) ? null : dateStr;
      render();
    }

    function navMonth(dir) {
      calMonth += dir;
      if (calMonth > 11) { calMonth = 0; calYear++; }
      if (calMonth < 0) { calMonth = 11; calYear--; }
      selectedDate = null;
      render();
    }

    function goToday() {
      const now = new Date();
      calMonth = now.getMonth();
      calYear = now.getFullYear();
      selectedDate = todayStr();
      render();
    }

    // ── Progress view helpers ──
    function getWeekDates(offset) {
      // Returns array of 7 date strings (Mon-Sun) for the week at the given offset
      const now = new Date();
      const day = now.getDay(); // 0=Sun
      const mondayOffset = day === 0 ? -6 : 1 - day;
      const monday = new Date(now);
      monday.setDate(now.getDate() + mondayOffset + (offset * 7));
      const dates = [];
      for (let i = 0; i < 7; i++) {
        const d = new Date(monday);
        d.setDate(monday.getDate() + i);
        dates.push(toDateStr(d));
      }
      return dates;
    }

    function getWeekLabel(dates) {
      const start = new Date(dates[0] + 'T00:00:00');
      const end = new Date(dates[6] + 'T00:00:00');
      const opts = { month: 'short', day: 'numeric' };
      const startStr = start.toLocaleDateString('en-US', opts);
      const endOpts = start.getMonth() === end.getMonth() ? { day: 'numeric' } : opts;
      const endStr = end.toLocaleDateString('en-US', endOpts);
      return `${startStr} \u2013 ${endStr}, ${end.getFullYear()}`;
    }

    function getWeekTasks(dates) {
      const dateSet = new Set(dates);
      return tasks.filter(t => dateSet.has(t.date));
    }

    function navProgressWeek(dir) {
      progressWeekOffset += dir;
      render();
    }

    function goThisWeek() {
      progressWeekOffset = 0;
      render();
    }

    // ── Progress view ──
    function renderProgressView(app) {
      const weekDates = getWeekDates(progressWeekOffset);
      const prevWeekDates = getWeekDates(progressWeekOffset - 1);
      const weekTasks = getWeekTasks(weekDates);
      const prevWeekTasks = getWeekTasks(prevWeekDates);
      const today = todayStr();
      const isThisWeek = progressWeekOffset === 0;

      // Week label
      const weekLabel = isThisWeek ? 'This week' : (progressWeekOffset === -1 ? 'Last week' : getWeekLabel(weekDates));
      const weekSub = getWeekLabel(weekDates);

      // Core stats
      const total = weekTasks.length;
      const completed = weekTasks.filter(t => t.status === 'completed').length;
      const active = total - completed;
      const pct = total > 0 ? Math.round((completed / total) * 100) : 0;

      const prevTotal = prevWeekTasks.length;
      const prevCompleted = prevWeekTasks.filter(t => t.status === 'completed').length;
      const prevPct = prevTotal > 0 ? Math.round((prevCompleted / prevTotal) * 100) : 0;

      // Ring color
      const ringColor = pct >= 75 ? 'var(--low)' : pct >= 40 ? 'var(--medium)' : pct > 0 ? 'var(--high)' : 'var(--border)';
      const circ = 2 * Math.PI * 42;
      const dashOffset = circ - (circ * pct / 100);

      // Daily chart data
      const dayLabels = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
      const dayData = weekDates.map((date, i) => {
        const dayTasks = weekTasks.filter(t => t.date === date);
        return {
          label: dayLabels[i],
          total: dayTasks.length,
          completed: dayTasks.filter(t => t.status === 'completed').length,
          pending: dayTasks.filter(t => t.status !== 'completed').length,
          isWeekend: i >= 5,
          isToday: date === today,
          date
        };
      });
      const maxDayTotal = Math.max(1, ...dayData.map(d => d.total));

      // Bar chart HTML
      const barsHtml = dayData.map(d => {
        const compH = d.total > 0 ? Math.round((d.completed / maxDayTotal) * 100) : 0;
        const pendH = d.total > 0 ? Math.round((d.pending / maxDayTotal) * 100) : 0;
        return `<div class="bar-col${d.isToday ? ' today-col' : ''}">
          <div class="bar-count">${d.total > 0 ? d.completed + '/' + d.total : ''}</div>
          <div class="bar-stack">
            ${d.pending > 0 ? `<div class="bar-segment pending-bar" style="height:${pendH}%"></div>` : ''}
            ${d.completed > 0 ? `<div class="bar-segment completed-bar" style="height:${compH}%"></div>` : ''}
          </div>
          <div class="bar-day-label${d.isWeekend ? ' weekend-bar' : ''}">${d.label}</div>
        </div>`;
      }).join('');

      // Priority breakdown
      const priHigh = weekTasks.filter(t => t.priority === 'high').length;
      const priMed = weekTasks.filter(t => t.priority === 'medium').length;
      const priLow = weekTasks.filter(t => t.priority === 'low').length;
      const priHighDone = weekTasks.filter(t => t.priority === 'high' && t.status === 'completed').length;
      const priMedDone = weekTasks.filter(t => t.priority === 'medium' && t.status === 'completed').length;
      const priLowDone = weekTasks.filter(t => t.priority === 'low' && t.status === 'completed').length;

      function breakdownBar(label, count, doneCount, total, color) {
        const fillPct = total > 0 ? Math.round((count / total) * 100) : 0;
        const donePct = count > 0 ? Math.round((doneCount / count) * 100) : 0;
        return `<div class="breakdown-row">
          <div class="breakdown-header">
            <span class="breakdown-label"><span class="priority-dot" style="background:${color};width:8px;height:8px"></span> ${label}</span>
            <span class="breakdown-value">${doneCount}/${count} done</span>
          </div>
          <div class="breakdown-track">
            <div class="breakdown-fill" style="width:${fillPct}%;background:${color};opacity:${donePct > 0 ? 0.3 + 0.7 * (donePct/100) : 0.3}"></div>
          </div>
        </div>`;
      }

      // Category breakdown
      const catPersonal = weekTasks.filter(t => t.category === 'personal').length;
      const catProfessional = weekTasks.filter(t => t.category === 'professional').length;
      const catPersonalDone = weekTasks.filter(t => t.category === 'personal' && t.status === 'completed').length;
      const catProfDone = weekTasks.filter(t => t.category === 'professional' && t.status === 'completed').length;

      // Week-over-week comparison
      const prevActive = prevTotal - prevCompleted;
      function delta(curr, prev) {
        const diff = curr - prev;
        if (diff === 0) return '<span class="wow-delta neutral">No change</span>';
        const arrow = diff > 0 ? '\u2191' : '\u2193';
        // For completion rate and completed, up is good
        return `<span class="wow-delta ${diff > 0 ? 'up' : 'down'}">${arrow} ${Math.abs(diff)}</span>`;
      }
      function deltaPct(curr, prev) {
        const diff = curr - prev;
        if (diff === 0) return '<span class="wow-delta neutral">No change</span>';
        const arrow = diff > 0 ? '\u2191' : '\u2193';
        return `<span class="wow-delta ${diff > 0 ? 'up' : 'down'}">${arrow} ${Math.abs(diff)}%</span>`;
      }

      // Streak: count consecutive days (up to today) where all tasks were completed
      function computeStreak() {
        let streak = 0;
        const d = new Date();
        // Start from yesterday if today has pending tasks (give credit for today only if all done)
        while (true) {
          const ds = toDateStr(d);
          const dayT = tasks.filter(t => t.date === ds);
          if (dayT.length === 0) {
            // No tasks = don't count, but also don't break streak (skip)
            d.setDate(d.getDate() - 1);
            // Limit lookback to 60 days
            if (streak === 0 && toDateStr(d) < toDateStr(new Date(Date.now() - 60*86400000))) break;
            continue;
          }
          const allDone = dayT.every(t => t.status === 'completed');
          if (allDone) { streak++; d.setDate(d.getDate() - 1); }
          else break;
        }
        return streak;
      }
      const streak = computeStreak();

      // Streak dots for current week
      const streakDotsHtml = weekDates.map((date, i) => {
        const dayT = weekTasks.filter(t => t.date === date);
        const isToday = date === today;
        const isFuture = date > today;
        let cls = 'streak-dot';
        if (isFuture) {
          // future: plain
        } else if (dayT.length === 0) {
          // no tasks
          cls += ' neutral';
        } else if (dayT.every(t => t.status === 'completed')) {
          cls += ' done';
        } else if (dayT.some(t => t.status === 'completed')) {
          cls += ' partial';
        }
        if (isToday) cls += ' today-dot';
        const label = dayLabels[i].charAt(0);
        return `<div class="${cls}">${label}</div>`;
      }).join('');

      // Busiest day
      const busiestDay = dayData.reduce((best, d) => d.total > best.total ? d : best, dayData[0]);

      app.innerHTML = `
        <div class="progress-week-nav">
          <button class="calendar-nav-btn" onclick="navProgressWeek(-1)" aria-label="Previous week">
            <svg width="14" height="14" viewBox="0 0 14 14"><path d="M9 3L5 7l4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
          </button>
          <div>
            <div class="progress-week-label">${weekLabel}</div>
            <div class="progress-week-sub">${isThisWeek ? weekSub : ''}</div>
          </div>
          <div style="display:flex;gap:6px;align-items:center">
            ${!isThisWeek ? '<button class="calendar-today-btn" onclick="goThisWeek()">This week</button>' : ''}
            <button class="calendar-nav-btn" onclick="navProgressWeek(1)" aria-label="Next week">
              <svg width="14" height="14" viewBox="0 0 14 14"><path d="M5 3l4 4-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
            </button>
          </div>
        </div>

        <!-- Completion rate -->
        <div class="progress-section">
          <div class="progress-section-title">Completion rate</div>
          <div class="ring-row">
            <div class="ring-wrap">
              <svg class="ring-svg" width="100" height="100" viewBox="0 0 100 100">
                <circle class="ring-bg" cx="50" cy="50" r="42"/>
                <circle class="ring-fill" cx="50" cy="50" r="42"
                  stroke="${ringColor}"
                  stroke-dasharray="${circ}"
                  stroke-dashoffset="${dashOffset}"/>
              </svg>
              <div class="ring-label">
                <div class="ring-pct" style="color:${ringColor}">${pct}%</div>
                <div class="ring-sub">Done</div>
              </div>
            </div>
            <div class="ring-stats">
              <div class="ring-stat-row"><span class="ring-stat-label">Total tasks</span><span class="ring-stat-value">${total}</span></div>
              <div class="ring-stat-row"><span class="ring-stat-label">Completed</span><span class="ring-stat-value" style="color:var(--low)">${completed}</span></div>
              <div class="ring-stat-row"><span class="ring-stat-label">Remaining</span><span class="ring-stat-value" style="color:var(--medium)">${active}</span></div>
              <div class="ring-stat-row"><span class="ring-stat-label">Busiest day</span><span class="ring-stat-value">${busiestDay.total > 0 ? busiestDay.label + ' (' + busiestDay.total + ')' : '\u2014'}</span></div>
            </div>
          </div>
        </div>

        <!-- Daily breakdown chart -->
        <div class="progress-section">
          <div class="progress-section-title">Daily breakdown</div>
          <div class="bar-chart">${barsHtml}</div>
        </div>

        <!-- Priority & category -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
          <div class="progress-section">
            <div class="progress-section-title">By priority</div>
            ${breakdownBar('High', priHigh, priHighDone, total, 'var(--high)')}
            ${breakdownBar('Medium', priMed, priMedDone, total, 'var(--medium)')}
            ${breakdownBar('Low', priLow, priLowDone, total, 'var(--low)')}
          </div>
          <div class="progress-section">
            <div class="progress-section-title">By category</div>
            ${breakdownBar('Personal', catPersonal, catPersonalDone, total, 'var(--personal)')}
            ${breakdownBar('Professional', catProfessional, catProfDone, total, 'var(--professional)')}
          </div>
        </div>

        <!-- Streak -->
        <div class="progress-section">
          <div class="progress-section-title">Completion streak</div>
          <div class="streak-row">
            <div class="streak-number">${streak}</div>
            <div class="streak-text"><strong>${streak === 1 ? '1 day' : streak + ' days'}</strong> with all tasks completed</div>
          </div>
          <div class="streak-dots">${streakDotsHtml}</div>
        </div>

        <!-- Week-over-week -->
        <div class="progress-section">
          <div class="progress-section-title">Compared to previous week</div>
          <div class="wow-grid">
            <div class="wow-card">
              <div class="wow-value">${total}</div>
              <div class="wow-label">Total tasks</div>
              ${delta(total, prevTotal)}
            </div>
            <div class="wow-card">

    function loadHealthData() {
      try {
        const stored = JSON.parse(localStorage.getItem(HEALTH_STORAGE_KEY) || 'null');

      } catch {}
      return { date: todayStr(), water: 0, waterGoal: 8, sleep: null, steps: 0, stepsGoal: 10000, meals: [], exercise: [], mood: null };
    }

    function saveHealthData() {
      healthData.date = todayStr();
      localStorage.setItem(HEALTH_STORAGE_KEY, JSON.stringify(healthData));
    }

    function resetHealthIfNewDay() {
      if (healthData.date !== todayStr()) {
        healthData = { date: todayStr(), water: 0, waterGoal: 8, sleep: null, steps: 0, stepsGoal: 10000, meals: [], exercise: [], mood: null };
        saveHealthData();

      healthData.water = Math.max(0, (healthData.water || 0) + delta);
      saveHealthData();

    function adjustSteps(delta) {
      resetHealthIfNewDay();
      healthData.steps = Math.max(0, (healthData.steps || 0) + delta);
      saveHealthData();
      render();
    }

      resetHealthIfNewDay();
      const val = parseFloat(hours);

      }

    function getHealthPatterns() {
      const patterns = [];
      const h = healthData;
      if (h.water >= h.waterGoal) patterns.push({ icon: '&#10003;', text: 'Great job! You hit your hydration goal today.' });
      else if (h.water > 0 && h.water < h.waterGoal / 2) patterns.push({ icon: '&#128167;', text: `Only ${h.water} glasses so far. Try to drink ${h.waterGoal - h.water} more before bedtime.` });
      if (h.sleep !== null && h.sleep < 6) patterns.push({ icon: '&#9888;', text: `${h.sleep} hours of sleep is below recommended. Aim for 7-9 hours tonight.` });
      if (h.sleep !== null && h.sleep >= 7 && h.sleep <= 9) patterns.push({ icon: '&#10003;', text: `${h.sleep} hours of sleep - right in the sweet spot!` });
      if (h.meals.length === 0) {
        const hour = new Date().getHours();
        if (hour >= 10) patterns.push({ icon: '&#127860;', text: 'No meals logged yet today. Remember to eat regularly for sustained energy.' });
      }
      if (h.exercise.length === 0) {
        const hour = new Date().getHours();
        if (hour >= 14) patterns.push({ icon: '&#127939;', text: 'No exercise logged today. Even a 10-minute walk makes a difference!' });

      if (h.mood === 'stressed' || h.mood === 'sad') patterns.push({ icon: '&#128161;', text: 'Feeling down? Try a 5-minute breathing exercise: breathe in 4s, hold 4s, out 4s.' });
      if (h.steps >= h.stepsGoal) patterns.push({ icon: '&#127942;', text: `Amazing! You reached your ${h.stepsGoal.toLocaleString()} step goal!` });

      if (h.mood === 'stressed')

    // ── Health: Image Resize Utility ──
    function resizeHealthImage(file, maxDim) {
      maxDim = maxDim || 800;
      return new Promise(function(resolve) {
        var reader = new FileReader();
        reader.onload = function(e) {
          var img = new Image();
          img.onload = function() {
            var canvas = document.createElement('canvas');
            var w = img.width, h = img.height;
            if (w > maxDim || h > maxDim) {
              if (w > h) { h = Math.round(h * maxDim / w); w = maxDim; }
              else { w = Math.round(w * maxDim / h); h = maxDim; }
            }
            canvas.width = w;
            canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            resolve(canvas.toDataURL('image/jpeg', 0.8).split(',')[1]);
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    // ── Health: Barcode Scanner ──
    function loadExternalScript(src) {
      return new Promise(function(resolve, reject) {
        if (document.querySelector('script[src="' + src + '"]')) { resolve(); return; }
        var s = document.createElement('script');
        s.src = src;
        s.onload = resolve;
        s.onerror = reject;
        document.head.appendChild(s);
      });
    }

    async function startBarcodeScan() {
      try {
        await loadExternalScript('https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js');
      } catch (e) {
        alert('Failed to load barcode scanner. Check your internet connection.');
        return;
      }
      var overlay = document.createElement('div');
      overlay.className = 'barcode-modal-overlay';
      overlay.id = 'barcodeOverlay';
      overlay.innerHTML = '<div class="barcode-modal-content">' +
        '<div class="barcode-modal-header"><h3>Scan Barcode</h3><button class="barcode-modal-close" onclick="stopBarcodeScan()">&times;</button></div>' +
        '<div id="barcode-reader"></div>' +
        '<div class="barcode-modal-footer">Point your camera at a food product barcode</div></div>';
      document.body.appendChild(overlay);

      try {
        healthBarcodeScanner = new Html5Qrcode('barcode-reader');
        await healthBarcodeScanner.start(
          { facingMode: 'environment' },
          { fps: 10, qrbox: { width: 250, height: 150 } },
          async function(decodedText) {
            await stopBarcodeScan();
            await lookupBarcode(decodedText);
          },
          function() {}
        );
      } catch (err) {
        stopBarcodeScan();
        alert('Could not access camera. Please allow camera permissions.');
      }
    }

    async function stopBarcodeScan() {
      if (healthBarcodeScanner) {
        try { await healthBarcodeScanner.stop(); } catch (e) {}
        healthBarcodeScanner = null;
      }
      var overlay = document.getElementById('barcodeOverlay');
      if (overlay) overlay.remove();
    }

    async function lookupBarcode(code) {
      healthPhotoAnalyzing = true;
      healthPhotoResult = null;
      healthMealAdvice = null;
      render();
      try {
        var resp = await fetch('https://world.openfoodfacts.org/api/v0/product/' + code + '.json');
        var data = await resp.json();
        if (data.status === 1 && data.product) {
          var p = data.product;
          var nut = p.nutriments || {};
          healthPhotoResult = {
            barcode: code,
            productName: p.product_name || 'Unknown product',
            brands: p.brands || '',
            foods: [{
              name: p.product_name || 'Scanned product',
              portion: p.serving_size || p.quantity || 'per 100g',
              calories: Math.round(nut['energy-kcal_100g'] || nut['energy-kcal'] || 0),
              protein: Math.round(nut.proteins_100g || nut.proteins || 0),
              carbs: Math.round(nut.carbohydrates_100g || nut.carbohydrates || 0),
              fat: Math.round(nut.fat_100g || nut.fat || 0)
            }],
            totalCalories: Math.round(nut['energy-kcal_100g'] || nut['energy-kcal'] || 0),
            summary: (p.product_name || 'Product') + (p.brands ? ' by ' + p.brands : ''),
            ingredients: p.ingredients_text || '',
            nutriscore: p.nutriscore_grade || null
          };
        } else {
          healthPhotoResult = { error: 'Product not found in database. Try scanning again or log manually.' };
        }
      } catch (e) {
        healthPhotoResult = { error: 'Failed to look up product. Check your connection.' };
      }
      healthPhotoAnalyzing = false;
      render();
    }

    // ── Health: Voice Input (Web Speech API) ──
    function startVoiceMealInput() {
      var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        alert('Voice input is not supported in this browser. Try Chrome or Edge.');
        return;
      }
      if (healthVoiceActive) { stopVoiceMealInput(); return; }

      healthVoiceActive = true;
      render();

      var recognition = new SpeechRecognition();
      recognition.lang = 'en-US';
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;
      window._healthVoiceRecognition = recognition;

      recognition.onresult = async function(event) {
        var text = event.results[0][0].transcript;
        healthVoiceActive = false;
        window._healthVoiceRecognition = null;

        healthPhotoAnalyzing = true;
        healthMealAdvice = null;
        render();
        try {
          var result = await api('/ai/parse-voice-meal', {
            method: 'POST',
            body: JSON.stringify({ text: text })
          });
          if (result.meals && result.meals.length > 0) {
            healthPhotoResult = {
              voiceText: text,
              foods: result.meals.map(function(m) {
                return { name: m.name, portion: 'estimated', calories: m.calories, protein: m.protein, carbs: m.carbs, fat: m.fat };
              }),
              totalCalories: result.totalCalories || 0,
              summary: 'Voice: "' + text + '"',
              advice: result.advice || '',
              reasoning: result.reasoning || ''
            };
          } else {
            var input = document.getElementById('healthMealInput');
            if (input) input.value = text;
          }
        } catch (e) {
          var input2 = document.getElementById('healthMealInput');
          if (input2) input2.value = text;
        }
        healthPhotoAnalyzing = false;
        render();
      };

      recognition.onerror = function() {
        healthVoiceActive = false;
        window._healthVoiceRecognition = null;
        render();
      };

      recognition.onend = function() {
        if (healthVoiceActive) {
          healthVoiceActive = false;
          window._healthVoiceRecognition = null;
          render();
        }
      };

      recognition.start();
    }

    function stopVoiceMealInput() {
      if (window._healthVoiceRecognition) {
        try { window._healthVoiceRecognition.stop(); } catch (e) {}
        window._healthVoiceRecognition = null;
      }
      healthVoiceActive = false;
      render();
    }

    function setAllSort(sort) {

    function renderAllView(app) {
      const PRIORITY_ORDER = { high: 0, medium: 1, low: 2 };
      const filtered = tasks.filter(matchesFilters);
      const active = filtered.filter(t => t.status !== 'completed');
      const completed = filtered.filter(t => t.status === 'completed');

      // Stats
      const totalAll = tasks.length;
      const totalActive = tasks.filter(t => t.status !== 'completed').length;
      const totalCompleted = tasks.filter(t => t.status === 'completed').length;
      const highActive = tasks.filter(t => t.status !== 'completed' && t.priority === 'high').length;
      const personalCount = tasks.filter(t => t.status !== 'completed' && t.category === 'personal').length;
      const professionalCount = tasks.filter(t => t.status !== 'completed' && t.category === 'professional').length;

      // Sort active tasks
      const sorted = [...active].sort((a, b) => {
        if (allSort === 'date') return a.date.localeCompare(b.date);
        if (allSort === 'priority') return PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
        if (allSort === 'category') return a.category.localeCompare(b.category);
        if (allSort === 'location') {
          const aLoc = (a.locationText || '').toLowerCase();
          const bLoc = (b.locationText || '').toLowerCase();
          if (!aLoc && !bLoc) return 0;
          if (!aLoc) return 1;
          if (!bLoc) return -1;
          return aLoc.localeCompare(bLoc);
        }
        return 0;
      });

      const completedSorted = [...completed].sort((a, b) => a.date.localeCompare(b.date));

      // Group helper for date sort: insert date dividers
      function buildGroupedHtml(list) {
        if (list.length === 0) return '';
        if (allSort === 'themes') {
          // Theme grouping mode
          if (themeCache.loading) {
            return `<div class="theme-loading"><div class="spinner"></div><br>Grouping tasks by theme...</div>`;
          }
          if (themeCache.groups.length === 0) {
            // Not enough tasks or no groups - show ungrouped
            return `<div class="day-section"><ul class="task-list">${list.map(t => taskHtml(t, true)).join('')}</ul></div>`;
          }
          let html = '';
          const assigned = new Set();
          for (const group of themeCache.groups) {
            const groupTasks = list.filter(t => group.taskIds.includes(t.id));
            if (groupTasks.length === 0) continue;
            groupTasks.forEach(t => assigned.add(t.id));
            html += `<div class="theme-group-header">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 3h3v3H2zM9 3h3v3H9zM2 8h3v3H2zM9 8h3v3H9z" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" fill="none"/></svg>
              ${escapeHtml(group.theme)}
              <span class="theme-count">${groupTasks.length} task${groupTasks.length !== 1 ? 's' : ''}</span>
            </div>`;
            html += `<ul class="task-list">${groupTasks.map(t => taskHtml(t, true)).join('')}</ul>`;
          }
          // Any unassigned tasks
          const unassigned = list.filter(t => !assigned.has(t.id));
          if (unassigned.length > 0) {
            html += `<div class="theme-group-header">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.3" fill="none"/><path d="M7 5v4M5 7h4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
              Other
              <span class="theme-count">${unassigned.length} task${unassigned.length !== 1 ? 's' : ''}</span>
            </div>`;
            html += `<ul class="task-list">${unassigned.map(t => taskHtml(t, true)).join('')}</ul>`;
          }
          return `<div class="day-section">${html}</div>`;
        }
        if (allSort === 'date') {
          let html = '';
          let lastDate = '';
          for (const t of list) {
            if (t.date !== lastDate) {
              lastDate = t.date;
              const dayInfo = DAYS.find(d => d.key === dayKeyFromDate(t.date));
              const isWeekend = dayInfo && dayInfo.weekend;
              const dateLabel = parseDateNice(t.date);
              html += `<div class="all-section-label" style="margin-top:${html ? '20px' : '0'}">${dateLabel}${isWeekend ? ' <span class="weekend-badge" style="margin-left:6px">Weekend</span>' : ''}</div>`;
            }
            html += taskHtml(t, false);
          }
          return `<div class="day-section"><ul class="task-list">${html}</ul></div>`;
        }
        if (allSort === 'priority') {
          let html = '';
          let lastPri = '';
          for (const t of list) {
            if (t.priority !== lastPri) {
              lastPri = t.priority;
              html += `<div class="all-section-label" style="margin-top:${html ? '20px' : '0'}">${lastPri} priority</div>`;
            }
            html += taskHtml(t, true);
          }
          return `<div class="day-section"><ul class="task-list">${html}</ul></div>`;
        }
        if (allSort === 'category') {
          let html = '';
          let lastCat = '';
          for (const t of list) {
            if (t.category !== lastCat) {
              lastCat = t.category;
              html += `<div class="all-section-label" style="margin-top:${html ? '20px' : '0'}">${lastCat}</div>`;
            }
            html += taskHtml(t, true);
          }
          return `<div class="day-section"><ul class="task-list">${html}</ul></div>`;
        }
        if (allSort === 'location') {
          let html = '';
          let lastLoc = '\x00';
          for (const t of list) {
            const loc = t.locationText || '';
            if (loc !== lastLoc) {
              lastLoc = loc;
              const label = loc || 'No location';
              html += `<div class="all-section-label" style="margin-top:${html ? '20px' : '0'}">
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none" style="vertical-align:-1px;margin-right:4px"><path d="M6 1C4.3 1 3 2.3 3 4c0 2.5 3 5 3 5s3-2.5 3-5c0-1.7-1.3-3-3-3z" stroke="currentColor" stroke-width="1.2" fill="none"/><circle cx="6" cy="4" r="1" fill="currentColor"/></svg>${escapeHtml(label)}</div>`;
            }
            html += taskHtml(t, true);
          }
          return `<div class="day-section"><ul class="task-list">${html}</ul></div>`;
        }
        return `<div class="day-section"><ul class="task-list">${list.map(t => taskHtml(t, true)).join('')}</ul></div>`;
      }

      const activeHtml = sorted.length > 0
        ? buildGroupedHtml(sorted)
        : `<div class="day-section"><div class="empty-state"><p>No active tasks \u2014 everything is done, or add a new one</p><button class="btn btn-sm btn-primary" onclick="openAddModal()">Add task</button></div></div>`;

           <div class="day-section"><ul class="task-list">${completedSorted.map(t => taskHtml(t, true)).join('')}</ul></div>`

        <div class="all-stats all-stats--inline">
          <div class="stat-card">
