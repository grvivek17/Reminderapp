    let _leafletMap = null;
    let _mapMarker = null;
    let _pickedLat = null;
    let _pickedLng = null;
    let _pickedAddr = '';

    function openMapPicker() {
      const modal = document.getElementById('mapPickerModal');
      modal.classList.add('open');
      document.getElementById('mapSearchInput').value = '';
      document.getElementById('mapPinAddr').textContent = 'Tap on the map to drop a pin';
      document.getElementById('mapConfirmBtn').disabled = true;
      _pickedLat = null; _pickedLng = null; _pickedAddr = '';

      // Pre-fill pin from existing hidden inputs
      const existLat = parseFloat(document.getElementById('taskLocationLat').value);
      const existLng = parseFloat(document.getElementById('taskLocationLng').value);

      // Lazy-init Leaflet map
      if (!_leafletMap) {
        const startLat = isNaN(existLat) ? 13.0827 : existLat;
        const startLng = isNaN(existLng) ? 80.2707 : existLng;
        _leafletMap = L.map('leafletMap').setView([startLat, startLng], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
          maxZoom: 19
        }).addTo(_leafletMap);

        _leafletMap.on('click', function(e) {
          mapPlacePin(e.latlng.lat, e.latlng.lng);
        });
      } else {
        // Resize in case modal was hidden before
        setTimeout(() => _leafletMap.invalidateSize(), 100);
      }

      // If editing an existing pinned task, restore the pin
      if (!isNaN(existLat) && !isNaN(existLng)) {
        mapPlacePin(existLat, existLng, false);
        _leafletMap.setView([existLat, existLng], 15);
      }

      setTimeout(() => _leafletMap.invalidateSize(), 200);
    }

    function closeMapPicker() {
      document.getElementById('mapPickerModal').classList.remove('open');
    }

    async function mapPlacePin(lat, lng, reverseGeocode = true) {
      _pickedLat = lat;
      _pickedLng = lng;

      const icon = L.divIcon({
        className: '',
        html: `<div style="
          width:28px;height:28px;
          background:var(--accent, #4f6ef7);
          border:3px solid #fff;
          border-radius:50% 50% 50% 0;
          transform:rotate(-45deg);
          box-shadow:0 2px 8px rgba(0,0,0,0.3);
          margin-top:-28px;margin-left:-14px
        "></div>`,
        iconSize: [28, 28],
        iconAnchor: [14, 28]
      });

      if (_mapMarker) {
        _mapMarker.setLatLng([lat, lng]);
      } else {
        _mapMarker = L.marker([lat, lng], { icon, draggable: true }).addTo(_leafletMap);
        _mapMarker.on('dragend', function(e) {
          const pos = e.target.getLatLng();
          mapPlacePin(pos.lat, pos.lng);
        });
      }

      document.getElementById('mapConfirmBtn').disabled = false;

      const addrEl = document.getElementById('mapPinAddr');
      addrEl.innerHTML = `<span class="map-coord-badge">${lat.toFixed(5)}, ${lng.toFixed(5)}</span>&nbsp; <span style="color:var(--text-muted)">Fetching address...</span>`;
      _pickedAddr = `${lat.toFixed(5)}, ${lng.toFixed(5)}`;

      if (reverseGeocode) {
        try {
          const res = await fetch(
            `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`,
            { headers: { 'User-Agent': 'SmartReminderApp/1.0 (grvivek17@gmail.com)', 'Accept-Language': 'en' } }
          );
          if (res.ok) {
            const data = await res.json();
            if (data && data.display_name) {
              // Build a short address: shop/amenity name + road + suburb/city
              const a = data.address || {};
              const parts = [
                a.amenity || a.shop || a.office || a.building || a.tourism || a.leisure || a.historic,
                a.road || a.pedestrian || a.footway,
                a.suburb || a.neighbourhood || a.city_district || a.quarter,
                a.city || a.town || a.village
              ].filter(Boolean);
              const shortAddr = parts.length > 0 ? parts.slice(0, 3).join(', ') : data.display_name.split(',').slice(0,3).join(',').trim();
              _pickedAddr = shortAddr;
              addrEl.innerHTML = `<span class="map-coord-badge">${lat.toFixed(5)}, ${lng.toFixed(5)}</span>&nbsp; ${shortAddr}`;
            }
          }
        } catch(e) {
          // keep coordinate fallback
        }
      }
    }

    async function mapSearch() {
      const q = document.getElementById('mapSearchInput').value.trim();
      if (!q) return;
      const addrEl = document.getElementById('mapPinAddr');
      addrEl.textContent = 'Searching...';
      try {
        const res = await fetch(
          `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1&countrycodes=in`,
          { headers: { 'User-Agent': 'SmartReminderApp/1.0 (grvivek17@gmail.com)', 'Accept-Language': 'en' } }
        );
        const data = await res.json();
        if (data && data.length > 0) {
          const lat = parseFloat(data[0].lat);
          const lng = parseFloat(data[0].lon);
          _leafletMap.setView([lat, lng], 16);
          mapPlacePin(lat, lng, false);
          const parts = data[0].display_name.split(',').slice(0, 3).join(',').trim();
          _pickedAddr = parts;
          addrEl.innerHTML = `<span class="map-coord-badge">${lat.toFixed(5)}, ${lng.toFixed(5)}</span>&nbsp; ${parts}`;
        } else {
          addrEl.textContent = 'No results found. Try a different search.';
        }
      } catch(e) {
        addrEl.textContent = 'Search failed. Tap the map to pin directly.';
      }
    }

    function mapUseCurrentLocation() {
      if (!navigator.geolocation) { toast('Geolocation not available'); return; }
      const addrEl = document.getElementById('mapPinAddr');
      addrEl.textContent = 'Getting your location...';
      navigator.geolocation.getCurrentPosition(
        function(pos) {
          const lat = pos.coords.latitude;
          const lng = pos.coords.longitude;
          _leafletMap.setView([lat, lng], 16);
          mapPlacePin(lat, lng);
        },
        function(err) { addrEl.textContent = 'Could not get location: ' + err.message; },
        { timeout: 15000, enableHighAccuracy: true }
      );
    }

    function confirmMapLocation() {
      if (_pickedLat == null || _pickedLng == null) return;
      // Fill the task form fields
      document.getElementById('taskLocationLat').value = _pickedLat;
      document.getElementById('taskLocationLng').value = _pickedLng;
      // Fill location text only if currently empty or if it was just coordinates
      const locInput = document.getElementById('taskLocation');
      if (!locInput.value.trim() || /^[\d\.\-,\s]+$/.test(locInput.value.trim())) {
        locInput.value = _pickedAddr;
      }
      closeMapPicker();
      toast('📍 Location pinned from map');
    }

    // Close map modal on backdrop click
    document.getElementById('mapPickerModal').addEventListener('click', function(e) {
      if (e.target === this) closeMapPicker();

    // Auto-show map button when location group is visible
    (function() {
      const locGroup = document.getElementById('locationGroup');
      if (locGroup) locGroup.style.display = '';
    })();

    // Auto-hide/show map button based on admin/location group visibility
    const _origLocPin = document.getElementById('locationPinWrap');
    if (_origLocPin) _origLocPin.style.display = '';

    // Auto-show "Pin current location" once location input has text
    document.getElementById('taskLocation').addEventListener('input', function() {
      const wrap = document.getElementById('locationPinWrap');
      if (wrap) wrap.style.display = this.value.trim() ? '' : 'none';
    });

    // Auto-clear lat/lng hidden fields when location text is manually cleared
    document.getElementById('taskLocation').addEventListener('change', function() {
      if (!this.value.trim()) {
        document.getElementById('taskLocationLat').value = '';
        document.getElementById('taskLocationLng').value = '';
      }
    });

    // Auto-reset pin display when modal opens
    document.getElementById('taskForm').addEventListener('reset', function() {
      document.getElementById('taskLocationLat').value = '';
      document.getElementById('taskLocationLng').value = '';
    });

    // Auto-clear coords if user manually edits location text after picking from map
    let _lastMapPickedText = '';
    document.getElementById('taskLocation').addEventListener('input', function() {
      if (_lastMapPickedText && this.value !== _lastMapPickedText) {
        // User modified the address — clear pinned coords so geocoder re-runs
        document.getElementById('taskLocationLat').value = '';
        document.getElementById('taskLocationLng').value = '';
        _lastMapPickedText = '';
      }
    });

    // Auto-reset map marker when task modal closes
    const _origCloseModal = window.closeModal;
    if (typeof _origCloseModal === 'function') {
      window.closeModal = function() {
        _origCloseModal();
        if (_mapMarker && _leafletMap) {
          _leafletMap.removeLayer(_mapMarker);
          _mapMarker = null;
        }
        _pickedLat = null; _pickedLng = null; _pickedAddr = '';
      };
    }

    // Auto-reset map marker when task modal closes (confirmMapLocation sets _lastMapPickedText)
    const _origConfirmMapLocation = window.confirmMapLocation;

    // Auto-update _lastMapPickedText on confirm
    const _realConfirm = confirmMapLocation;
    // (already defined above as a named function — it will be hoisted)

    // Auto-close map on Escape
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        const modal = document.getElementById('mapPickerModal');
        if (modal.classList.contains('open')) { closeMapPicker(); e.stopPropagation(); }
      }
    });

    // Auto-show background location toggle for web
    // (handled separately in initWebLocation)

    // Auto-reset on new task
    const _origOpenAddTask = window.openAddTask;
    if (typeof _origOpenAddTask === 'function') {
      window.openAddTask = function() {
        _origOpenAddTask.apply(this, arguments);
        _lastMapPickedText = '';
        if (_mapMarker && _leafletMap) {
          _leafletMap.removeLayer(_mapMarker);
          _mapMarker = null;
        }
        _pickedLat = null; _pickedLng = null; _pickedAddr = '';
      };
    }

    // Auto-reset on new task
    // Auto-close map on backdrop or Escape already handled above

    // Auto-update confirm text when pin is dropped
    // (done inside mapPlacePin)

    // Auto-show/hide "Map" button — always visible
    // (button is always in DOM)

    // Auto-geocode location text to lat/lng using the server proxy

    async function geocodeLocationText(text) {
      if (!text || text.length < 2) return null;
      try {
        let queryParams = '?q=' + encodeURIComponent(text);
        try {
          if (isNativeApp()) {
            const Geolocation = getCapPlugin('Geolocation');
            if (Geolocation) {
              const pos = await Geolocation.getCurrentPosition({ enableHighAccuracy: false, timeout: 5000 });
              queryParams += '&lat=' + pos.coords.latitude + '&lon=' + pos.coords.longitude;
            }
          } else if (navigator.geolocation) {
            const pos = await new Promise(function(resolve, reject) {
              navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 5000, maximumAge: 300000 });
            });
            queryParams += '&lat=' + pos.coords.latitude + '&lon=' + pos.coords.longitude;
          }
        } catch (geoErr) {
          // If geolocation fails, proceed without location bias
        }

        const data = await api('/tasks/geocode' + queryParams);
        if (data && data.length > 0) {
          return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
        }
      } catch (e) {
        console.log('Geocoding error:', e.message);
      }
      return null;
    }

    // ── PWA ──
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js').catch(() => {});
    }

    // ── Init ──
    initAuth();
