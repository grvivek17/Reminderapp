    .task-overdue { border-left:3px solid var(--danger) !important; }
    .task-overdue .task-text { color:var(--danger); }

    /* ── Restore button ── */
    .restore-btn { color:var(--status-in-progress) !important; }
    .restore-btn:hover { background:var(--status-in-progress-bg) !important; }

    /* ── Done tab badge ── */
    .done-tab-count { display:inline-flex; align-items:center; justify-content:center; min-width:16px; height:16px; background:var(--low); color:#fff; font-size:0.5rem; font-weight:800; border-radius:8px; padding:0 3px; margin-left:3px; line-height:1; vertical-align:middle; }

    /* ── Logs timeline ── */
    #logsList { list-style:none; padding:0; margin:0; }
    .log-timeline-item { display:flex; gap:12px; padding:10px 0; border-bottom:1px solid var(--border); }
    .log-timeline-item:last-child { border-bottom:none; }
    .log-timeline-dot { width:28px; height:28px; border-radius:50%; background:var(--accent-light); display:flex; align-items:center; justify-content:center; font-size:0.875rem; flex-shrink:0; border:2px solid var(--border); }
    .log-timeline-content { flex:1; min-width:0; }
    .log-message { font-size:0.875rem; color:var(--text); line-height:1.4; }
    .log-time { font-size:0.6875rem; color:var(--text-muted); margin-top:3px; }
    .log-task-info { padding:12px 14px; background:var(--accent-light); border-radius:var(--radius-sm); margin-bottom:14px; font-size:0.8125rem; display:flex; flex-direction:column; gap:5px; border-left:3px solid var(--accent); }

    /* ── Cal routine dot ── */
    .cal-dot-routine { box-shadow:0 0 0 1px var(--accent); }

  </style>
</head>
<body>

  <!-- Auth screen -->
  <div id="authScreen" class="auth-screen" style="display:none">
    <div class="auth-card">
      <h2 id="authTitle">Sign up</h2>
      <p class="auth-sub" id="authSub">Create an account to get started</p>
      <form id="authForm" onsubmit="handleAuth(event)">
        <div class="form-group">
          <label for="authName">Name</label>
          <input type="text" id="authName" class="form-input" placeholder="Your name" required autocomplete="name">
        </div>
        <div class="form-group">
          <label for="authEmail">Email</label>
          <input type="email" id="authEmail" class="form-input" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group" id="authPasswordGroup">
          <label for="authPassword">Password</label>
          <input type="password" id="authPassword" class="form-input" placeholder="Choose a password" required minlength="4" autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%" id="authSubmitBtn">Create account</button>
      </form>
      <div class="auth-toggle" id="authToggle">
        Already have an account? <a onclick="toggleAuthMode()">Log in</a>
      </div>
    </div>
  </div>

  <!-- App wrapper (hidden until logged in) -->
  <div id="appWrapper" style="display:none">

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="header-left">
        <h1><span class="app-logo"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 2C8.13 2 5 5.13 5 9c0 2.38 1.19 4.47 3 5.74V17a1 1 0 001 1h6a1 1 0 001-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.87-3.13-7-7-7z" fill="white" opacity="0.9"/><path d="M9 21h6M12 2V1" stroke="white" stroke-width="1.5" stroke-linecap="round"/><circle cx="18" cy="5" r="2.5" fill="#facc15"/><path d="M18 2v1M21 5h-1M18 8v-1M15 5h1" stroke="#facc15" stroke-width="0.8" stroke-linecap="round"/></svg></span>Smart Reminder</h1>
        <div class="view-toggle" id="viewToggle">
          <button class="active" data-view="all" onclick="switchView('all')">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 2h4v4H1zM9 2h4v4H9zM1 8h4v4H1zM9 8h4v4H9z" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
            <span class="view-label">All</span>
          </button>
          <button data-view="week" onclick="switchView('week')">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 3h12M1 7h12M1 11h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            <span class="view-label">Week</span>
          </button>
          <button data-view="calendar" onclick="switchView('calendar')">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="2" width="12" height="11" rx="1.5" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M1 5.5h12M4.5 1v2M9.5 1v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            <span class="view-label">Calendar</span>
          </button>
          <button data-view="progress" onclick="switchView('progress')">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 12V8M4.5 12V5M8 12V2M11.5 12V7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            <span class="view-label">Progress</span>

  <script>
    // ── API layer ──
    const API_BASE = '/api';
    let authToken = localStorage.getItem('reminder_app_token') || null;

    async function api(path, options = {}) {
      const headers = { 'Content-Type': 'application/json' };
      if (authToken) headers['Authorization'] = 'Bearer ' + authToken;
      const res = await fetch(API_BASE + path, { ...options, headers });
      if (res.status === 401) {
        authToken = null; localStorage.removeItem('reminder_app_token'); showAuth();
        throw new Error('Unauthorized');
      }
      if (!res.ok) throw new Error('Request failed');
      return res.json();
    }

    // ── Constants ──
    const STATUS_LABELS = { not_started: 'Not started', in_progress: 'In progress', on_hold: 'On hold', completed: 'Completed' };
    const STATUS_CYCLE  = ['not_started', 'in_progress', 'on_hold', 'completed'];
    const DAY_NAMES   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const DAY_SHORT   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];

    // ── State ──
    let tasks = [], users = [], currentUser = null;
    let currentView  = 'all';
    let editingId    = null;
    let weekOffset   = 0;
    let calendarYear, calendarMonth;
    let activeFilters = { priority: 'all', category: 'all', day: 'all' };

    // ── Utils ──
    function escapeHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function todayStr()   { return new Date().toISOString().slice(0,10); }
    function toDateStr(d) { return d.toISOString().slice(0,10); }
    function formatShort(ds) {
      if (!ds) return '';
      const d = new Date(ds + 'T00:00:00');
      return DAY_SHORT[d.getDay()] + ' ' + d.getDate() + ' ' + MONTH_NAMES[d.getMonth()].slice(0,3);
    }
    function formatFull(ds) {
      if (!ds) return '';
      const d = new Date(ds + 'T00:00:00');
      return DAY_NAMES[d.getDay()] + ', ' + d.getDate() + ' ' + MONTH_NAMES[d.getMonth()] + ' ' + d.getFullYear();
    }
    function daysFromToday(ds) {
      const t = new Date(); t.setHours(0,0,0,0);
      return Math.round((new Date(ds+'T00:00:00') - t) / 86400000);
    }
    function avatarColor(name) {
      const cols = ['#4f6ef7','#8b5cf6','#0ea5e9','#22c55e','#f59e0b','#ef4444','#ec4899'];
      let h = 0; for (const c of (name||'?')) h = c.charCodeAt(0) + h * 31;
      return cols[Math.abs(h) % cols.length];
    }
    function initials(name) { return (name||'?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase(); }
    function isNativeApp()   { return !!(window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform()); }
    function getCapPlugin(n) { return window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins[n]; }

    function etaStatus(task) {
      if (!task.etaDate || task.status === 'completed') return null;
      const today = todayStr();
      const days  = daysFromToday(task.etaDate);
      if (task.etaDate < today) return { label: 'ETA overdue', cls: 'eta-overdue', icon: '🔴' };
      if (days <= 3)            return { label: `ETA in ${days}d`, cls: 'eta-at-risk', icon: '🟠' };
      return                           { label: formatShort(task.etaDate), cls: 'eta-ok', icon: '⏳' };
    }

    // ── Auth / Init ──
    async function initAuth() {
      if (!authToken) { showAuth(); return; }
      try {
        currentUser = await api('/auth/me');
        [tasks, users] = await Promise.all([api('/tasks'), api('/users')]);
        showApp();
      } catch { showAuth(); }
    }

    function showAuth() {
      document.getElementById('authScreen').style.display = '';
      document.getElementById('appWrapper').style.display = 'none';
    }

    function showApp() {
      document.getElementById('authScreen').style.display = 'none';
      document.getElementById('appWrapper').style.display = '';
      const av = document.getElementById('headerAvatar');
      if (av && currentUser) { av.style.background = avatarColor(currentUser.name); av.textContent = initials(currentUser.name); }
      const nm = document.getElementById('dropdownUserName');  if (nm) nm.textContent = currentUser?.name || '';
      const em = document.getElementById('dropdownUserEmail'); if (em) em.textContent = currentUser?.email || '';
      render();
      initNotifications();
      initNativeLocation();
    }

    // ── View / Filter ──
    function switchView(view) {
      currentView = view;
      document.querySelectorAll('.view-toggle button').forEach(b => b.classList.toggle('active', b.dataset.view === view));
      const df = document.getElementById('dayFilters');
      if (df) df.style.display = view === 'week' ? '' : 'none';
      render();
    }

    function setFilter(type, value, btn) {
      activeFilters[type] = value;
      document.querySelectorAll(`.filter-chip[data-filter="${type}"]`).forEach(c => c.classList.toggle('active', c.dataset.value === value));
      render();
    }

    function applyFilters(list) {
      return list.filter(t => {
        if (activeFilters.priority !== 'all' && t.priority !== activeFilters.priority) return false;
        if (activeFilters.category !== 'all' && t.category !== activeFilters.category) return false;
        return true;
      });
    }

    // ── Component builders ──
    function progressBarHtml(task) {
      if (task.status !== 'in_progress') return '';
      const pct = task.progress || 0;
      return `<div class="task-progress-wrap"><div class="task-progress-bar"><div class="task-progress-fill" style="width:${pct}%"></div></div><span class="task-progress-text">${pct}%</span></div>`;
    }

    function routineBadgeHtml(task) {
      if (!task.routineType || task.routineType === 'none') return '';
      const lbl = { daily:'🔁 Daily', weekly:'🔁 Weekly', monthly:'🔁 Monthly' };
      return `<span class="routine-badge">${lbl[task.routineType] || task.routineType}</span>`;
    }

    function etaBadgeHtml(task) {
      const s = etaStatus(task);
      if (!s) return '';
      return `<span class="eta-badge eta-badge--${s.cls}">${s.icon} ${s.label}</span>`;
    }

    function locationBadgeHtml(task) {
      return task.locationText ? `<span class="location-badge">📍 ${escapeHtml(task.locationText)}</span>` : '';
    }

    // ── Task card HTML ──
    function taskHtml(task, showDate = false, opts = {}) {
      const statusLabel = STATUS_LABELS[task.status] || task.status;
      const today = todayStr();
      const isCompleted = task.status === 'completed';
      const isOverdue   = !isCompleted && task.date && task.date < today;

      let dateBadge = '';
      if (showDate && task.date) {
        const lbl = task.date === today ? 'Today' : formatShort(task.date);
        dateBadge = `<span class="date-label${isOverdue?' date-overdue':''}">${isOverdue?'⚠ ':''}${lbl}</span>`;
      }

      let shiftBadge = '';
      if (task.originalStartDate && task.originalStartDate !== task.date && !isCompleted) {
        const d = Math.abs(daysFromToday(task.originalStartDate) - daysFromToday(task.date));
        shiftBadge = `<span class="date-shift-badge" title="Original: ${task.originalStartDate}">📅 +${d}d shift</span>`;
      }

      const assigneeHtml = (task.assignedTo||[]).map(uid => {
        const u = users.find(x => x.id === uid);
        return u ? `<span class="assignee-chip"><span class="user-avatar sm" style="background:${avatarColor(u.name)}">${initials(u.name)}</span>${escapeHtml(u.name.split(' ')[0])}</span>` : '';
      }).join('');

      const restoreBtn = (isCompleted && opts.showRestore)
        ? `<button class="btn-icon restore-btn" onclick="restoreTask(${task.id})" title="Restore task">↩</button>` : '';
      const deleteBtn  = currentUser?.role === 'admin'
        ? `<button class="btn-icon" style="color:var(--danger)" onclick="deleteTask(${task.id})" title="Delete">🗑</button>` : '';

      return `<li class="task-item status-${task.status}${isOverdue?' task-overdue':''}">
        <span class="priority-dot ${task.priority}"></span>
        <button class="status-badge ${task.status}" onclick="cycleStatus(${task.id})">${statusLabel}</button>
        <div class="task-body">
          <div class="task-text">${escapeHtml(task.text)}</div>
          ${progressBarHtml(task)}
          <div class="task-meta">
            ${dateBadge}${etaBadgeHtml(task)}${routineBadgeHtml(task)}${shiftBadge}${locationBadgeHtml(task)}<span class="tag ${task.category}">${task.category}</span>${assigneeHtml}
          </div>
        </div>
        <div class="task-actions">${restoreBtn}${deleteBtn}<button class="btn-icon" onclick="viewLogs(${task.id})" title="History">📋</button><button class="btn-icon" onclick="openEditModal(${task.id})" title="Edit">✏️</button></div>
      </li>`;
    }

    // ── Render dispatcher ──
    function render() {
      const app = document.getElementById('app');
      updateDoneTabBadge();
      if (currentView === 'completed') renderCompletedView(app);
      else if (currentView === 'week')     renderWeekView(app);
      else if (currentView === 'calendar') renderCalendarView(app);
      else if (currentView === 'progress') renderProgressView(app);
      else if (currentView === 'health')   renderHealthView(app);
      else if (currentView === 'expense')  renderExpenseView(app);
      else renderAllView(app);
      updateNotificationBell();
    }

    function updateDoneTabBadge() {
      const cnt = tasks.filter(t => t.status === 'completed').length;
      const el  = document.getElementById('doneTabBadge');
      if (el) { el.textContent = cnt; el.style.display = cnt > 0 ? '' : 'none'; }
    }

    // ── All Tasks View ──
    function renderAllView(app) {
      const today   = todayStr();
      const active  = applyFilters(tasks.filter(t => t.status !== 'completed'));
      const overdue = active.filter(t => t.date && t.date < today).sort((a,b) => a.date.localeCompare(b.date));
      const dueToday  = active.filter(t => t.date === today);
      const upcoming  = active.filter(t => t.date && t.date > today).sort((a,b) => a.date.localeCompare(b.date));
      const noDate    = active.filter(t => !t.date);
      const inProg    = active.filter(t => t.status === 'in_progress').length;
      const hiPri     = active.filter(t => t.priority === 'high').length;

      const section = (label, color, icon, list) => list.length === 0 ? '' : `
        <div class="all-section-label" style="color:${color}">${icon} ${label} (${list.length})</div>
        <div class="day-section"><ul class="task-list">${list.map(t=>taskHtml(t,true)).join('')}</ul></div>`;

      app.innerHTML = `
        <div class="all-stats all-stats--inline">
          <div class="stat-card"><div class="stat-value accent">${active.length}</div><div class="stat-label">Active</div></div>
          <div class="stat-card"><div class="stat-value" style="color:var(--status-in-progress)">${inProg}</div><div class="stat-label">In Progress</div></div>
          <div class="stat-card"><div class="stat-value high-color">${overdue.length}</div><div class="stat-label">Overdue</div></div>
          <div class="stat-card"><div class="stat-value medium-color">${dueToday.length}</div><div class="stat-label">Due Today</div></div>
          <div class="stat-card"><div class="stat-value high-color">${hiPri}</div><div class="stat-label">High Pri</div></div>

        <div class="stat-card"><div class="stat-value done-color">${tasks.filter(t=>t.status==='completed').length}</div><div class="stat-label">Completed</div></div>`;

    // ── Week View ──
    function renderWeekView(app) {
      const today = todayStr();
      const d = new Date();
      d.setDate(d.getDate() + weekOffset * 7);
      const dow = d.getDay();
      const mon = new Date(d);
      mon.setDate(d.getDate() - (dow === 0 ? 6 : dow - 1));
      const days = Array.from({length:7},(_,i)=>{ const dt=new Date(mon); dt.setDate(mon.getDate()+i); return toDateStr(dt); });
      const active  = applyFilters(tasks.filter(t => t.status !== 'completed'));
      const dayMap  = ['sun','mon','tue','wed','thu','fri','sat'];

      let html = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:8px">
        <button class="btn btn-sm" onclick="weekOffset--;render()">← Prev</button>
        <div style="text-align:center"><div style="font-weight:700">${formatShort(days[0])} – ${formatShort(days[6])}</div>${weekOffset===0?'<div style="font-size:0.75rem;color:var(--accent)">This week</div>':''}</div>
        <button class="btn btn-sm" onclick="weekOffset++;render()">Next →</button>
      </div>`;

      for (let i = 0; i < 7; i++) {
        const ds    = days[i];
        const jsDay = new Date(ds+'T00:00:00').getDay();
        const isWknd  = jsDay === 0 || jsDay === 6;
        const isToday = ds === today;
        if (activeFilters.day !== 'all' && activeFilters.day !== dayMap[jsDay]) continue;
        const dayTasks = active.filter(t => t.date === ds);
        const doneCnt  = tasks.filter(t => t.date === ds && t.status === 'completed').length;
        html += `<div class="day-section${isWknd?' weekend':''}">
          <div class="day-header">
            <div class="day-title">${DAY_NAMES[jsDay]}${isToday?'<span style="background:var(--accent);color:#fff;font-size:0.5625rem;padding:2px 6px;border-radius:4px;margin-left:6px">TODAY</span>':''}${isWknd?'<span class="weekend-badge">Weekend</span>':''}</div>
            <div style="display:flex;align-items:center;gap:8px">
              ${doneCnt>0?`<span class="day-summary">✅ ${doneCnt} done</span>`:''}
              <span class="day-summary">${formatShort(ds)}</span>
              <button class="btn btn-sm" onclick="openAddModalForDate('${ds}')">+ Add</button>
            </div>
          </div>
          ${dayTasks.length>0
            ?`<ul class="task-list">${dayTasks.map(t=>taskHtml(t,false)).join('')}</ul>`
            :`<div class="empty-state" style="padding:16px"><button class="btn btn-sm" onclick="openAddModalForDate('${ds}')">+ Add task</button></div>`}
        </div>`;
      }
      app.innerHTML = html;
    }

    // ── Calendar View ──
    function renderCalendarView(app) {
      const today = todayStr();
      const now   = new Date();
      if (calendarYear === undefined) { calendarYear = now.getFullYear(); calendarMonth = now.getMonth(); }
      const firstDay = new Date(calendarYear, calendarMonth, 1);
      const lastDay  = new Date(calendarYear, calendarMonth + 1, 0);
      const startDow = firstDay.getDay();
      const active   = applyFilters(tasks.filter(t => t.status !== 'completed'));
      const selDate  = localStorage.getItem('calSelDate') || today;

      let html = `<div class="calendar-wrapper">
        <div class="calendar-nav">
          <button class="calendar-nav-btn" onclick="if(calendarMonth--<1){calendarMonth=11;calendarYear--;}render()">‹</button>
          <div class="calendar-nav-center">
            <button class="calendar-today-btn" onclick="calendarYear=new Date().getFullYear();calendarMonth=new Date().getMonth();render()">Today</button>
            <span class="calendar-nav-title">${MONTH_NAMES[calendarMonth]} ${calendarYear}</span>
          </div>
          <button class="calendar-nav-btn" onclick="if(calendarMonth++>10){calendarMonth=0;calendarYear++;}render()">›</button>
        </div>
        <div class="calendar-grid">
          ${['Su','Mo','Tu','We','Th','Fr','Sa'].map((d,i)=>`<div class="calendar-day-label${i===0||i===6?' weekend-label':''}">${d}</div>`).join('')}`;

      for (let i = 0; i < startDow; i++) html += '<div class="calendar-cell outside"></div>';
      for (let day = 1; day <= lastDay.getDate(); day++) {
        const ds    = `${calendarYear}-${String(calendarMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
        const jsDay = new Date(ds+'T00:00:00').getDay();
        const isWknd  = jsDay === 0 || jsDay === 6;
        const isToday = ds === today;
        const isSel   = ds === selDate;
        const dt      = active.filter(t => t.date === ds);
        html += `<div class="calendar-cell${isWknd?' weekend-cell':''}${isToday?' today':''}${isSel?' selected':''}" onclick="localStorage.setItem('calSelDate','${ds}');render()">
          <div class="cal-date">${day}</div>
          <div class="cal-dots">${dt.slice(0,4).map(t=>`<div class="cal-dot ${t.priority}${t.routineType&&t.routineType!=='none'?' cal-dot-routine':''}"></div>`).join('')}</div>
          ${dt.length>0?`<div class="cal-task-count">${dt.length}</div>`:''}
        </div>`;
      }
      html += '</div></div>';

      const selTasks = active.filter(t => t.date === selDate);
      html += `<div class="selected-date-panel">
        <div class="selected-date-header">
          <div class="selected-date-title">${formatFull(selDate)}${selDate===today?'<span style="background:var(--accent);color:#fff;font-size:0.625rem;padding:2px 6px;border-radius:4px;margin-left:8px">Today</span>':''}</div>
          <button class="btn btn-sm btn-primary" onclick="openAddModalForDate('${selDate}')">+ Add</button>
        </div>
        ${selTasks.length>0
          ?`<div class="day-section"><ul class="task-list">${selTasks.map(t=>taskHtml(t,false)).join('')}</ul></div>`
          :`<div class="empty-state"><p>No tasks on this day.</p><button class="btn btn-sm" onclick="openAddModalForDate('${selDate}')">+ Add task</button></div>`}
      </div>`;
      app.innerHTML = html;
    }

    // ── Progress View ──
    function renderProgressView(app) {
      const today  = todayStr();
      const total  = tasks.length;
      const done   = tasks.filter(t=>t.status==='completed').length;
      const inProg = tasks.filter(t=>t.status==='in_progress');
      const pct    = total > 0 ? Math.round(done/total*100) : 0;
      const C      = 2*Math.PI*40;
      const overdue = tasks.filter(t=>t.status!=='completed'&&t.date&&t.date<today).length;

      const d = new Date(); d.setDate(d.getDate()-(d.getDay()===0?6:d.getDay()-1));
      const weekDays = Array.from({length:7},(_,i)=>{ const dt=new Date(d); dt.setDate(d.getDate()+i); return toDateStr(dt); });
      const maxT = Math.max(...weekDays.map(ds=>tasks.filter(t=>t.date===ds).length),1);

      const ipCards = inProg.length > 0 ? inProg.map(t=>`
        <div style="margin-bottom:12px;padding:14px;background:var(--bg);border-radius:var(--radius-sm);border:1px solid var(--border)">
          <div style="display:flex;justify-content:space-between;margin-bottom:8px">
            <span style="font-size:0.875rem;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(t.text)}</span>
            <span style="font-size:1.125rem;font-weight:800;color:var(--accent);margin-left:8px;flex-shrink:0">${t.progress||0}%</span>
          </div>
          <div class="task-progress-wrap"><div class="task-progress-bar task-progress-bar--lg"><div class="task-progress-fill" style="width:${t.progress||0}%"></div></div></div>
          <div style="margin-top:10px;display:flex;align-items:center;gap:8px">
            <input type="range" min="0" max="100" value="${t.progress||0}" style="flex:1" oninput="updateProgress(${t.id},+this.value)">
            ${etaBadgeHtml(t)}
            <button class="btn btn-sm" onclick="openEditModal(${t.id})">Edit</button>
          </div>
          ${t.etaDate?`<div style="font-size:0.75rem;color:var(--text-muted);margin-top:4px">ETA: ${formatShort(t.etaDate)}</div>`:''}
        </div>`).join('') : '<div class="empty-state" style="padding:20px"><p>No tasks in progress.</p></div>';

      app.innerHTML = `
        <div class="progress-section">
          <div class="progress-section-title">Overall Completion</div>
          <div class="ring-row">
            <div class="ring-wrap">
              <svg class="ring-svg" width="100" height="100" viewBox="0 0 100 100">
                <circle class="ring-bg" cx="50" cy="50" r="40"/>
                <circle class="ring-fill" cx="50" cy="50" r="40" stroke="${pct>70?'var(--low)':pct>40?'var(--medium)':'var(--accent)'}" stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${(C-(pct/100)*C).toFixed(1)}"/>
              </svg>
              <div class="ring-label"><div class="ring-pct">${pct}%</div><div class="ring-sub">Done</div></div>
            </div>
            <div class="ring-stats">
              <div class="ring-stat-row"><span class="ring-stat-label">Total</span><span class="ring-stat-value">${total}</span></div>
              <div class="ring-stat-row"><span class="ring-stat-label">Completed</span><span class="ring-stat-value" style="color:var(--low)">${done}</span></div>
              <div class="ring-stat-row"><span class="ring-stat-label">In Progress</span><span class="ring-stat-value" style="color:var(--status-in-progress)">${inProg.length}</span></div>
              <div class="ring-stat-row"><span class="ring-stat-label">Overdue</span><span class="ring-stat-value" style="color:var(--danger)">${overdue}</span></div>
            </div>
          </div>
        </div>
        <div class="progress-section">
          <div class="progress-section-title">🔄 In-Progress Work Updates</div>
          ${ipCards}
        </div>
        <div class="progress-section">
          <div class="progress-section-title">📊 This Week Activity</div>
          <div class="bar-chart">${weekDays.map((ds,i)=>{
            const dt=tasks.filter(t=>t.date===ds).length;
            const dc=tasks.filter(t=>t.date===ds&&t.status==='completed').length;
            const bH=dt>0?Math.max(10,Math.round(dt/maxT*100)):4;
            const isWknd=i===5||i===6;
            const isToday=ds===today;
            return `<div class="bar-col${isToday?' today-col':''}">
              <div class="bar-count">${dt||''}</div>
              <div class="bar-stack">${dc>0?`<div class="bar-segment completed-bar" style="height:${Math.round(dc/dt*bH)}%"></div>`:''}${dt-dc>0?`<div class="bar-segment pending-bar" style="height:${Math.round((dt-dc)/dt*bH)}%"></div>`:''}</div>
              <div class="bar-day-label${isWknd?' weekend-bar':''}">${DAY_SHORT[new Date(ds+'T00:00:00').getDay()]}</div>
            </div>`;}).join('')}</div>
        </div>
        <div class="progress-section">
          <div class="progress-section-title">🔁 Routine Tasks Overview</div>
          ${['daily','weekly','monthly'].map(rt=>{
            const rt2 = tasks.filter(t=>t.routineType===rt&&t.status!=='completed');
            return `<div class="breakdown-row">
              <div class="breakdown-header"><span class="breakdown-label"><span class="routine-badge">🔁 ${rt.charAt(0).toUpperCase()+rt.slice(1)}</span></span><span class="breakdown-value">${rt2.length} active</span></div>
              ${rt2.length>0?`<div style="font-size:0.75rem;color:var(--text-muted);margin-top:4px">${rt2.slice(0,3).map(t=>escapeHtml(t.text)).join(' · ')}${rt2.length>3?' +more':''}</div>`:''}
            </div>`;}).join('')}
        </div>`;
    }

    async function updateProgress(taskId, value) {
      const task = tasks.find(t => t.id == taskId);
      if (!task) return;
      task.progress = value;
      clearTimeout(task._pt);
      task._pt = setTimeout(async () => {
        try {
          await api('/tasks/'+taskId, {method:'PUT', body:JSON.stringify({
            text:task.text, date:task.date, priority:task.priority,
            category:task.category, status:task.status, routineType:task.routineType,
            progress:value, etaDate:task.etaDate,
            locationText:task.locationText, locationLat:task.locationLat, locationLng:task.locationLng
          })});
          toast('Progress updated ✓');
        } catch(e) { console.error('Progress update error', e); }
      }, 1000);
    }

    // ── Health View ──

        <h2>Health Coach</h2><p>Advanced wellness tracking features are in development.</p>

    function renderExpenseView(app) {
      app.innerHTML = `<div class="coming-soon-page"><div class="coming-soon-icon"><svg width="36" height="36" viewBox="0 0 36 36" fill="none"><path d="M18 3v30M10 10c0-4 3-7 8-7s8 3 8 7-3 7-8 7-8 3-8 7 3 7 8 7 8-3 8-7" stroke="var(--status-in-progress)" stroke-width="2" stroke-linecap="round" fill="none"/></svg></div><h2>Expense Tracking</h2><p>Budget & expense tracking coming soon.</p></div>`;

    // ── Completed View ──
    function renderCompletedView(app) {
      const list = applyFilters(tasks.filter(t => t.status === 'completed'))
        .sort((a,b) => (b.updatedAt||'').localeCompare(a.updatedAt||''));
      if (list.length === 0) {
        app.innerHTML = '<div class="empty-state"><p>No completed tasks yet.</p></div>';
        return;
      }
      app.innerHTML = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <h3 style="font-weight:700">✅ Completed (${list.length})</h3>
      </div><div class="day-section"><ul class="task-list">${list.map(t=>taskHtml(t,true,{showRestore:true})).join('')}</ul></div>`;
    }

    // ── Status actions ──
    async function cycleStatus(id) {
      id = Number(id);
      const task = tasks.find(t => t.id == id);
      if (!task) return;
      const idx       = STATUS_CYCLE.indexOf(task.status);
      const newStatus = STATUS_CYCLE[(idx + 1) % STATUS_CYCLE.length];
      try {
        const res = await api('/tasks/'+id+'/status', {method:'PUT', body:JSON.stringify({status:newStatus})});
        task.status = res.status;
        if (res.newDate) task.date = res.newDate;
        if (newStatus === 'completed' && task.routineType && task.routineType !== 'none') {
          toast(`✅ Done! Next occurrence: ${formatShort(res.newDate)}`);
        } else if (newStatus === 'completed') { toast('✅ Task completed!'); }
        render();
      } catch(e) { toast('Failed to update status'); }
    }

    async function restoreTask(id) {
      const task = tasks.find(t => t.id == id);
      if (!task) return;
      try {
        await api('/tasks/'+id+'/status', {method:'PUT', body:JSON.stringify({status:'not_started'})});
        task.status = 'not_started';
        toast('↩ Task restored to active');
        render();
      } catch(e) { toast('Failed to restore task'); }
    }

    async function deleteTask(id) {
      if (!confirm('Delete this task permanently?')) return;
      try {
        await api('/tasks/'+id, {method:'DELETE'});
        tasks = tasks.filter(t => t.id != id);
        toast('Task deleted');
        render();
      } catch(e) { toast('Failed to delete task'); }
    }

    // ── Logs modal (timeline) ──
    async function viewLogs(taskId) {
      const modal = document.getElementById('logsModal');
      const task  = tasks.find(t => t.id == taskId);
      const titleEl = modal.querySelector('h2');
      if (titleEl && task) titleEl.textContent = '📋 History: ' + task.text.slice(0,50) + (task.text.length>50?'…':'');
      modal.classList.add('open');
      const list = document.getElementById('logsList');
      list.innerHTML = '<li style="color:var(--text-muted);padding:12px 0">Loading…</li>';
      try {
        const logs = await api('/tasks/'+taskId+'/logs');
        let infoHtml = '';
        if (task) {
          const drift = task.originalStartDate && task.originalStartDate !== task.date
            ? Math.abs(daysFromToday(task.originalStartDate) - daysFromToday(task.date)) : 0;
          infoHtml = `<li class="log-task-info">
            <div><strong>Status:</strong> <span class="status-badge ${task.status}" style="font-size:0.7rem">${STATUS_LABELS[task.status]}</span></div>
            ${task.originalStartDate?`<div><strong>Original start:</strong> ${formatShort(task.originalStartDate)}</div>`:''}
            ${task.etaDate?`<div><strong>ETA:</strong> ${formatShort(task.etaDate)} ${etaBadgeHtml(task)}</div>`:''}
            ${drift>0?`<div style="color:var(--medium)">📅 Schedule drifted by ${drift} day(s)</div>`:''}
          </li>`;
        }
        if (logs.length === 0) {
          list.innerHTML = infoHtml + '<li style="color:var(--text-muted);padding:8px 0">No history entries yet.</li>';
          return;
        }
        list.innerHTML = infoHtml + logs.map(l => {
          const msg = l.LOG_MESSAGE || l.log_message || '';
          const ts  = l.CREATED_AT || l.created_at || '';
          const fmt = ts ? new Date(ts).toLocaleString() : '';
          const icon= msg.includes('rolled over')?'🔁':msg.includes('date')||msg.includes('Date')?'📅':msg.includes('ETA')?'⏳':msg.includes('created')?'🆕':'📝';
          return `<li class="log-timeline-item">
            <div class="log-timeline-dot">${icon}</div>
            <div class="log-timeline-content"><div class="log-message">${escapeHtml(msg)}</div>${fmt?`<div class="log-time">${fmt}</div>`:''}</div>
          </li>`;
        }).join('');
      } catch(e) { list.innerHTML = '<li style="color:var(--danger)">Failed to load history.</li>'; }
    }

    // ── Add / Edit modal ──
    function openAddModal() { openAddModalForDate(todayStr()); }

    function openAddModalForDate(date) {
      editingId = null;
      document.getElementById('modalTitle').textContent = 'Add task';
      document.getElementById('modalSubmitBtn').textContent = 'Add task';
      document.getElementById('taskForm').reset();
      document.getElementById('taskDate').value = date;
      document.getElementById('progressGroup').style.display = 'none';
      document.getElementById('progressVal').textContent = '0';
      renderAssignPicker([]);
      document.getElementById('taskModal').classList.add('open');
    }

    function openEditModal(id) {
      const task = tasks.find(t => t.id == id);
      if (!task) return;
      editingId = task.id;
      document.getElementById('modalTitle').textContent = 'Edit task';
      document.getElementById('modalSubmitBtn').textContent = 'Save changes';
      document.getElementById('taskText').value  = task.text;
      document.getElementById('taskDate').value  = task.date || '';
      const pr = document.querySelector(`input[name="priority"][value="${task.priority}"]`); if (pr) pr.checked = true;
      const ca = document.querySelector(`input[name="category"][value="${task.category}"]`); if (ca) ca.checked = true;
      const st = document.querySelector(`input[name="status"][value="${task.status}"]`);     if (st) st.checked = true;
      const pv = task.progress || 0;
      document.getElementById('taskProgress').value  = pv;
      document.getElementById('progressVal').textContent = pv;
      document.getElementById('progressGroup').style.display = task.status === 'in_progress' ? '' : 'none';
      document.getElementById('taskEta').value      = task.etaDate || '';
      document.getElementById('taskRoutine').value  = task.routineType || 'none';
      const loc = document.getElementById('taskLocation');     if (loc) loc.value = task.locationText || '';
      const lat = document.getElementById('taskLocationLat');  if (lat) lat.value = task.locationLat  || '';
      const lng = document.getElementById('taskLocationLng');  if (lng) lng.value = task.locationLng  || '';
      renderAssignPicker(task.assignedTo || []);
      document.getElementById('taskModal').classList.add('open');
    }

    function renderAssignPicker(sel) {
      const p = document.getElementById('assignPicker');
      if (!p) return;
      const others = users.filter(u => u.id !== currentUser?.id);
      p.innerHTML = others.length === 0
        ? '<span style="color:var(--text-muted);font-size:0.8125rem">No other users</span>'
        : others.map(u=>`<label class="assign-option${sel.includes(u.id)?' selected':''}">
            <input type="checkbox" name="assignee" value="${u.id}"${sel.includes(u.id)?' checked':''} onchange="this.closest('.assign-option').classList.toggle('selected',this.checked)">
            <span class="user-avatar sm" style="background:${avatarColor(u.name)}">${initials(u.name)}</span>
            ${escapeHtml(u.name)}
          </label>`).join('');
    }

    function closeModal() {
      editingId = null;
      document.getElementById('taskModal').classList.remove('open');
    }

    async function handleSubmit(e) {
      e.preventDefault();
      const status     = document.querySelector('input[name="status"]:checked')?.value || 'not_started';
      const assignedTo = [...document.querySelectorAll('input[name="assignee"]:checked')].map(el=>parseInt(el.value));
      const loc = document.getElementById('taskLocation');
      const lat = document.getElementById('taskLocationLat');
      const lng = document.getElementById('taskLocationLng');
      const body = {
        text:       document.getElementById('taskText').value.trim(),
        date:       document.getElementById('taskDate').value,
        priority:   document.querySelector('input[name="priority"]:checked')?.value || 'medium',
        category:   document.querySelector('input[name="category"]:checked')?.value || 'personal',
        status, assignedTo,
        routineType: document.getElementById('taskRoutine').value || 'none',
        progress:    status === 'in_progress' ? parseInt(document.getElementById('taskProgress').value) : 0,
        etaDate:     document.getElementById('taskEta').value || null,
        locationText: loc?.value || null,
        locationLat:  parseFloat(lat?.value) || null,
        locationLng:  parseFloat(lng?.value) || null
      };
      const btn = document.getElementById('modalSubmitBtn');
      btn.disabled = true; btn.textContent = editingId ? 'Saving…' : 'Adding…';
      try {
        if (editingId) {
          const updated = await api('/tasks/'+editingId, {method:'PUT', body:JSON.stringify(body)});
          const idx = tasks.findIndex(t => t.id == editingId);
          if (idx >= 0) tasks[idx] = updated;
          toast('Task updated ✓');
        } else {
          const newTask = await api('/tasks', {method:'POST', body:JSON.stringify(body)});
          tasks.push(newTask);
          toast('Task added ✓');
        }
        closeModal(); render();
      } catch { toast('Failed to save task'); }
      finally { btn.disabled = false; btn.textContent = editingId ? 'Save changes' : 'Add task'; }
    }

    // ── Auth handlers ──
    async function handleAuth(e) {
      e.preventDefault();
      const isLogin = document.getElementById('authTitle').textContent === 'Log in';
      const email = document.getElementById('authEmail').value;
      const password = document.getElementById('authPassword').value;
      const name = document.getElementById('authName').value;
      const btn = document.getElementById('authSubmitBtn');
      btn.disabled = true;
      try {
        const path    = isLogin ? '/auth/login' : '/auth/register';
        const reqBody = isLogin ? {email,password} : {name,email,password};
        const res = await api(path, {method:'POST', body:JSON.stringify(reqBody)});
        authToken = res.token;
        localStorage.setItem('reminder_app_token', authToken);
        currentUser = res.user;
        [tasks, users] = await Promise.all([api('/tasks'), api('/users')]);
        showApp();
      } catch { toast('Auth failed. Check your credentials.'); }
      finally { btn.disabled = false; }
    }

    function toggleAuthMode() {
      const isLogin = document.getElementById('authTitle').textContent === 'Log in';
      document.getElementById('authTitle').textContent = isLogin ? 'Sign up' : 'Log in';
      document.getElementById('authSub').textContent   = isLogin ? 'Create an account to get started' : 'Welcome back!';
      document.getElementById('authSubmitBtn').textContent = isLogin ? 'Create account' : 'Log in';
      document.getElementById('authToggle').innerHTML = isLogin
        ? 'Already have an account? <a onclick="toggleAuthMode()">Log in</a>'
        : "Don't have an account? <a onclick=\"toggleAuthMode()\">Sign up</a>";

      if (ng) ng.style.display = isLogin ? '' : 'none';
    }

    function logout() {
      authToken = null; currentUser = null; tasks = []; users = [];
      localStorage.removeItem('reminder_app_token');
      showAuth();
    }

    // ── User dropdown ──
    function toggleUserDropdown(e) { e.stopPropagation(); document.getElementById('userDropdown').classList.toggle('open'); }
    function closeUserDropdown()   { document.getElementById('userDropdown')?.classList.remove('open'); }

    async function openManageUsers() {

    document.addEventListener('click', function(e) {
      if (!e.target.closest('#userMenu')) closeUserDropdown();
      if (!e.target.closest('.notif-wrap')) closeNotificationPanel();
    });

    function toast(message) {
      const container = document.getElementById('toasts');
      const el = document.createElement('div');
      el.className = 'toast';
      el.textContent = message;
      container.appendChild(el);
      setTimeout(() => {
        el.style.opacity = '0';
        el.style.transition = 'opacity 200ms';
        setTimeout(() => el.remove(), 200);
      }, 2000);
    }

    // ── Notifications ──
    function getNotifications() {
      const today = todayStr();
      const notifs = [];
      tasks.forEach(t => {
        if (t.status === 'completed') return;
        if (t.date < today) {
          notifs.push({ type: 'overdue', task: t, label: 'Overdue' });
        } else if (t.date === today) {
          notifs.push({ type: 'due-today', task: t, label: 'Due today' });
        }
      });
      notifs.sort((a, b) => {
        if (a.type === 'overdue' && b.type !== 'overdue') return -1;
        if (a.type !== 'overdue' && b.type === 'overdue') return 1;
        return a.task.date.localeCompare(b.task.date);
      });
      return notifs;
    }

    function getUpcomingNotifications() {
      const today = todayStr();
      const d = new Date();
      d.setDate(d.getDate() + 3);
      const limit = toDateStr(d);
      return tasks
        .filter(t => t.status !== 'completed' && t.date > today && t.date <= limit)
        .sort((a, b) => a.date.localeCompare(b.date))
        .map(t => ({ type: 'upcoming', task: t, label: formatShort(t.date) }));
    }

    function updateNotificationBell() {
      const notifs = getNotifications();
      const badge = document.getElementById('notifBadge');
      if (!badge) return;
      const count = notifs.length;
      badge.textContent = count > 99 ? '99+' : count;
      badge.style.display = count > 0 ? '' : 'none';
    }

    function toggleNotificationPanel(e) {
      e.stopPropagation();
      const dd = document.getElementById('notifDropdown');
      const isOpen = dd.classList.contains('open');
      closeUserDropdown();
      if (isOpen) { dd.classList.remove('open'); return; }
      renderNotificationDropdown();
      dd.classList.add('open');
    }

    function closeNotificationPanel() {
      const dd = document.getElementById('notifDropdown');
      if (dd) dd.classList.remove('open');
    }

    function renderNotificationDropdown() {
      const notifs = getNotifications();
      const upcoming = getUpcomingNotifications();
      const dd = document.getElementById('notifDropdown');
      if (!dd) return;

      let html = '<div class="notif-header"><span>Notifications</span><span style="font-size:0.75rem;font-weight:500;color:var(--text-muted)">' +
        notifs.length + ' alert' + (notifs.length !== 1 ? 's' : '') + '</span></div>';

      if (notifs.length === 0 && upcoming.length === 0) {
        html += '<div class="notif-empty"><div class="notif-empty-icon"><svg width="22" height="22" viewBox="0 0 22 22" fill="none"><path d="M11 2l2.09 6.26L20 9.27l-5 3.89L16.18 20 11 16.77 5.82 20 7 13.16l-5-3.89 6.91-1.01L11 2z" stroke="var(--text-muted)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg></div>All caught up! No pending alerts.</div>';
      } else {
        const allItems = [...notifs, ...upcoming];
        html += allItems.map(n => {
          const icon = n.type === 'overdue'
            ? '<svg width="14" height="14" viewBox="0 0 14 14"><path d="M7 1v7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="7" cy="11" r="1" fill="currentColor"/></svg>'
            : n.type === 'due-today'
            ? '<svg width="14" height="14" viewBox="0 0 14 14"><circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M7 4v3.5l2.5 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>'
            : '<svg width="14" height="14" viewBox="0 0 14 14"><path d="M1 7h12M8 3l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
          const dateLabel = n.type === 'overdue' ? formatShort(n.task.date) : n.type === 'due-today' ? 'Today' : n.label;
          const typeLabel = n.type === 'overdue' ? 'Overdue' : n.type === 'due-today' ? 'Due today' : 'Upcoming';
          return '<div class="notif-item"><div class="notif-item-icon ' + n.type + '">' + icon + '</div>' +
            '<div class="notif-item-body"><div class="notif-item-text">' + escapeHtml(n.task.text) + '</div>' +
            '<div class="notif-item-meta"><span class="priority-dot ' + n.task.priority + '" style="width:6px;height:6px"></span> ' +
            n.task.priority + ' &middot; ' + typeLabel + ' &middot; ' + dateLabel + '</div></div></div>';
        }).join('');
      }

      if ('Notification' in window && Notification.permission === 'default') {
        html += '<button class="notif-enable-btn" onclick="requestNotifPermission()">Enable browser notifications</button>';
      }
      dd.innerHTML = html;
    }

    async function requestNotifPermission() {
      if ('Notification' in window) {
        const perm = await Notification.requestPermission();
        if (perm === 'granted') {
          toast('Browser notifications enabled');
          sendBrowserNotifications();
        }
        renderNotificationDropdown();
      }
    }

    function sendBrowserNotifications() {
      if (!('Notification' in window) || Notification.permission !== 'granted') return;
      const notifs = getNotifications();
      if (notifs.length === 0) return;
      const overdue = notifs.filter(n => n.type === 'overdue').length;
      const dueToday = notifs.filter(n => n.type === 'due-today').length;
      let body = '';
      if (overdue > 0) body += overdue + ' overdue task' + (overdue > 1 ? 's' : '');
      if (overdue > 0 && dueToday > 0) body += ', ';
      if (dueToday > 0) body += dueToday + ' task' + (dueToday > 1 ? 's' : '') + ' due today';
      new Notification('Smart Reminder', { body, icon: 'icons/icon-192.png', tag: 'reminder-alerts' });
    }

    function initNotifications() {
      updateNotificationBell();
      if ('Notification' in window && Notification.permission === 'granted') {
        sendBrowserNotifications();
      }
      setInterval(() => { updateNotificationBell(); sendBrowserNotifications(); }, 30 * 60 * 1000);
      // Schedule native push notifications for mobile
      initNativePushNotifications();
    }

    // ── Native push notifications (Capacitor) ──
    async function initNativePushNotifications() {
      if (!isNativeApp()) return;
      try {
        const LocalNotifications = getCapPlugin('LocalNotifications');
        const perm = await LocalNotifications.requestPermissions();
        if (perm.display !== 'granted') return;

        // Cancel old scheduled notifications and reschedule
        const pending = await LocalNotifications.getPending();
        if (pending.notifications.length > 0) {
          await LocalNotifications.cancel(pending);
        }
        await scheduleTaskNotifications(LocalNotifications);

        // Reschedule on app resume
        document.addEventListener('resume', async () => {
          const p = await LocalNotifications.getPending();
          if (p.notifications.length > 0) await LocalNotifications.cancel(p);
          await scheduleTaskNotifications(LocalNotifications);
        });
      } catch (err) {
        console.log('Native push notifications not available:', err.message);
      }
    }

    async function scheduleTaskNotifications(LocalNotifications) {
      const today = todayStr();
      const tomorrow = (() => { const d = new Date(); d.setDate(d.getDate() + 1); return toDateStr(d); })();
      const notifications = [];
      let id = 10000;

      // Overdue tasks - immediate notification
      const overdue = tasks.filter(t => t.status !== 'completed' && t.date && t.date < today);
      if (overdue.length > 0) {
        notifications.push({
          id: id++,
          title: 'Overdue Tasks',
          body: `${overdue.length} overdue: ${overdue.slice(0, 2).map(t => t.text).join(', ')}${overdue.length > 2 ? ' +more' : ''}`,
          smallIcon: 'ic_launcher',
          largeIcon: 'ic_launcher',
          schedule: { at: new Date(Date.now() + 2000) }
        });
      }

      // Due today - immediate notification
      const dueToday = tasks.filter(t => t.status !== 'completed' && t.date === today);
      if (dueToday.length > 0) {
        notifications.push({
          id: id++,
          title: 'Tasks Due Today',
          body: `${dueToday.length} task${dueToday.length > 1 ? 's' : ''}: ${dueToday.slice(0, 2).map(t => t.text).join(', ')}${dueToday.length > 2 ? ' +more' : ''}`,
          smallIcon: 'ic_launcher',
          largeIcon: 'ic_launcher',
          schedule: { at: new Date(Date.now() + 4000) }
        });
      }

      // High priority due today - individual notifications
      const highToday = dueToday.filter(t => t.priority === 'high');
      for (const t of highToday.slice(0, 3)) {
        notifications.push({
          id: id++,
          title: 'High Priority',
          body: t.text,
          smallIcon: 'ic_launcher',
          largeIcon: 'ic_launcher',
          schedule: { at: new Date(Date.now() + 6000) }
        });
      }

      // Tomorrow morning reminder at 8 AM
      const dueTomorrow = tasks.filter(t => t.status !== 'completed' && t.date === tomorrow);
      if (dueTomorrow.length > 0) {
        const morning = new Date();
        morning.setDate(morning.getDate() + 1);
        morning.setHours(8, 0, 0, 0);
        if (morning > new Date()) {
          notifications.push({
            id: id++,
            title: 'Tomorrow\'s Tasks',
            body: `${dueTomorrow.length} task${dueTomorrow.length > 1 ? 's' : ''} tomorrow: ${dueTomorrow[0].text}${dueTomorrow.length > 1 ? ' and more' : ''}`,
            smallIcon: 'ic_launcher',
            largeIcon: 'ic_launcher',
            schedule: { at: morning }
          });
        }
      }

      // Daily morning reminder at 8 AM today (if not past 8 AM)
      const todayMorning = new Date();
      todayMorning.setHours(8, 0, 0, 0);
      if (todayMorning > new Date() && (dueToday.length > 0 || overdue.length > 0)) {
        const total = dueToday.length + overdue.length;
        notifications.push({
          id: id++,
          title: 'Good Morning! Smart Reminder',
          body: `You have ${total} pending task${total > 1 ? 's' : ''} today${overdue.length > 0 ? ` (${overdue.length} overdue)` : ''}`,
          smallIcon: 'ic_launcher',
          largeIcon: 'ic_launcher',
          schedule: { at: todayMorning }
        });
      }

      // Evening check-in at 6 PM
      const evening = new Date();
      evening.setHours(18, 0, 0, 0);
      if (evening > new Date()) {
        const incomplete = tasks.filter(t => t.status !== 'completed' && t.date === today);
        if (incomplete.length > 0) {
          notifications.push({
            id: id++,
            title: 'Evening Check-in',
            body: `${incomplete.length} task${incomplete.length > 1 ? 's' : ''} still pending today. Don't forget!`,
            smallIcon: 'ic_launcher',
            largeIcon: 'ic_launcher',
            schedule: { at: evening }
          });
        }
      }

      if (notifications.length > 0) {
        await LocalNotifications.schedule({ notifications });
        console.log(`Scheduled ${notifications.length} push notifications`);
      }
    }

    // ── Location-based geofence alerts (Native + Web) ──
    const GEOFENCE_RADIUS_M = 500; // 500 meters
    let locationCheckInterval = null;
    let notifiedLocationTasks = new Set(); // track notified task IDs to avoid duplicates within a session
    let bgLocationWatcherId = null;
    let bgLocationRunning = false;
    const BG_LOC_PREF_KEY = 'bgLocationEnabled';
    let webLocationWatchId = null;

    // Clear the notified set every 30 minutes so re-entering an area fires again
    setInterval(function() {
      notifiedLocationTasks.clear();
    }, 30 * 60 * 1000);

    function isBgLocationEnabled() {
      return localStorage.getItem(BG_LOC_PREF_KEY) === 'true';
    }

    async function initNativeLocation() {
      if (isNativeApp()) {
        // ── Native app: use Capacitor plugins ──
        document.getElementById('bgLocSep').style.display = '';
        document.getElementById('bgLocToggleWrap').style.display = '';

        try {
          const Geolocation = getCapPlugin('Geolocation');
          const LocalNotifications = getCapPlugin('LocalNotifications');

          const locPerm = await Geolocation.requestPermissions();
          if (locPerm.location !== 'granted' && locPerm.coarseLocation !== 'granted') return;

          const notifPerm = await LocalNotifications.requestPermissions();
          if (notifPerm.display !== 'granted') return;

          checkNearbyTasks(Geolocation, LocalNotifications);
          locationCheckInterval = setInterval(() => {
            checkNearbyTasks(Geolocation, LocalNotifications);
          }, 5 * 60 * 1000);

          document.addEventListener('resume', () => {
            notifiedLocationTasks.clear();
            checkNearbyTasks(Geolocation, LocalNotifications);
          });

          if (isBgLocationEnabled()) {
            await startBackgroundLocation();
          }
          updateBgLocUI();
        } catch (err) {
          console.log('Native location not available:', err.message);
        }
      } else {
        // ── Web browser: use navigator.geolocation + Notification API ──
        initWebLocation();
      }
    }

    async function initWebLocation() {
      if (!navigator.geolocation) {
        console.log('Web geolocation not available');
        return;
      }

      // Request notification permission if not already granted
      if ('Notification' in window && Notification.permission === 'default') {
        try { await Notification.requestPermission(); } catch (e) {}
      }

      // Only proceed with geofencing if notifications are permitted
      if (!('Notification' in window) || Notification.permission !== 'granted') {
        console.log('Notification permission not granted; geofence alerts disabled until permission is given.');
        // Still show the toggle UI so user can enable later
        document.getElementById('bgLocSep').style.display = '';
        document.getElementById('bgLocToggleWrap').style.display = '';
        updateBgLocUI();
        return;
      }

      // Show the background location toggle for web too
      document.getElementById('bgLocSep').style.display = '';
      document.getElementById('bgLocToggleWrap').style.display = '';

      // Start periodic location checking (every 2 minutes)
      checkNearbyTasksWeb();
      locationCheckInterval = setInterval(function() {
        checkNearbyTasksWeb();
      }, 2 * 60 * 1000);

      // Also check on visibility change (user returns to tab)
      document.addEventListener('visibilitychange', function() {
        if (!document.hidden) {
          checkNearbyTasksWeb();
        }
      });

      // Start continuous watching if previously enabled
      if (isBgLocationEnabled()) {
        startWebLocationWatch();
      }
      updateBgLocUI();
    }

    function checkNearbyTasksWeb() {
      if (!navigator.geolocation) return;
      console.log('[Geofence] Web check starting...');
      navigator.geolocation.getCurrentPosition(
        function(pos) {
          var userLat = pos.coords.latitude;
          var userLng = pos.coords.longitude;
          console.log('[Geofence] Web - user at:', userLat, userLng);

          var locationTasks = tasks.filter(function(t) {
            return t.status !== 'completed' &&
              t.locationLat != null && t.locationLng != null &&
              !notifiedLocationTasks.has(t.id);
          });

          console.log('[Geofence] Checking', locationTasks.length, 'tasks with coords');
          var groups = {};
          for (var i = 0; i < locationTasks.length; i++) {
            var t = locationTasks[i];
            var dist = haversineDistance(userLat, userLng, t.locationLat, t.locationLng);
            console.log('[Geofence] Task', t.id, t.locationText, '- distance:', Math.round(dist) + 'm');
            if (dist <= GEOFENCE_RADIUS_M) {
              var key = (t.locationText || 'this location').toLowerCase();
              if (!groups[key]) groups[key] = [];
              groups[key].push(t);
              notifiedLocationTasks.add(t.id);
            }
          }

          // Send browser notifications
          for (var loc in groups) {
            var locTasks = groups[loc];
            console.log('[Geofence] FIRING web notification for location:', loc);
            sendWebProximityNotification(loc, locTasks);
          }
        },
        function(err) {
          console.log('[Geofence] Web location check error:', err.message);
        },
        { timeout: 15000, enableHighAccuracy: false, maximumAge: 60000 }
      );
    }

    function sendWebProximityNotification(location, locTasks) {
      // Show in-app toast
      toast('You\'re near ' + location + ' - ' + locTasks.length + ' pending task' + (locTasks.length > 1 ? 's' : '') + ' here!');

      // Show browser notification if permitted
      if ('Notification' in window && Notification.permission === 'granted') {
        try {
          new Notification('You\'re near ' + location, {
            body: 'You have ' + locTasks.length + ' pending task' + (locTasks.length > 1 ? 's' : '') + ' here: ' + locTasks[0].text + (locTasks.length > 1 ? ' and more' : ''),
            icon: 'icons/icon-192.png',
            tag: 'geofence-' + location.replace(/\s+/g, '-'),
            requireInteraction: true
          });
        } catch (e) {
          console.log('Web notification error:', e.message);
        }
      }
    }

    // ── Debug: show test button if ?debug=1 ──
    if (new URLSearchParams(window.location.search).get('debug') === '1') {
      document.getElementById('geofenceTestSep').style.display = '';
      document.getElementById('geofenceTestBtn').style.display = '';
    }

    // ── Test geofence: fires immediately, shows modal with distances ──
    async function testGeofenceNow() {
      closeUserDropdown();
      const params = new URLSearchParams(window.location.search);
      const forceLat = params.get('lat') ? parseFloat(params.get('lat')) : null;
      const forceLng = params.get('lng') ? parseFloat(params.get('lng')) : null;

      const resultEl = document.createElement('div');
      resultEl.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px';
      resultEl.innerHTML = `<div style="background:#1e1e2e;border-radius:16px;padding:20px;max-width:420px;width:100%;max-height:80vh;overflow-y:auto;color:#cdd6f4;font-family:inherit">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
          <h3 style="margin:0;font-size:15px;color:#89b4fa">📡 Geofence Test</h3>
          <button onclick="this.closest('div[style*=inset]').remove()" style="background:none;border:none;color:#6c7086;font-size:18px;cursor:pointer">✕</button>
        </div>
        <div id="geofenceTestOutput" style="font-size:13px;line-height:1.7">Getting location...</div>
      </div>`;
      document.body.appendChild(resultEl);

      const out = document.getElementById('geofenceTestOutput');

      const getPos = () => new Promise((resolve, reject) => {
        if (forceLat && forceLng) {
          resolve({ coords: { latitude: forceLat, longitude: forceLng } });
        } else if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 15000, enableHighAccuracy: false });
        } else {
          reject(new Error('Geolocation not available'));
        }
      });

      try {
        const pos = await getPos();
        const userLat = pos.coords.latitude;
        const userLng = pos.coords.longitude;

        const locationTasks = tasks.filter(t => t.status !== 'completed' && t.locationLat != null && t.locationLng != null);
        const notifPerm = ('Notification' in window) ? Notification.permission : 'N/A';

        let html = `<b>Your location:</b> ${userLat.toFixed(5)}, ${userLng.toFixed(5)}<br>`;
        if (forceLat) html += `<span style="color:#f59e0b">(⚠ Spoofed via URL params)</span><br>`;
        
        let permColor = '#a6e3a1';
        if (notifPerm === 'denied') permColor = '#f38ba8';
        else if (notifPerm === 'default') permColor = '#f9e2af';
        
        html += `<b>Notification permission:</b> <span style="color:${permColor};font-weight:bold">${notifPerm}</span><br>`;
        if (notifPerm === 'denied') {
          html += `<div style="background:rgba(243,139,168,0.15);border:1px solid #f38ba8;border-radius:8px;padding:8px;margin:8px 0;color:#f38ba8;font-size:12px">
            ⚠ <b>Notifications are blocked.</b> Please click the lock or site settings icon next to the URL in your browser address bar and set Notifications to "Allow" to receive push alerts.
          </div>`;
        } else if (notifPerm === 'default') {
          html += `<div style="margin:8px 0">
            <button class="btn btn-sm btn-primary" onclick="Notification.requestPermission().then(() => { this.closest('div[style*=inset]').remove(); testGeofenceNow(); })">Request Notification Permission</button>
          </div>`;
        }
        html += `<b>Tasks with coords:</b> ${locationTasks.length}<br><hr style="border-color:#313244;margin:10px 0">`;
        html += `<b>Distance to each task:</b><br><br>`;

        let fired = 0;
        const notifiedCopy = new Set(notifiedLocationTasks);
        for (const t of locationTasks) {
          const dist = haversineDistance(userLat, userLng, t.locationLat, t.locationLng);
          const inRange = dist <= GEOFENCE_RADIUS_M;
          const alreadySent = notifiedLocationTasks.has(t.id);
          const icon = inRange ? '🔔' : '📍';
          const color = inRange ? '#a6e3a1' : '#6c7086';
          html += `<div style="color:${color};margin-bottom:4px">${icon} <b>${t.locationText || '?'}</b> — ${dist < 1000 ? Math.round(dist)+'m' : (dist/1000).toFixed(1)+'km'}${inRange ? ' <b>IN RANGE!</b>' : ''}${alreadySent ? ' (already notified)' : ''}</div>`;
          if (inRange) {
            fired++;
            // Actually fire the notification for real
            sendWebProximityNotification((t.locationText || 'this location').toLowerCase(), [t]);
            notifiedLocationTasks.add(t.id);
          }
        }

        if (fired === 0) {
          html += `<br><div style="color:#f38ba8">No tasks within ${GEOFENCE_RADIUS_M}m radius. Move closer to a task location to trigger.</div>`;
        } else {
          html += `<br><div style="color:#a6e3a1">✓ Fired ${fired} notification(s)!</div>`;
        }

        out.innerHTML = html;
      } catch (err) {
        out.innerHTML = `<span style="color:#f38ba8">Error: ${err.message}</span><br>Try adding <code>?debug=1&lat=YOUR_LAT&lng=YOUR_LNG</code> to the URL to spoof a location.`;
      }
    }

    function startWebLocationWatch() {
      if (webLocationWatchId != null) return;
      if (!navigator.geolocation) return;

      webLocationWatchId = navigator.geolocation.watchPosition(
        function(pos) {
          var userLat = pos.coords.latitude;
          var userLng = pos.coords.longitude;

          var locationTasks = tasks.filter(function(t) {
            return t.status !== 'completed' &&
              t.locationLat != null && t.locationLng != null &&
              !notifiedLocationTasks.has(t.id);
          });

          var groups = {};
          for (var i = 0; i < locationTasks.length; i++) {
            var t = locationTasks[i];
            var dist = haversineDistance(userLat, userLng, t.locationLat, t.locationLng);
            if (dist <= GEOFENCE_RADIUS_M) {
              var key = (t.locationText || 'this location').toLowerCase();
              if (!groups[key]) groups[key] = [];
              groups[key].push(t);
              notifiedLocationTasks.add(t.id);
            }
          }

          for (var loc in groups) {
            sendWebProximityNotification(loc, groups[loc]);
          }
        },
        function(err) {
          console.log('Web location watch error:', err.message);
        },
        { enableHighAccuracy: false, maximumAge: 30000, timeout: 30000 }
      );
      bgLocationRunning = true;
      updateBgLocUI();
    }

    function stopWebLocationWatch() {
      if (webLocationWatchId != null) {
        navigator.geolocation.clearWatch(webLocationWatchId);
        webLocationWatchId = null;
      }
      bgLocationRunning = false;
      updateBgLocUI();
    }

    async function toggleBackgroundLocation(enabled) {
      if (enabled) {
        localStorage.setItem(BG_LOC_PREF_KEY, 'true');
        if (isNativeApp()) {
          await startBackgroundLocation();
        } else {
          startWebLocationWatch();
        }
      } else {
        localStorage.setItem(BG_LOC_PREF_KEY, 'false');
        if (isNativeApp()) {
          await stopBackgroundLocation();
        } else {
          stopWebLocationWatch();
        }
      }
      updateBgLocUI();
    }

    async function startBackgroundLocation() {
      if (bgLocationRunning) return;
      try {
        const BackgroundGeolocation = getCapPlugin('BackgroundGeolocation');
        const LocalNotifications = getCapPlugin('LocalNotifications');

        bgLocationWatcherId = await BackgroundGeolocation.addWatcher({
          backgroundMessage: 'Smart Reminder is checking nearby tasks',
          backgroundTitle: 'Location tracking active',
          requestPermissions: true,
          stale: false,
          distanceFilter: 100 // meters -- only fire callback after moving 100m
        }, async (location, error) => {
          if (error) {
            if (error.code === 'NOT_AUTHORIZED') {
              const confirm = window.confirm(
                'Background location is needed for nearby task alerts. Open settings to grant permission?'
              );
              if (confirm) {
                BackgroundGeolocation.openSettings();
              }
            }
            return;
          }
          if (!location) return;

          // Process nearby tasks against this background position
          const userLat = location.latitude;
          const userLng = location.longitude;
          const locationTasks = tasks.filter(t =>
            t.status !== 'completed' &&
            t.locationLat != null && t.locationLng != null &&
            !notifiedLocationTasks.has(t.id)
          );

          const groups = {};
          for (const t of locationTasks) {
            const dist = haversineDistance(userLat, userLng, t.locationLat, t.locationLng);
            if (dist <= GEOFENCE_RADIUS_M) {
              const key = (t.locationText || 'this location').toLowerCase();
              if (!groups[key]) groups[key] = [];
              groups[key].push(t);
              notifiedLocationTasks.add(t.id);
            }
          }

          let notifId = Date.now();
          for (const [loc, locTasks] of Object.entries(groups)) {
            try {
              await LocalNotifications.schedule({
                notifications: [{
                  id: notifId++,
                  title: `You're near ${loc}`,
                  body: `You have ${locTasks.length} pending task${locTasks.length > 1 ? 's' : ''} here: ${locTasks[0].text}${locTasks.length > 1 ? ' and more' : ''}`,
                  smallIcon: 'ic_launcher',
                  largeIcon: 'ic_launcher'
                }]
              });
            } catch (e) {
              console.log('BG notification error:', e.message);
            }
          }
        });

        bgLocationRunning = true;
        console.log('Background location started, watcher ID:', bgLocationWatcherId);
        toast('Background location tracking enabled');
      } catch (err) {
        console.log('Background location start error:', err.message);
        localStorage.setItem(BG_LOC_PREF_KEY, 'false');
        updateBgLocUI();
        toast('Could not start background tracking: ' + err.message);
      }
    }

    async function stopBackgroundLocation() {
      if (!bgLocationRunning || bgLocationWatcherId == null) return;
      try {
        const BackgroundGeolocation = getCapPlugin('BackgroundGeolocation');
        await BackgroundGeolocation.removeWatcher({ id: bgLocationWatcherId });
        bgLocationWatcherId = null;
        bgLocationRunning = false;
        console.log('Background location stopped');
        toast('Background location tracking disabled');
      } catch (err) {
        console.log('Background location stop error:', err.message);
      }
    }

    function updateBgLocUI() {
      const toggle = document.getElementById('bgLocToggle');
      const statusText = document.getElementById('bgLocStatusText');
      if (!toggle) return;
      const enabled = isBgLocationEnabled() && bgLocationRunning;
      toggle.checked = enabled;
      if (statusText) {
        statusText.textContent = enabled
          ? 'Active -- tracking in background'
          : 'Alerts when near tasks';
      }
    }

    async function checkNearbyTasks(Geolocation, LocalNotifications) {
      try {
        // Add timeout to prevent silent hangs on Android
        const pos = await Geolocation.getCurrentPosition({ enableHighAccuracy: false, timeout: 15000 });
        const userLat = pos.coords.latitude;
        const userLng = pos.coords.longitude;
        console.log('[Geofence] Native check - user at:', userLat, userLng);

        // Find tasks with location coordinates
        const locationTasks = tasks.filter(t =>
          t.status !== 'completed' &&
          t.locationLat != null && t.locationLng != null &&
          !notifiedLocationTasks.has(t.id)
        );

        console.log('[Geofence] Checking', locationTasks.length, 'tasks with coords');
        if (locationTasks.length === 0) return;

        // Group by location text
        const groups = {};
        for (const t of locationTasks) {
          const dist = haversineDistance(userLat, userLng, t.locationLat, t.locationLng);
          console.log('[Geofence] Task', t.id, t.locationText, '- distance:', Math.round(dist) + 'm');
          if (dist <= GEOFENCE_RADIUS_M) {
            const key = (t.locationText || 'this location').toLowerCase();
            if (!groups[key]) groups[key] = [];
            groups[key].push(t);
            notifiedLocationTasks.add(t.id);
          }
        }

        // Send notifications -- use safe IDs within Android 32-bit int range
        let notifId = Math.floor(Math.random() * 1000000) + 1;
        for (const [loc, locTasks] of Object.entries(groups)) {
          console.log('[Geofence] FIRING notification for location:', loc);
          try {
            await LocalNotifications.schedule({
              notifications: [{
                id: notifId++,
                title: `📍 You're near ${loc}`,
                body: `You have ${locTasks.length} pending task${locTasks.length > 1 ? 's' : ''} here: ${locTasks[0].text}${locTasks.length > 1 ? ' and more' : ''}`,
                smallIcon: 'ic_launcher',
                largeIcon: 'ic_launcher'
              }]
            });
          } catch (notifErr) {
            console.log('[Geofence] Notification error:', notifErr.message);
          }
        }
      } catch (err) {
        console.log('[Geofence] Native check error:', err.message);
      }
    }

    function haversineDistance(lat1, lon1, lat2, lon2) {
      const R = 6371e3; // Earth radius in meters
      const toRad = (x) => x * Math.PI / 180;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);
      const a = Math.sin(dLat / 2) ** 2 +
                Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
                Math.sin(dLon / 2) ** 2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    async function pinCurrentLocation() {
      const btn = document.getElementById('locationPinBtn');
      if (btn) { btn.disabled = true; btn.textContent = 'Getting location...'; }
      try {
        if (isNativeApp()) {
          const Geolocation = getCapPlugin('Geolocation');
          const pos = await Geolocation.getCurrentPosition({ enableHighAccuracy: true });
          document.getElementById('taskLocationLat').value = pos.coords.latitude;
          document.getElementById('taskLocationLng').value = pos.coords.longitude;
          toast('Location pinned');
        } else if (navigator.geolocation) {
          const pos = await new Promise(function(resolve, reject) {
            navigator.geolocation.getCurrentPosition(resolve, reject, { enableHighAccuracy: true, timeout: 15000 });
          });
          document.getElementById('taskLocationLat').value = pos.coords.latitude;
          document.getElementById('taskLocationLng').value = pos.coords.longitude;
          toast('Location pinned');
        } else {
          toast('Geolocation not available in this browser');
        }
      } catch (err) {
        toast('Could not get location: ' + (err.message || 'Permission denied'));
      }
      if (btn) { btn.disabled = false; btn.textContent = 'Pin current location'; }
    }
